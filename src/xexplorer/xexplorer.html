<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Explorer</title>
    <link rel="stylesheet" href="xexplorer.css">
    <script crossorigin src="../lib/react.min.js"></script>
    <script crossorigin src="../lib/react-dom.min.js"></script>
    <script src="../lib/framer-motion.js"></script>
    <script src="../lib/lucide.min.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="../lib/babel.min.js"></script>
    <script src="../lib/tailwind.min.js"></script>
    <script type="text/babel" src="js2/bridge.js"></script>
    <script type="text/babel" src="js2/components/ui.js"></script>
    <script type="text/babel" src="js2/components/icons.js"></script>
    <script type="text/babel" src="js2/components/modals.js"></script>
    <script type="text/babel" src="js2/components/palette.js"></script>
    <script type="text/babel" src="js2/components/tabs.js"></script>
    <script type="text/babel" src="js2/components/sidebar.js"></script>
    <script type="text/babel" src="js2/components/preview.js"></script>
    <script type="text/babel" src="js2/components/views.js"></script>
    <script type="text/babel" src="js2/app.js"></script>
</head>

<body>
    <div id="root">
        <div class="x-preloader-container">
            <div class="x-preloader-bg-glow"></div>
            <div class="x-preloader-bg-glow-2"></div>
            <div class="x-preloader-glass">
                <div class="x-preloader-content">
                    <div class="x-preloader-visual">
                        <div class="x-preloader-ring"></div>
                        <div class="x-preloader-ring-inner"></div>
                        <div class="x-preloader-logo"></div>
                    </div>
                    <div class="x-preloader-text">Loading X-Explorer</div>
                </div>
            </div>
        </div>
        <script>
            // Hide preloader after minimal delay to ensure it's visible briefly
            (function() {
                const preloader = document.querySelector('.x-preloader-container');
                if (preloader) {
                    // Show preloader briefly, then fade out quickly
                    setTimeout(() => {
                        preloader.style.opacity = '0';
                        preloader.style.transition = 'opacity 0.1s ease-out';
                        setTimeout(() => {
                            preloader.style.display = 'none';
                        }, 100);
                    }, 200); // Show for 200ms minimum
                }
            })();
        </script>
    </div>
</body>

</html>
