                                </div>
                            </div>
                            <div className="space-y-2">
                                <div className="section-label">Due Date</div>
                                <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                                    className="input-field py-2 text-sm" style={{ colorScheme: 'dark' }} />
                            </div>
                        </div>

                        <div className="space-y-2">
                            <div className="section-label">Tags</div>
                            <input value={tags} onChange={e => setTags(e.target.value)}
                                className="input-field py-2.5 text-sm" placeholder="design, backend, review…" />
                        </div>

                        <div className="space-y-2">
                            <div className="section-label">Notes <span style={{ color: 'var(--text-3)', fontWeight: 400, letterSpacing: 0, textTransform: 'none' }}>— markdown ok</span></div>
                            <textarea value={notes} onChange={e => setNotes(e.target.value)}
                                className="input-field text-sm resize-none" rows={3}
                                placeholder="Context, links, details…" />
                        </div>

                        <div className="flex gap-2.5">
                            <button onClick={onClose} className="btn btn-ghost flex-1">Cancel</button>
                            <button onClick={submit} className="btn btn-gold flex-1" style={{ fontSize: 13 }}>Create Task</button>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // ─── TASK NODE ────────────────────────────────────────────────────────────────
        const TaskNode = memo(({ task, depth = 0, safeCall, isFocused, onFocus, selMode, isSelected, onSelect, timers, setTimers, onAddSub }) => {
            const [expanded, setExpanded] = useState(false);
            const [localNotes, setLocalNotes] = useState(task.notes || '');
            const [editing, setEditing] = useState(false);
            const [editVal, setEditVal] = useState(task.content || '');
            const [timerOn, setTimerOn] = useState(false);
            const [ctx, setCtx] = useState(null);
            const [checking, setChecking] = useState(false);
            const intervalRef = useRef(null);
            const isDone = task.status === 'Completed';
            const pc = PC[task.priority] || PC.Medium;
            const due = fmtRelDate(task.due_date);

            useEffect(() => {
                if (timerOn) intervalRef.current = setInterval(() => setTimers(p => ({ ...p, [task.id]: (p[task.id] || 0) + 1 })), 1000);
                else clearInterval(intervalRef.current);
                return () => clearInterval(intervalRef.current);
            }, [timerOn]);

            const handleCheck = () => {
                setChecking(true);
                setTimeout(() => { safeCall('update_task_status', task.id, isDone ? 'Pending' : 'Completed'); setChecking(false); }, 350);
            };

            const saveEdit = () => { if (editVal.trim() !== task.content) safeCall('update_task', task.id, editVal, localNotes, task.links || ''); setEditing(false); };
            const handleCtx = (e) => { e.preventDefault(); e.stopPropagation(); setCtx({ x: Math.min(e.clientX, window.innerWidth - 230), y: Math.min(e.clientY, window.innerHeight - 300) }); };

            return (
                <div className={`relative ${depth > 0 ? 'ml-6' : ''}`}>
                    {depth > 0 && <div style={{ position: 'absolute', left: -12, top: 0, bottom: 0, width: 1, background: 'var(--border)' }} />}

                    <div className={`task-row ${isDone ? 'done' : ''} ${isFocused ? 'focused no-dim' : ''} can-dim`}
                        style={isFocused ? { boxShadow: 'var(--shadow-md)', ringColor: 'var(--gold)' } : {}}
                        onContextMenu={handleCtx}>

                        {/* Priority stripe */}
                        {!isDone && <div className="priority-stripe" style={{ background: pc.stripe }} />}

                        {selMode && (
                            <button onClick={onSelect} style={{
                                width: 16, height: 16, borderRadius: 4, flexShrink: 0, marginTop: 2,
                                border: `1.5px solid ${isSelected ? 'var(--gold)' : 'var(--border-h)'}`,
                                background: isSelected ? 'var(--gold)' : 'transparent',
                                cursor: 'pointer', transition: 'all 0.15s',
                            }}>
                                {isSelected && <span style={{ color: 'var(--bg)', fontSize: 9, display: 'block', textAlign: 'center', fontWeight: 900 }}>✓</span>}
                            </button>
                        )}

                        {/* Checkbox */}
                        <button onClick={handleCheck} className={`check mt-0.5 ${isDone ? 'done' : ''} ${checking ? 'check-pop' : ''}`} style={{ flexShrink: 0 }}>
                            {isDone && <span style={{ color: 'var(--bg)', fontSize: 10, fontWeight: 900 }}>✓</span>}
                        </button>

                        <div className="flex-1 min-w-0 space-y-1.5">
                            <div className="flex items-start gap-3">
                                {editing ? (
                                    <input value={editVal} onChange={e => setEditVal(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') setEditing(false); }}
                                        onBlur={saveEdit} autoFocus
                                        className="flex-1 bg-transparent text-sm font-medium border-b"
                                        style={{ color: 'var(--text)', borderColor: 'var(--gold)' }} />
                                ) : (
                                    <span className="task-title text-sm font-medium leading-snug cursor-default flex-1"
                                        style={{ color: 'var(--text)' }}
                                        onClick={() => setExpanded(!expanded)}
                                        onDoubleClick={() => { setEditing(true); setExpanded(false); }}>
                                        {task.content}
                                    </span>
                                )}

                                <div className="flex items-center gap-2 flex-shrink-0 mt-0.5">
                                    {timers[task.id] > 0 && (
                                        <span className={`mono text-xs font-semibold px-2 py-0.5 rounded-lg ${timerOn ? 'breathe' : ''}`}
                                            style={{ background: 'var(--lav-dim)', color: 'var(--lavender)', border: '1px solid rgba(184,160,232,0.2)' }}>
                                            {fmt(timers[task.id])}
                                        </span>
                                    )}
                                    <div className="task-actions">
                                        <button className="action-btn" data-tip={timerOn ? 'Stop timer' : 'Time it'}
                                            onClick={() => setTimerOn(!timerOn)}
                                            style={timerOn ? { background: 'var(--lav-dim)', color: 'var(--lavender)' } : {}}>⏱</button>
                                        {onFocus && !isFocused && !isDone && (
                                            <button className="action-btn" data-tip="Focus" onClick={onFocus}>⌖</button>
                                        )}
                                        {isFocused && (
                                            <button className="action-btn" data-tip="Exit focus" onClick={onFocus} style={{ color: 'var(--gold)' }}>⌖</button>
                                        )}
                                        <button className="action-btn" data-tip="More" onClick={handleCtx}>···</button>
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center gap-2.5 flex-wrap">
                                {task.priority && task.priority !== 'Medium' && (
                                    <span className="badge" style={{ background: pc.bg, color: pc.color, fontSize: 9 }}>{pc.label}</span>
                                )}
                                {due && (
                                    <span className="text-xs font-semibold flex items-center gap-1"
                                        style={{ color: due.cls === 'overdue' ? 'var(--rose)' : due.cls === 'due-soon' ? 'var(--gold)' : 'var(--text-3)' }}>
                                        📅 {due.label}
                                    </span>
                                )}
                                {task.tags && task.tags.filter && task.tags.filter(Boolean).map(tag => (
                                    <span key={tag} className="tag">#{tag}</span>
                                ))}
                                {task.children && task.children.length > 0 && (
                                    <span className="text-xs mono" style={{ color: 'var(--text-3)' }}>
                                        {task.children.filter(c => c.status === 'Completed').length}/{task.children.length} done
                                    </span>
                                )}
                            </div>

                            {task.children && task.children.length > 0 && (
                                <div className="progress-track" style={{ width: 80 }}>
                                    <div className="progress-fill" style={{ width: `${(task.children.filter(c => c.status === 'Completed').length / task.children.length) * 100}%`, background: 'var(--sage)' }} />
                                </div>
                            )}

                            <AnimatePresence>
                                {expanded && (
                                    <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} style={{ overflow: 'hidden' }}>
                                        <div className="pt-3 space-y-3">
                                            {task.notes && <div className="md" dangerouslySetInnerHTML={{ __html: md(task.notes) }} />}
                                            <textarea value={localNotes} onChange={e => setLocalNotes(e.target.value)}
                                                onBlur={() => safeCall('update_task', task.id, task.content, localNotes, task.links || '')}
                                                className="w-full resize-none rounded-xl p-3 text-xs mono"
                                                style={{ background: 'var(--bg-3)', border: '1px solid var(--border)', color: 'var(--text)', minHeight: 70, lineHeight: 1.8 }}
                                                placeholder="Add notes… (Markdown & Obsidian links supported)" />
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => onAddSub(task.id)} className="btn btn-ghost" style={{ fontSize: 11, padding: '6px 12px' }}>+ Subtask</button>
                                                <button onClick={() => { setEditing(true); setExpanded(false); }} className="btn btn-ghost" style={{ fontSize: 11, padding: '6px 12px' }}>Edit</button>
                                                <button onClick={() => safeCall('delete_item', task.id, 'task')} className="btn btn-danger ml-auto" style={{ fontSize: 11, padding: '6px 12px' }}>Delete</button>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            {task.children && task.children.length > 0 && !expanded && (
                                <div className="space-y-0.5 mt-1">
                                    {task.children.map(c => <TaskNode key={c.id} task={c} depth={depth + 1} safeCall={safeCall} timers={timers} setTimers={setTimers} onAddSub={onAddSub} />)}
                                </div>
                            )}
                        </div>
                    </div>

                    {ctx && <CtxMenu pos={ctx} onClose={() => setCtx(null)} items={[
                        { heading: 'Actions' },
                        { icon: '✏', label: 'Edit title', action: () => { setEditing(true); setExpanded(false); } },
                        { icon: '↳', label: 'Add subtask', action: () => onAddSub(task.id) },
                        { icon: isDone ? '↩' : '✓', label: isDone ? 'Mark pending' : 'Mark complete', action: () => safeCall('update_task_status', task.id, isDone ? 'Pending' : 'Completed') },
                        'sep',
                        { icon: '⌖', label: isFocused ? 'Exit focus' : 'Focus mode', action: onFocus || (() => { }) },
                        { icon: '⏱', label: timerOn ? 'Stop timer' : 'Start timer', action: () => setTimerOn(!timerOn) },
                        'sep',
                        { icon: '✕', label: 'Delete task', danger: true, action: () => safeCall('delete_item', task.id, 'task') },
                    ]} />}
                </div>
            );
        });

        // ─── QUICK CAPTURE (⌘K style) ─────────────────────────────────────────────────
        const QuickCapture = ({ onAdd, onClose }) => {
            const [val, setVal] = useState('');
            const [hint, setHint] = useState('');
            const ref = useRef(null);
            useEffect(() => { ref.current?.focus(); }, []);

            const parseQuick = (text) => {
                // Parse: "Fix bug !high #backend due:tomorrow"
                let content = text, priority = 'Medium', tags = [], due = '';
                const pM = text.match(/!(?:high|h)\b/i); if (pM) { priority = 'High'; content = content.replace(pM[0], ''); }
                const pL = text.match(/!(?:low|l)\b/i); if (pL) { priority = 'Low'; content = content.replace(pL[0], ''); }
                const tagMs = [...text.matchAll(/#(\w+)/g)]; tagMs.forEach(m => { tags.push(m[1]); content = content.replace(m[0], ''); });
                const dM = text.match(/due:(\S+)/i);
                if (dM) {
                    const dv = dM[1].toLowerCase();
                    const d = new Date();
                    if (dv === 'today') due = d.toISOString().slice(0, 10);
                    else if (dv === 'tomorrow') { d.setDate(d.getDate() + 1); due = d.toISOString().slice(0, 10); }
                    else if (dv.match(/\d{4}-\d{2}-\d{2}/)) due = dv;
                    content = content.replace(dM[0], '');
                }
                return { content: content.trim(), priority, tags, due_date: due };
            };

            useEffect(() => {
                const p = parseQuick(val);
                const hints = [];
                if (p.priority !== 'Medium') hints.push(`${p.priority} priority`);
                if (p.tags.length) hints.push(p.tags.map(t => `#${t}`).join(' '));
                if (p.due_date) hints.push(`due ${p.due_date}`);
                setHint(hints.join(' · '));
            }, [val]);

            const submit = () => {
                if (!val.trim()) return;
                const parsed = parseQuick(val);
                onAdd(parsed);
                onClose();
            };

            return (
                <div className="modal-overlay" style={{ alignItems: 'flex-end', paddingBottom: '10vh' }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <motion.div initial={{ y: 30, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: 20, opacity: 0 }}
                        className="quick-bar">
                        <div className="card p-3 space-y-2" style={{ boxShadow: 'var(--shadow-lg)' }}>
                            <div className="flex items-center gap-3">
                                <span style={{ color: 'var(--gold)', fontSize: 18 }}>⚡</span>
                                <input ref={ref} value={val} onChange={e => setVal(e.target.value)}
                                    onKeyDown={e => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') onClose(); }}
                                    className="flex-1 bg-transparent text-sm font-medium"
                                    style={{ color: 'var(--text)' }}
                                    placeholder="Quick capture… (!high, #tag, due:tomorrow)" />
                                <kbd className="kbd">↵</kbd>
                            </div>
                            {hint && <div className="text-xs px-7" style={{ color: 'var(--gold)', opacity: 0.7 }}>{hint}</div>}
                            <div className="text-xs px-7" style={{ color: 'var(--text-3)' }}>
                                Use <span className="kbd">!high</span> <span className="kbd">#tag</span> <span className="kbd">due:tomorrow</span> — press <span className="kbd">Esc</span> to dismiss
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // ─── MISSIONS PAGE ────────────────────────────────────────────────────────────
        const MissionsPage = ({ data, safeCall, focusId, setFocusId, timers, setTimers }) => {
            const [showAdd, setShowAdd] = useState(false);
            const [showQuick, setShowQuick] = useState(false);
            const [addParentId, setAddParentId] = useState(0);
            const [selMode, setSelMode] = useState(false);
            const [selected, setSelected] = useState([]);
            const [view, setView] = useState('list');
            const [filter, setFilter] = useState('all');
            const [showDone, setShowDone] = useState(false);
            const [search, setSearch] = useState('');
            const [showSidebar, setShowSidebar] = useState(true);

            // ⌘K shortcut
            useEffect(() => {
                const h = (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setShowQuick(true); } };
                window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
            }, []);

            const buildTree = (tasks, pid = 0) => tasks.filter(t => t.parent_id === pid).map(t => ({ ...t, children: buildTree(tasks, t.id) }));

            const filtered = useMemo(() => {
                let t = data.tasks.filter(t => t.status !== 'Completed');
                if (search) t = t.filter(t => t.content.toLowerCase().includes(search.toLowerCase()) || t.tags?.some(tag => tag.includes(search.toLowerCase())));
                const now = new Date(); now.setHours(0, 0, 0, 0);
                if (filter === 'today') t = t.filter(t => { if (!t.due_date) return false; const d = new Date(t.due_date); d.setHours(0, 0, 0, 0); return d <= now; });
                if (filter === 'high') t = t.filter(t => t.priority === 'High');
                if (filter === 'nodate') t = t.filter(t => !t.due_date);
                return t;
            }, [data.tasks, filter, search]);

            const tree = useMemo(() => buildTree(filtered), [filtered]);
            const groups = useMemo(() => groupByDate(filtered), [filtered]);
            const done = useMemo(() => [...data.tasks.filter(t => t.status === 'Completed')].sort((a, b) => new Date(b.completed_at || 0) - new Date(a.completed_at || 0)), [data.tasks]);

            const stats = useMemo(() => {
                const total = data.tasks.length, comp = data.tasks.filter(t => t.status === 'Completed').length;
                const overdue = data.tasks.filter(t => { if (!t.due_date || t.status === 'Completed') return false; return new Date(t.due_date) < new Date(); }).length;
                return { total, comp, active: total - comp, overdue, momentum: total > 0 ? Math.round((comp / total) * 100) : 0 };
            }, [data.tasks]);

            const handleAdd = ({ content, priority, due_date, notes, tags }) => {
                safeCall('add_task', content, 0, notes, tags?.join(',') || '', priority, due_date, addParentId);
            };

            const toggleSel = (id) => setSelected(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
            const bulkAction = (action) => {
                selected.forEach(id => { if (action === 'complete') safeCall('update_task_status', id, 'Completed'); if (action === 'delete') safeCall('delete_item', id, 'task'); });
                setSelected([]); setSelMode(false);
            };

            const FILTERS = [{ id: 'all', l: 'All' }, { id: 'today', l: 'Today' }, { id: 'high', l: 'High' }, { id: 'nodate', l: 'Unscheduled' }];
            const GROUP_COLORS = { Overdue: 'var(--rose)', Today: 'var(--gold)', Tomorrow: 'var(--sky)', 'This Week': 'var(--sage)', Later: 'var(--text-3)', 'No Date': 'var(--text-3)' };

            return (
                <div className="flex-1 flex overflow-hidden">
                    {/* Main panel */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        {/* Header */}
                        <div className="flex-shrink-0 px-7 pt-7 pb-4 space-y-4">
                            <div className="flex items-center justify-between gap-4">
                                <div className="flex items-center gap-3">
                                    <h2 className="text-xl font-bold tracking-tight" style={{ color: 'var(--text)' }}>Tasks</h2>
                                    <span className="section-label">{stats.active} active · {stats.comp} done</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    {/* Search */}
                                    <div className="relative">
                                        <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-3)', fontSize: 13 }}>⌕</span>
                                        <input value={search} onChange={e => setSearch(e.target.value)}
                                            className="input-field text-sm" style={{ paddingLeft: 30, height: 36, width: 180 }}
                                            placeholder="Search…" />
                                    </div>
                                    <button onClick={() => setShowQuick(true)} className="btn btn-ghost" style={{ fontSize: 11, height: 36, gap: 4 }}>
                                        ⚡ Quick <span className="kbd" style={{ fontSize: 9 }}>⌘K</span>
                                    </button>
                                    <button onClick={() => { setSelMode(!selMode); setSelected([]); }}
                                        className="btn btn-ghost" style={{
                                            fontSize: 11, height: 36,
                                            background: selMode ? 'var(--gold-dim)' : 'var(--bg-3)',
                                            color: selMode ? 'var(--gold)' : 'var(--text-2)'
                                        }}>
                                        {selMode ? '✕ Cancel' : '☑ Select'}
                                    </button>
                                    <button onClick={() => setShowSidebar(!showSidebar)} className="btn btn-ghost" style={{ fontSize: 11, height: 36 }} data-tip="Toggle widgets">⊞</button>
                                </div>
                            </div>

                            {/* Overdue banner */}
                            {stats.overdue > 0 && (
                                <div className="flex items-center gap-2.5 px-3.5 py-2 rounded-xl text-sm font-semibold pulse-ring"
                                    style={{ background: 'var(--rose-dim)', color: 'var(--rose)', border: '1px solid rgba(232,112,112,0.2)' }}>
                                    ⚠ {stats.overdue} overdue {stats.overdue === 1 ? 'task' : 'tasks'} — don't let them slip
                                </div>
                            )}

                            {/* Filter + view row */}
                            <div className="flex items-center gap-2">
                                <div className="flex items-center gap-0.5 p-1 rounded-xl" style={{ background: 'var(--bg-2)', border: '1px solid var(--border)' }}>
                                    {FILTERS.map(f => (
                                        <button key={f.id} onClick={() => setFilter(f.id)}
                                            className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                            style={{ background: filter === f.id ? 'var(--bg-1)' : 'transparent', color: filter === f.id ? 'var(--text)' : 'var(--text-3)', boxShadow: filter === f.id ? 'var(--shadow-sm)' : 'none', transition: 'all 0.15s' }}>
                                            {f.l}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex items-center gap-0.5 p-1 rounded-xl ml-auto" style={{ background: 'var(--bg-2)', border: '1px solid var(--border)' }}>
                                    {[['list', '≡ List'], ['grouped', '⊞ Grouped']].map(([v, l]) => (
                                        <button key={v} onClick={() => setView(v)}
                                            className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                            style={{ background: view === v ? 'var(--bg-1)' : 'transparent', color: view === v ? 'var(--text)' : 'var(--text-3)' }}>
                                            {l}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Momentum bar */}
                            <div className="space-y-1.5">
                                <div className="flex justify-between text-xs" style={{ color: 'var(--text-3)' }}>
                                    <span>Momentum</span><span className="mono font-bold" style={{ color: 'var(--gold)' }}>{stats.momentum}%</span>
                                </div>
                                <div className="progress-track" style={{ height: 4 }}>
                                    <div className="progress-fill" style={{ width: `${stats.momentum}%`, background: `linear-gradient(90deg, var(--gold), var(--teal))` }} />
                                </div>
                            </div>
                        </div>

                        {/* Task list */}
                        <div className="flex-1 overflow-y-auto px-5 pb-28 space-y-0.5">
                            {view === 'grouped' ? (
                                Object.entries(groups).filter(([, t]) => t.length > 0).map(([grp, tasks]) => (
                                    <div key={grp} className="mb-5">
                                        <div className="flex items-center gap-2 px-3 py-2 section-label">
                                            <div style={{ width: 6, height: 6, borderRadius: '50%', background: GROUP_COLORS[grp] || 'var(--text-3)', flexShrink: 0 }} />
                                            {grp} <span className="ml-auto">{tasks.length}</span>
                                        </div>
                                        {tasks.map(task => (
                                            <TaskNode key={task.id} task={task} safeCall={safeCall}
                                                isFocused={focusId === task.id} onFocus={() => setFocusId(focusId === task.id ? null : task.id)}
                                                selMode={selMode} isSelected={selected.includes(task.id)} onSelect={() => toggleSel(task.id)}
                                                timers={timers} setTimers={setTimers} onAddSub={(pid) => { setAddParentId(pid); setShowAdd(true); }} />
                                        ))}
                                    </div>
                                ))
                            ) : tree.length === 0 ? (
                                <div className="empty">
                                    <div style={{ fontSize: 40 }}>✓</div>
                                    <div className="text-sm font-bold" style={{ color: 'var(--text-3)' }}>Clear queue</div>
                                    <div className="text-xs" style={{ color: 'var(--text-3)' }}>Use ⚡ quick capture or + below</div>
                                </div>
                            ) : (
                                tree.map(task => (
                                    <TaskNode key={task.id} task={task} safeCall={safeCall}
                                        isFocused={focusId === task.id} onFocus={() => setFocusId(focusId === task.id ? null : task.id)}
                                        selMode={selMode} isSelected={selected.includes(task.id)} onSelect={() => toggleSel(task.id)}
                                        timers={timers} setTimers={setTimers} onAddSub={(pid) => { setAddParentId(pid); setShowAdd(true); }} />
                                ))
                            )}

                            {/* Completed section */}
                            {done.length > 0 && (
                                <div className="mt-6 pt-4" style={{ borderTop: '1px solid var(--border)' }}>
                                    <button onClick={() => setShowDone(!showDone)}
                                        className="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl section-label hover:bg-bg2 transition-colors">
                                        <span style={{ transition: 'transform 0.2s', display: 'inline-block', transform: showDone ? 'rotate(90deg)' : 'rotate(0)' }}>▶</span>
                                        Completed
                                        <span className="ml-auto font-bold">{done.length}</span>
                                    </button>
                                    <AnimatePresence>
                                        {showDone && (
                                            <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} style={{ overflow: 'hidden' }}>
                                                <div className="mt-2 space-y-0.5 opacity-45">
                                                    {done.map(task => (
                                                        <div key={task.id} className="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-bg2 transition-colors">
                                                            <button onClick={() => safeCall('update_task_status', task.id, 'Pending')}
                                                                className="check done" style={{ width: 16, height: 16 }}>
                                                                <span style={{ color: 'var(--bg)', fontSize: 9, fontWeight: 900 }}>✓</span>
                                                            </button>
                                                            <span className="text-sm flex-1 line-through" style={{ color: 'var(--text-3)' }}>{task.content}</span>
                                                            {task.completed_at && <span className="text-xs mono" style={{ color: 'var(--text-3)' }}>{fmtDate(task.completed_at)}</span>}
                                                            <button onClick={() => safeCall('delete_item', task.id, 'task')} className="action-btn">✕</button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                </div>
                            )}
                        </div>

                        {/* FAB */}
                        {!selMode && (
                            <motion.button onClick={() => { setAddParentId(0); setShowAdd(true); }}
                                whileHover={{ scale: 1.05, boxShadow: '0 12px 40px var(--gold-glow)' }} whileTap={{ scale: 0.96 }}
                                className="fixed bottom-8 right-8 z-50 flex items-center gap-2 font-bold text-sm rounded-2xl px-5 py-3.5"
                                style={{ background: 'var(--gold)', color: 'var(--bg)', boxShadow: '0 8px 32px var(--gold-glow)' }}>
                                + New Task
                            </motion.button>
                        )}
                    </div>

                    {/* Right sidebar — widgets */}
                    <AnimatePresence>
                        {showSidebar && (
                            <motion.div initial={{ width: 0, opacity: 0 }} animate={{ width: 280, opacity: 1 }} exit={{ width: 0, opacity: 0 }}
                                transition={{ duration: 0.25, ease: [0.4, 0, 0.2, 1] }}
                                className="flex-shrink-0 overflow-y-auto overflow-x-hidden"
                                style={{ borderLeft: '1px solid var(--border)', background: 'var(--bg-1)' }}>
                                <div className="p-4 space-y-4 w-[280px]">
                                    <DailyFocusWidget tasks={data.tasks} safeCall={safeCall} />
                                    <PomodoroWidget />
                                    <StreakWidget achievements={data.achievements} />
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Modals */}
                    <AnimatePresence>
                        {showAdd && <AddTaskModal onClose={() => setShowAdd(false)} parentId={addParentId} onAdd={handleAdd} />}
                    </AnimatePresence>
                    <AnimatePresence>
                        {showQuick && <QuickCapture onClose={() => setShowQuick(false)} onAdd={handleAdd} />}
                    </AnimatePresence>

                    {/* Bulk bar */}
                    <AnimatePresence>
                        {selMode && selected.length > 0 && (
                            <motion.div initial={{ y: 80 }} animate={{ y: 0 }} exit={{ y: 80 }}
                                className="fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 px-5 py-3 rounded-2xl z-50"
                                style={{ background: 'var(--bg-1)', border: '1px solid var(--border-h)', boxShadow: 'var(--shadow-lg)' }}>
                                <span className="text-sm font-bold" style={{ color: 'var(--gold)' }}>{selected.length} selected</span>
                                <div style={{ width: 1, height: 18, background: 'var(--border)' }} />
                                <button onClick={() => bulkAction('complete')} className="btn" style={{ background: 'var(--sage-dim)', color: 'var(--sage)', padding: '7px 14px', fontSize: 11 }}>✓ Complete</button>
                                <button onClick={() => bulkAction('delete')} className="btn" style={{ background: 'var(--rose-dim)', color: 'var(--rose)', padding: '7px 14px', fontSize: 11 }}>✕ Delete</button>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        // ─── HISTORY PAGE ─────────────────────────────────────────────────────────────
        const HistoryPage = ({ data, safeCall }) => {
            const [search, setSearch] = useState('');
            const [filter, setFilter] = useState('all');
            const [sortBy, setSortBy] = useState('date_desc');
            const [editingItem, setEditingItem] = useState(null);

            const handleSaveLog = () => {
                if (!editingItem) return;
                if (editingItem.type === 'task') {
                    safeCall('update_task', editingItem.id, editingItem.content, editingItem.notes, editingItem.links || '');
                } else {
                    safeCall('update_achievement', editingItem.id, editingItem.content, editingItem.impact, editingItem.notes, editingItem.links || '');
                }
                setEditingItem(null);
            };

            const completedItems = useMemo(() => {
                const tasks = data.tasks.filter(t => t.status === 'Completed').map(t => ({
                    ...t,
                    type: 'task',
                    dateStr: t.completed_at || t.timestamp,
                    impact: t.priority
                }));
                const achs = data.achievements.map(a => ({
                    ...a,
                    type: 'victory',
                    dateStr: a.created_at || a.timestamp
                }));
                return [...tasks, ...achs].sort((a, b) => {
                    if (sortBy === 'date_asc') return new Date(a.dateStr || 0) - new Date(b.dateStr || 0);
                    if (sortBy === 'name_asc') return a.content.localeCompare(b.content);
                    if (sortBy === 'name_desc') return b.content.localeCompare(a.content);
                    return new Date(b.dateStr || 0) - new Date(a.dateStr || 0);
                });
            }, [data.tasks, data.achievements, sortBy]);

            const byDate = useMemo(() => {
                const G = {};
                const filtered = completedItems.filter(item => {
                    if (filter === 'tasks' && item.type !== 'task') return false;
                    if (filter === 'victories' && item.type !== 'victory') return false;
                    if (search.trim()) {
                        const q = search.toLowerCase();
                        if (!item.content.toLowerCase().includes(q) && !(item.notes && item.notes.toLowerCase().includes(q))) return false;
                    }
                    return true;
                });

                if (sortBy.startsWith('date')) {
                    filtered.forEach(a => {
                        const d = a.dateStr ? new Date(a.dateStr).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : 'Earlier';
                        if (!G[d]) G[d] = [];
                        G[d].push(a);
                    });
                } else {
                    G['All Items'] = filtered;
                }
                return G;
            }, [completedItems, filter, search, sortBy]);

            const IC = { High: { dot: 'var(--rose)', ring: true }, Medium: { dot: 'var(--gold)', ring: false }, Low: { dot: 'var(--sage)', ring: false } };
            const total = completedItems.length;

            return (
                <div className="flex-1 overflow-y-auto px-7 py-7 space-y-6 max-w-3xl">
                    <header className="flex items-end justify-between">
                        <div>
                            <h2 className="text-xl font-bold tracking-tight" style={{ color: 'var(--text)' }}>Logbook</h2>
                            <p className="text-sm mt-0.5" style={{ color: 'var(--text-3)' }}>{total} items completed and recorded</p>
                        </div>
                    </header>

                    {/* Filter & Search */}
                    <div className="flex gap-3 text-sm">
                        <input value={search} onChange={e => setSearch(e.target.value)}
                            className="input-field py-1.5 px-3 flex-1 text-sm bg-transparent" placeholder="Search history..." style={{ border: '1px solid var(--border)' }} />

                        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                            className="input-field py-1 px-2 text-xs bg-transparent" style={{ width: 'auto', border: '1px solid var(--border)', height: 34, borderRadius: 8, outline: 'none' }}>
                            <option value="date_desc">Newest First</option>
                            <option value="date_asc">Oldest First</option>
                            <option value="name_asc">Name (A-Z)</option>
                            <option value="name_desc">Name (Z-A)</option>
                        </select>

                        <div className="flex gap-1.5 flex-shrink-0">
                            {[['all', 'All'], ['tasks', 'Tasks'], ['victories', 'Victories']].map(([v, l]) => (
                                <button key={v} onClick={() => setFilter(v)}
                                    className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                    style={{ background: filter === v ? 'var(--bg-2)' : 'transparent', color: filter === v ? 'var(--text)' : 'var(--text-3)', border: `1px solid ${filter === v ? 'var(--border-h)' : 'transparent'}` }}>
                                    {l}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* List grouped by date */}
                    {Object.entries(byDate).map(([date, items]) => (
                        <div key={date} className="space-y-2">
                            <div className="section-label px-1">{date}</div>
                            {items.map(a => {
                                const ic = IC[a.impact] || IC.Medium;
                                return (
                                    <div key={a.id + a.type} className="group card-inset flex items-start gap-4 p-4 hover:border-border-h transition-all"
                                        onDoubleClick={() => setEditingItem(a)}>
                                        <div className={`mt-1.5 flex-shrink-0 rounded-full ${ic.ring ? 'pulse-ring' : ''}`}
                                            style={{ width: 8, height: 8, background: a.type === 'task' ? 'var(--sage)' : ic.dot }} />
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm font-semibold leading-snug" style={{ color: 'var(--text)' }}>
                                                {a.type === 'task' ? <span style={{ color: 'var(--sage)', marginRight: 6 }}>✓</span> : <span style={{ color: 'var(--gold)', marginRight: 6 }}>🏆</span>}
                                                {a.content}
                                            </p>
                                            {a.notes && <div className="text-xs mt-2 leading-relaxed md" style={{ color: 'var(--text-2)' }} dangerouslySetInnerHTML={{ __html: md(a.notes) }} />}
                                            {a.type === 'task' && (a.due_date || (a.tags && a.tags.length > 0)) && (
                                                <div className="flex items-center gap-2 mt-2 flex-wrap">
                                                    {a.due_date && (
                                                        <span className="text-xs font-semibold flex items-center gap-1" style={{ color: 'var(--text-3)' }}>📅 {a.due_date}</span>
                                                    )}
                                                    {a.tags && Array.isArray(a.tags) && a.tags.filter(Boolean).map(tag => (
                                                        <span key={tag} className="tag">#{tag}</span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex items-center gap-2 flex-shrink-0">
                                            <button onClick={() => setEditingItem(a)}
                                                className="action-btn opacity-0 group-hover:opacity-100" style={{ fontSize: 11 }}>✎ Edit</button>

                                            {a.type === 'task' ? (
                                                <button onClick={() => safeCall('update_task_status', a.id, 'Pending')}
                                                    className="action-btn opacity-0 group-hover:opacity-100" style={{ fontSize: 10 }}>Undo</button>
                                            ) : (
                                                <span className="badge" style={{ background: ic.dot + '22', color: ic.dot, fontSize: 9 }}>{a.impact}</span>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    ))}
                    {Object.keys(byDate).length === 0 && <div className="empty"><div style={{ fontSize: 40 }}>📜</div><div className="text-sm font-bold" style={{ color: 'var(--text-3)' }}>No history found</div></div>}

                    {editingItem && (
                        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) setEditingItem(null); }}>
                            <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="card p-6 space-y-4 shadow-lg w-full max-w-lg" style={{ background: 'var(--bg-1)' }}>
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-bold" style={{ color: 'var(--text)' }}>Edit Log Details</h3>
                                    <button onClick={() => setEditingItem(null)} style={{ color: 'var(--text-3)' }}>✕</button>
                                </div>
                                <div className="space-y-3">
                                    <input value={editingItem.content} onChange={e => setEditingItem({ ...editingItem, content: e.target.value })}
                                        className="input-field w-full font-bold" placeholder="Task or Victory title..." />

                                    <textarea value={editingItem.notes || ''} onChange={e => setEditingItem({ ...editingItem, notes: e.target.value })}
                                        className="input-field w-full resize-none text-xs mono" style={{ height: 120, lineHeight: 1.6 }}
                                        placeholder="Add completion infos, context, thoughts, or markdown notes..." />

                                    {editingItem.type === 'victory' && (
                                        <div className="flex items-center gap-3 mt-2">
                                            <div className="section-label">Impact:</div>
                                            {['High', 'Medium', 'Low'].map(p => (
                                                <button key={p} onClick={() => setEditingItem({ ...editingItem, impact: p })}
                                                    className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                                    style={{ background: editingItem.impact === p ? IC[p].dot + '22' : 'var(--bg-3)', color: editingItem.impact === p ? IC[p].dot : 'var(--text-3)', border: `1px solid ${editingItem.impact === p ? IC[p].dot + '44' : 'transparent'}` }}>
                                                    {p}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-2.5 pt-2">
                                    <button onClick={() => setEditingItem(null)} className="btn btn-ghost flex-1">Cancel</button>
                                    <button onClick={handleSaveLog} className="btn btn-gold flex-1">Save Completion Info</button>
                                </div>
                            </motion.div>
                        </div>
                    )}
                </div>
            );
        };

        // ─── ANALYTICS PAGE ───────────────────────────────────────────────────────────
        const AnalyticsPage = ({ data, safeCall }) => {
            const [timeVal, setTimeVal] = useState('24');
            const [timeUnit, setTimeUnit] = useState('hours');
            const [recap, setRecap] = useState('');
            const [loading, setLoading] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);

            const stats = useMemo(() => {
                const total = data.tasks.length, done = data.tasks.filter(t => t.status === 'Completed').length;
                const overdue = data.tasks.filter(t => { if (!t.due_date || t.status === 'Completed') return false; return new Date(t.due_date) < new Date(); }).length;
                const high = data.tasks.filter(t => t.priority === 'High' && t.status !== 'Completed').length;
                const wins = data.achievements.length, highW = data.achievements.filter(a => a.impact === 'High').length;
                return { total, done, active: total - done, overdue, high, wins, highW, momentum: total > 0 ? Math.round((done / total) * 100) : 0 };
            }, [data]);

            const priDist = useMemo(() => {
                const C = { High: 0, Medium: 0, Low: 0 };
                data.tasks.filter(t => t.status !== 'Completed').forEach(t => { if (C[t.priority] !== undefined) C[t.priority]++; });
                const T = Object.values(C).reduce((a, b) => a + b, 0) || 1;
                return Object.entries(C).map(([k, v]) => ({ label: k, count: v, pct: Math.round((v / T) * 100), color: PC[k].color }));
            }, [data.tasks]);

            const scan = async () => { setLoading(true); const r = await safeCall('generate_summary', `-${timeVal} ${timeUnit}`); setRecap(r || 'No data in this range.'); setLoading(false); };
            const scanPreset = async (p) => { setLoading(true); const r = await safeCall('generate_summary', p); setRecap(r || 'No data in this range.'); setLoading(false); };
            const aiSynth = async () => { setAiLoading(true); const r = await safeCall('get_ai_recap', `Give concise insights on:\n${recap}`); setRecap(r || recap); setAiLoading(false); };

            const CARDS = [
                { l: 'Total', v: stats.total, c: 'var(--text)' },
                { l: 'Completed', v: stats.done, c: 'var(--sage)' },
                { l: 'Active', v: stats.active, c: 'var(--gold)' },
                { l: 'Overdue', v: stats.overdue, c: 'var(--rose)' },
                { l: 'High Priority', v: stats.high, c: 'var(--rose)' },
                { l: 'Victories', v: stats.wins, c: 'var(--teal)' },
            ];

            return (
                <div className="flex-1 overflow-y-auto px-7 py-7 space-y-6 max-w-4xl">
                    <header className="flex items-end justify-between">
                        <div>
                            <h2 className="text-xl font-bold tracking-tight" style={{ color: 'var(--text)' }}>Intelligence</h2>
                            <p className="text-sm mt-0.5" style={{ color: 'var(--text-3)' }}>System-wide analytics</p>
                        </div>
                        <div className="text-right">
                            <div className="section-label mb-1">Momentum</div>
                            <div className="text-4xl font-black mono" style={{ color: 'var(--gold)' }}>{stats.momentum}%</div>
                        </div>
                    </header>

                    {/* Momentum bar */}
                    <div className="card p-4 space-y-2">
                        <div className="flex justify-between text-xs" style={{ color: 'var(--text-3)' }}>
                            <span>{stats.done} completed of {stats.total} total</span>
                            <span className="mono font-bold" style={{ color: 'var(--gold)' }}>{stats.momentum}%</span>
                        </div>
                        <div className="progress-track" style={{ height: 6 }}>
                            <div className="progress-fill" style={{ width: `${stats.momentum}%`, background: `linear-gradient(90deg, var(--gold), var(--teal))` }} />
                        </div>
                    </div>

                    {/* Stat grid */}
                    <div className="grid grid-cols-3 gap-3">
                        {CARDS.map(s => (
                            <div key={s.l} className="card p-4 stat-card space-y-1" style={{ '--hover-c': s.c }}>
                                <div className="section-label">{s.l}</div>
                                <div className="text-2xl font-black mono" style={{ color: s.c }}>{s.v}</div>
                            </div>
                        ))}
                    </div>

                    {/* Priority distribution */}
                    <div className="card p-5 space-y-4">
                        <div className="section-label">Active Tasks by Priority</div>
                        {priDist.map(d => (
                            <div key={d.label} className="flex items-center gap-3">
                                <div className="w-16 text-xs font-bold" style={{ color: d.color }}>{d.label}</div>
                                <div className="flex-1 progress-track"><div className="progress-fill" style={{ width: `${d.pct}%`, background: d.color }} /></div>
                                <div className="w-8 text-xs mono text-right" style={{ color: 'var(--text-3)' }}>{d.count}</div>
                            </div>
                        ))}
                    </div>

                    {/* Timeline scanner */}
                    <div className="card p-5 space-y-4">
                        <div className="flex items-center justify-between flex-wrap gap-3">
                            <div className="flex items-center gap-2">
                                <div className="section-label">Timeline Scanner</div>
                                <div className="ml-2 flex gap-1 p-1 rounded-xl" style={{ border: '1px solid var(--border)' }}>
                                    {[['daily', 'Day'], ['weekly', 'Week'], ['monthly', 'Month']].map(([v, l]) => (
                                        <button key={v} onClick={() => scanPreset(v)}
                                            className="px-2.5 py-1 text-[11px] font-bold rounded-lg transition-colors hover:bg-bg1"
                                            style={{ color: 'var(--text)', background: 'var(--bg-2)' }}>{l}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-xs" style={{ color: 'var(--text-3)' }}>Custom:</span>
                                <input type="number" value={timeVal} onChange={e => setTimeVal(e.target.value)}
                                    className="mono text-sm text-center rounded-lg py-1.5 px-2"
                                    style={{ width: 52, background: 'var(--bg-3)', border: '1px solid var(--border)', color: 'var(--text)' }} />
                                <select value={timeUnit} onChange={e => setTimeUnit(e.target.value)}
                                    className="mono text-sm rounded-lg py-1.5 px-3 appearance-none"
                                    style={{ background: 'var(--bg-3)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                                    <option value="seconds">Sec</option>
                                    <option value="minutes">Min</option>
                                    <option value="hours">Hr</option>
                                    <option value="days">Day</option>
                                </select>
                                <button onClick={scan} className="btn btn-ghost" style={{ fontSize: 11 }}>{loading ? '...' : 'Scan'}</button>
                                {recap && <button onClick={aiSynth} className="btn" style={{ background: 'var(--lavender)', color: 'var(--bg)', fontSize: 11 }}>{aiLoading ? '...' : '✦ AI'}</button>}
                            </div>
                        </div>
                        {recap ? (
                            <div className="text-sm leading-relaxed p-5 rounded-xl md"
                                style={{ background: 'var(--bg-3)', color: 'var(--text)', minHeight: 120 }}>
                                {loading ? <div className="shimmer rounded h-4 w-1/2" /> : <div dangerouslySetInnerHTML={{ __html: md(recap) }} />}
                            </div>
                        ) : (
                            <div className="py-8 text-center text-sm" style={{ color: 'var(--text-3)' }}>Set a range and scan to see your history</div>
                        )}
                    </div>
                </div>
            );
        };

        // ─── SETTINGS PAGE ────────────────────────────────────────────────────────────
        const SettingsPage = ({ data, safeCall }) => {
            const [s, setS] = useState({});
            useEffect(() => { if (data.settings) setS(data.settings); }, [data.settings]);

            return (
                <div className="flex-1 overflow-y-auto px-7 py-7 max-w-xl">
                    <h2 className="text-xl font-bold tracking-tight mb-8" style={{ color: 'var(--text)' }}>Settings</h2>

                    <div className="space-y-4">
                        <div className="card p-5">
                            <div className="section-label mb-4">Integrations</div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--text)' }}>Obsidian Vault</div><div className="text-xs mt-0.5" style={{ color: 'var(--text-3)' }}>{s.obsidian_path || 'No vault linked'}</div></div>
                                <button onClick={() => safeCall('select_obsidian_path')} className="btn btn-ghost" style={{ fontSize: 11 }}>Browse</button>
                            </div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--text)' }}>AI Endpoint</div><div className="text-xs mt-0.5" style={{ color: 'var(--text-3)' }}>Custom LLM URL</div></div>
                                <input value={s.ai_url || ''} onChange={e => setS({ ...s, ai_url: e.target.value })}
                                    className="input-field py-2 text-sm" style={{ width: 200 }} placeholder="https://…" />
                            </div>
                        </div>

                        <div className="card p-5">
                            <div className="section-label mb-4">Preferences</div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--text)' }}>Default Priority</div></div>
                                <div className="flex gap-1.5">
                                    {['High', 'Medium', 'Low'].map(p => (
                                        <button key={p} onClick={() => setS({ ...s, default_priority: p })}
                                            className="px-3 py-1.5 rounded-lg text-xs font-bold"
                                            style={{ background: s.default_priority === p ? PC[p].bg : 'var(--bg-3)', color: s.default_priority === p ? PC[p].color : 'var(--text-3)' }}>
                                            {p}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="card p-5">
                            <div className="section-label mb-4">Data</div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--text)' }}>Export</div><div className="text-xs mt-0.5" style={{ color: 'var(--text-3)' }}>Download all data as JSON</div></div>
                                <button className="btn btn-ghost" style={{ fontSize: 11 }}>Export</button>
                            </div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--rose)' }}>Clear Completed</div><div className="text-xs mt-0.5" style={{ color: 'var(--text-3)' }}>Remove all completed tasks</div></div>
                                <button className="btn btn-danger" style={{ fontSize: 11 }}>Clear</button>
                            </div>
                        </div>

                        <button onClick={() => safeCall('save_settings', JSON.stringify(s))}
                            className="btn btn-gold w-full" style={{ fontSize: 13, padding: '12px' }}>
                            Save Settings
                        </button>
                    </div>
                </div>
            );
        };

        // ─── SIDEBAR ──────────────────────────────────────────────────────────────────
        const Sidebar = ({ tab, setTab, isDark, toggle }) => {
            const NAV = [
                { id: 'missions', l: 'Tasks', ic: '☐', c: 'var(--gold)' },
                { id: 'log', l: 'Logbook', ic: '◈', c: 'var(--teal)' },
                { id: 'analytics', l: 'Intelligence', ic: '◉', c: 'var(--lavender)' },
                { id: 'settings', l: 'Settings', ic: '◎', c: 'var(--text-3)' },
            ];
            return (
                <aside className="sidebar-wrap flex flex-col pt-7 pb-6" style={{ borderRight: '1px solid var(--border)', background: 'var(--bg-1)' }}>
                    <div className="px-5 mb-8">
                        <div className="font-bold text-base tracking-tight" style={{ color: 'var(--text)', letterSpacing: '-0.02em', fontFamily: "'Instrument Sans'" }}>
                            CHRONOS<span style={{ color: 'var(--gold)' }}>_</span>
                        </div>
                        <div className="mono text-xs mt-0.5" style={{ color: 'var(--text-3)' }}>pro</div>
                    </div>

                    <nav className="flex-1 space-y-0.5 px-3">
                        {NAV.map(item => (
                            <button key={item.id} onClick={() => setTab(item.id)}
                                className={`nav-item w-full flex items-center gap-3 px-3 py-2.5 text-sm ${tab === item.id ? 'active' : ''}`}
                                style={{ color: tab === item.id ? item.c : 'var(--text-3)' }}>
                                <span style={{ fontSize: 13, opacity: .75 }}>{item.ic}</span>
                                <span className="font-semibold">{item.l}</span>
                                {tab === item.id && <div style={{ width: 5, height: 5, borderRadius: '50%', background: item.c, marginLeft: 'auto', flexShrink: 0 }} />}
                            </button>
                        ))}
                    </nav>

                    <div className="px-3 mt-4">
                        <div style={{ height: 1, background: 'var(--border)', marginBottom: 12 }} />
                        <button onClick={toggle} className="nav-item w-full flex items-center gap-3 px-3 py-2.5 text-sm" style={{ color: 'var(--text-3)' }}>
                            <span style={{ fontSize: 13 }}>{isDark ? '☀' : '☾'}</span>
                            <span className="font-semibold">{isDark ? 'Light' : 'Dark'} Mode</span>
                        </button>
                    </div>
                </aside>
            );
        };

        // ─── APP ROOT ─────────────────────────────────────────────────────────────────
        const App = () => {
            const { data, call: safeCall } = useBridge();
            const [tab, setTab] = useState('missions');
            const [focusId, setFocusId] = useState(null);
            const [isDark, setIsDark] = useState(() => localStorage.getItem('chronos-theme') !== 'light');
            const [timers, setTimers] = useState({});

            useEffect(() => { document.documentElement.classList.toggle('light', !isDark); localStorage.setItem('chronos-theme', isDark ? 'dark' : 'light'); }, [isDark]);
            useEffect(() => { document.body.classList.toggle('focus-mode', !!focusId); }, [focusId]);
            useEffect(() => {
                const h = (e) => {
                    if (e.shiftKey && e.key === 'F') setFocusId(null);
                };
                window.addEventListener('keydown', h);
                return () => window.removeEventListener('keydown', h);
            }, []);

            return (
                <div id="app" style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden', background: 'var(--bg)' }}>
                    <Sidebar tab={tab} setTab={setTab} isDark={isDark} toggle={() => setIsDark(!isDark)} />
                    <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>

                        {/* Focus indicator */}
                        <AnimatePresence>
                            {focusId && (
                                <motion.div initial={{ opacity: 0, y: -10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -8 }}
                                    className="no-dim" style={{ position: 'absolute', top: 14, left: '50%', transform: 'translateX(-50%)', zIndex: 50, display: 'flex', alignItems: 'center', gap: 10, padding: '7px 16px', borderRadius: 99, background: 'var(--bg-1)', border: '1px solid var(--border-h)', boxShadow: 'var(--shadow-md)' }}>
                                    <div style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--gold)' }} className="breathe" />
                                    <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--gold)' }}>Deep Focus</span>
                                    <button onClick={() => setFocusId(null)} style={{ fontSize: 10, color: 'var(--text-3)', marginLeft: 6, fontWeight: 700, cursor: 'pointer', background: 'none', border: 'none' }}>Exit <span className="kbd">⇧F</span></button>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        <AnimatePresence mode="wait">
                            {tab === 'missions' && (
                                <motion.div key="m" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <MissionsPage data={data} safeCall={safeCall} focusId={focusId} setFocusId={setFocusId} timers={timers} setTimers={setTimers} />
                                </motion.div>
                            )}
                            {tab === 'log' && (
                                <motion.div key="l" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <HistoryPage data={data} safeCall={safeCall} />
                                </motion.div>
                            )}
                            {tab === 'analytics' && (
                                <motion.div key="a" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <AnalyticsPage data={data} safeCall={safeCall} />
                                </motion.div>
                            )}
                            {tab === 'settings' && (
                                <motion.div key="s" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <SettingsPage data={data} safeCall={safeCall} />
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</head>

<body>
    <div id="root"></div>
</body>

</html>
