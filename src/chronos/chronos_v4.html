<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Pro - Intelligence Hub</title>
    <!-- Libraries -->
    <script crossorigin src="react.min.js"></script>
    <script crossorigin src="react-dom.min.js"></script>
    <!-- Framer Motion -->
    <script src="framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="lucide.min.js"></script>
    <!-- Babel -->
    <script src="babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="tailwind.min.js"></script>
    <!-- QWebChannel -->
    <script src="qwebchannel.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            color-scheme: dark;
            --bg-base: #01121F;
            --bg-surface: #021A2C;
            --bg-surface-hover: #03233A;
            --text-main: #CBE0F0;
            --text-muted: #8295A0;
            --border-color: #254D6A;
            --accent-cyan: #0EADCF;
            --accent-teal: #55FFCC;
            --accent-purple: #aa82ff;
            --accent-red: #D95C5C;
        }

        html.light-mode {
            color-scheme: light;
            --bg-base: #F8FAFC;
            --bg-surface: #FFFFFF;
            --bg-surface-hover: #F1F5F9;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --accent-cyan: #0284C7;
            --accent-teal: #0D9488;
            --accent-purple: #7C3AED;
            --accent-red: #DC2626;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        input:focus, textarea:focus, select:focus { outline: none; }

        /* Remove numeric arrows */
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Pulse for High Impact */
        .pulse-high {
            box-shadow: 0 0 0 0 rgba(217, 92, 92, 0.4);
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(217, 92, 92, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(217, 92, 92, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(217, 92, 92, 0); }
        }

        /* Focus Mode Mechanics */
        .focus-active .sidebar-layer { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .focus-active .dim-other-elements { opacity: 0.1; filter: blur(4px); pointer-events: none; scale: 0.98; }
        .focus-active .focused-mission { opacity: 1 !important; filter: none !important; pointer-events: auto !important; scale: 1.05 !important; z-index: 100; }

        /* Markdown UI */
        .markdown-render p { margin-bottom: 0.75rem; }
        .markdown-render code { font-family: 'JetBrains Mono', monospace; background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 4px; font-size: 0.85em; }
        .markdown-render ul { list-style: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }

        .obsidian-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-surface-hover);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.7rem;
            color: var(--accent-purple);
            text-decoration: none !important;
            font-weight: 600;
            margin: 4px 0;
            transition: all 0.2s;
        }
        .obsidian-chip:hover { border-color: var(--accent-purple); background: var(--bg-surface); }

        select option { background-color: var(--bg-surface); color: var(--text-main); }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: 'var(--bg-base)',
                        surface: 'var(--bg-surface)',
                        'surface-hover': 'var(--bg-surface-hover)',
                        main: 'var(--text-main)',
                        muted: 'var(--text-muted)',
                        border: 'var(--border-color)',
                        cyan: 'var(--accent-cyan)',
                        teal: 'var(--accent-teal)',
                        purple: 'var(--accent-purple)',
                        red: 'var(--accent-red)',
                    }
                }
            }
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('missions');
            const [data, setData] = useState({ achievements: [], tasks: [], settings: {} });
            const [bridgeReady, setBridgeReady] = useState(false);
            const pyBridgeRef = useRef(null);

            // Pro State
            const [focusTaskId, setFocusTaskId] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('chronos-theme') !== 'light');
            const [timers, setTimers] = useState({}); // {taskId: seconds}

            useEffect(() => {
                const root = document.documentElement;
                root.classList.toggle('light-mode', !isDarkMode);
                document.body.classList.toggle('focus-active', !!focusTaskId);
                localStorage.setItem('chronos-theme', isDarkMode ? 'dark' : 'light');
            }, [isDarkMode, focusTaskId]);

            // Shift+F to exit focus
            useEffect(() => {
                const handleKey = (e) => {
                    if (e.shiftKey && e.key === 'F') setFocusTaskId(null);
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            const setupBridge = useCallback(() => {
                if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') {
                    new QWebChannel(qt.webChannelTransport, (c) => {
                        pyBridgeRef.current = c.objects.pyBridge;
                        setBridgeReady(true);
                        refreshData();
                        pyBridgeRef.current.data_updated.connect(refreshData);
                    });
                } else {
                    setTimeout(setupBridge, 200);
                }
            }, []);

            const refreshData = async () => {
                if (!pyBridgeRef.current) return;
                const raw = await pyBridgeRef.current.get_all_data();
                if (raw) setData(JSON.parse(raw));
            };

            useEffect(() => { setupBridge(); }, [setupBridge]);

            const safeCall = async (method, ...args) => {
                if (bridgeReady && pyBridgeRef.current) return await pyBridgeRef.current[method](...args);
                return null;
            };

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-base text-main">
                    <Sidebar
                        activeTab={activeTab}
                        setActiveTab={setActiveTab}
                        isDarkMode={isDarkMode}
                        toggleTheme={() => setIsDarkMode(!isDarkMode)}
                    />

                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        {focusTaskId && (
                            <div className="absolute top-6 left-1/2 -translate-x-1/2 z-[110] flex items-center gap-3 bg-surface/80 backdrop-blur px-5 py-2 rounded-full border border-purple/30 shadow-2xl">
                                <div className="w-2 h-2 rounded-full bg-purple animate-ping" />
                                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-purple">Deep Focus Active</span>
                                <button onClick={() => setFocusTaskId(null)} className="text-[10px] font-bold text-muted hover:text-main ml-4">Exit</button>
                            </div>
                        )}

                        <AnimatePresence mode="wait">
                            {activeTab === 'missions' && (
                                <MissionsPage
                                    key="missions"
                                    data={data}
                                    safeCall={safeCall}
                                    focusTaskId={focusTaskId}
                                    setFocusTaskId={setFocusTaskId}
                                    timers={timers}
                                    setTimers={setTimers}
                                />
                            )}
                            {activeTab === 'log' && <VictoriesPage key="log" data={data} safeCall={safeCall} />}
                            {activeTab === 'analytics' && <AnalyticsPage key="analytics" data={data} safeCall={safeCall} />}
                            {activeTab === 'settings' && <SettingsPage key="settings" data={data} safeCall={safeCall} />}
                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        const Sidebar = ({ activeTab, setActiveTab, isDarkMode, toggleTheme }) => {
            const navItems = [
                { id: 'missions', label: 'Missions', color: 'bg-cyan' },
                { id: 'log', label: 'Victories', color: 'bg-teal' },
                { id: 'analytics', label: 'Intelligence', color: 'bg-purple' },
                { id: 'settings', label: 'Core', color: 'bg-muted' },
            ];

            return (
                <aside className="sidebar-layer w-64 bg-surface border-r border-border flex flex-col pt-10 pb-6 z-20 transition-all duration-500 ease-out">
                    <div className="px-8 mb-12">
                        <span className="font-bold text-xl tracking-tighter text-main">CHRONOS<span className="text-cyan">_</span></span>
                    </div>

                    <nav className="flex-1 space-y-1.5 px-4">
                        {navItems.map((item) => (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all ${
                                    activeTab === item.id ? 'bg-surface-hover text-main font-semibold shadow-inner' : 'text-muted hover:bg-surface-hover/50 hover:text-main'
                                }`}
                            >
                                <div className={`w-2 h-2 rounded-full ${activeTab === item.id ? item.color : 'bg-muted/20'}`} />
                                <span className="text-sm">{item.label}</span>
                            </button>
                        ))}
                    </nav>

                    <div className="px-4 mt-auto">
                        <button
                            onClick={toggleTheme}
                            className="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-muted hover:bg-surface-hover/50 hover:text-main transition-colors"
                        >
                            <div className={`w-2 h-2 rounded-full ${isDarkMode ? 'bg-yellow-500' : 'bg-indigo-500'}`} />
                            <span className="text-sm font-medium">{isDarkMode ? 'Light Mode' : 'Dark Mode'}</span>
                        </button>
                    </div>
                </aside>
            );
        };

        const MissionsPage = ({ data, safeCall, focusTaskId, setFocusTaskId, timers, setTimers }) => {
            const [input, setInput] = useState('');
            const [selectionMode, setSelectionMode] = useState(false);
            const [selectedIds, setSelectedIds] = useState([]);

            const handleAdd = async () => {
                if (input.trim()) {
                    await safeCall('add_task', input.trim(), 0, "", "");
                    setInput('');
                }
            };

            const toggleSelect = (id) => {
                setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };

            const buildTree = (tasks, parentId = 0) => {
                return tasks
                    .filter(t => t.parent_id === parentId)
                    .map(t => ({ ...t, children: buildTree(tasks, t.id) }));
            };

            const missionTree = useMemo(() => buildTree(data.tasks), [data.tasks]);
            const pending = missionTree.filter(t => t.status !== 'Completed');
            const completed = missionTree.filter(t => t.status === 'Completed');

            return (
                <div className="flex-1 overflow-y-auto custom-scrollbar flex justify-center">
                    <div className="w-full max-w-3xl py-14 px-8 flex flex-col min-h-full">
                        <header className="mb-8 flex justify-between items-end">
                            <h2 className="text-3xl font-bold text-main tracking-tight">Active Tasks</h2>
                            <button
                                onClick={() => { setSelectionMode(!selectionMode); setSelectedIds([]); }}
                                className={`text-[10px] font-black uppercase tracking-widest ${selectionMode ? 'text-cyan' : 'text-muted'}`}
                            >
                                {selectionMode ? 'Stop Selection' : 'Selection Mode'}
                            </button>
                        </header>

                        {!focusTaskId && (
                            <div className="mb-10 bg-surface/20 rounded-xl p-1 border border-border/40">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleAdd()}
                                    placeholder="Add task node..."
                                    className="w-full bg-transparent px-5 py-4 text-main placeholder:text-muted/40 focus:border-cyan transition-colors"
                                />
                            </div>
                        )}

                        <div className="space-y-1 mb-24">
                            {pending.map((task) => (
                                <TaskNode
                                    key={task.id}
                                    task={task}
                                    safeCall={safeCall}
                                    isFocused={focusTaskId === task.id}
                                    onFocus={() => setFocusTaskId(task.id)}
                                    selectionMode={selectionMode}
                                    isSelected={selectedIds.includes(task.id)}
                                    onSelect={() => toggleSelect(task.id)}
                                    timers={timers}
                                    setTimers={setTimers}
                                />
                            ))}
                        </div>

                        {!focusTaskId && completed.length > 0 && (
                            <div className="mt-12 opacity-30 dim-other-elements">
                                <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-muted mb-6 px-3">Archive</h3>
                                {completed.map(task => (
                                    <TaskNode key={task.id} task={task} safeCall={safeCall} selectionMode={selectionMode} timers={timers} setTimers={setTimers} />
                                ))}
                            </div>
                        )}
                    </div>

                    {selectionMode && selectedIds.length > 0 && (
                        <motion.div
                            initial={{ y: 100 }} animate={{ y: 0 }}
                            className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-surface/90 backdrop-blur border border-cyan/40 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-8 z-[120]"
                        >
                            <span className="text-xs font-bold text-cyan uppercase tracking-wider">{selectedIds.length} Nodes Selected</span>
                            <div className="flex gap-3">
                                <button onClick={() => { selectedIds.forEach(id => safeCall('update_task_status', id, 'Completed')); setSelectedIds([]); }} className="px-5 py-2 bg-cyan/10 text-cyan text-xs font-bold rounded-lg hover:bg-cyan hover:text-base transition-all">Resolve</button>
                                <button onClick={() => { selectedIds.forEach(id => safeCall('delete_item', id, 'task')); setSelectedIds([]); }} className="px-5 py-2 bg-red/10 text-red text-xs font-bold rounded-lg hover:bg-red hover:text-white transition-all">Abort</button>
                            </div>
                        </motion.div>
                    )}
                </div>
            );
        };

        const TaskNode = ({ task, depth = 0, safeCall, isFocused, onFocus, selectionMode, isSelected, onSelect, timers, setTimers }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const [localNotes, setLocalNotes] = useState(task.notes || '');
            const [timerActive, setTimerActive] = useState(false);
            const intervalRef = useRef(null);

            const isDone = task.status === 'Completed';

            useEffect(() => {
                if (timerActive) {
                    intervalRef.current = setInterval(() => {
                        setTimers(prev => ({ ...prev, [task.id]: (prev[task.id] || 0) + 1 }));
                    }, 1000);
                } else {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [timerActive, task.id]);

            const formatTime = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = s % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            };

            const parseNotes = (text) => {
                if (!text) return null;
                const obsidianRegex = /obsidian:\/\/open\?vault=[^ \n]+/g;
                const html = marked.parse(text.replace(obsidianRegex, (match) => `<a href="${match}" class="obsidian-chip">Open Obsidian Link</a>`));
                return { __html: html };
            };

            return (
                <div
                    className={`relative transition-all duration-500 ${isFocused ? 'focused-mission' : 'dim-other-elements'} ${depth > 0 ? 'ml-6 border-l border-border/10 pl-5' : ''}`}
                >
                    <div className={`flex items-start gap-4 py-3.5 px-3 rounded-2xl transition-all ${isFocused ? 'bg-surface shadow-2xl ring-1 ring-purple/30' : 'hover:bg-surface-hover/20'}`}>
                        {selectionMode && (
                            <button onClick={onSelect} className={`mt-1.5 w-4 h-4 rounded border transition-all ${isSelected ? 'bg-cyan border-cyan' : 'border-border/50'}`} />
                        )}

                        <button
                            onClick={(e) => { e.stopPropagation(); safeCall('update_task_status', task.id, isDone ? 'Pending' : 'Completed'); }}
                            className={`mt-1.5 w-4 h-4 rounded-full border-2 transition-all flex items-center justify-center ${isDone ? 'bg-teal border-teal' : 'border-muted/40 hover:border-cyan'}`}
                        >
                            {isDone && <span className="text-[9px] font-black text-white">✓</span>}
                        </button>

                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-4">
                                <span
                                    className={`text-sm transition-all cursor-pointer select-none ${isDone ? 'line-through text-muted/50' : 'text-main font-medium'}`}
                                    onClick={() => setIsExpanded(!isExpanded)}
                                >
                                    {task.content}
                                </span>

                                {timers[task.id] > 0 && (
                                    <span className="text-[10px] font-mono font-bold bg-purple/10 text-purple px-2 py-0.5 rounded border border-purple/20">
                                        {formatTime(timers[task.id])}
                                    </span>
                                )}

                                {!isDone && (
                                    <div className="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button
                                            onClick={() => setTimerActive(!timerActive)}
                                            className={`text-[9px] font-black uppercase tracking-widest ${timerActive ? 'text-red animate-pulse' : 'text-cyan'}`}
                                        >
                                            {timerActive ? 'Stop' : 'Timer'}
                                        </button>
                                        {!isFocused && (
                                            <button onClick={onFocus} className="text-[9px] font-black uppercase tracking-widest text-purple">Focus</button>
                                        )}
                                    </div>
                                )}
                            </div>

                            <AnimatePresence>
                                {isExpanded && (
                                    <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="overflow-hidden mt-4 space-y-5">
                                        <div className="markdown-render text-xs text-muted/80 leading-relaxed font-normal" dangerouslySetInnerHTML={parseNotes(task.notes)} />
                                        <textarea
                                            value={localNotes}
                                            onChange={(e) => setLocalNotes(e.target.value)}
                                            onBlur={() => safeCall('update_task', task.id, task.content, localNotes, task.links || '')}
                                            className="w-full h-28 bg-base border border-border/30 rounded-xl p-4 text-xs font-mono text-main placeholder:text-muted/20 focus:border-cyan"
                                            placeholder="Context notes... (Markdown & Obsidian links supported)"
                                        />
                                        <div className="flex justify-end gap-3 pb-2">
                                            <button onClick={() => safeCall('delete_item', task.id, 'task')} className="text-[10px] font-black uppercase text-red/60 hover:text-red transition-colors">Delete Task</button>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            {!isExpanded && task.children && task.children.length > 0 && (
                                <div className="mt-2 space-y-1">
                                    {task.children.map(child => (
                                        <TaskNode key={child.id} task={child} depth={depth + 1} safeCall={safeCall} timers={timers} setTimers={setTimers} />
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const AnalyticsPage = ({ data, safeCall }) => {
            const [status, setStatus] = useState('ready');
            const [recap, setRecap] = useState('Awaiting neural scan results...');
            const [timeVal, setTimeVal] = useState('24');
            const [timeUnit, setTimeUnit] = useState('hours');

            // Productivity Logic
            const momentum = useMemo(() => {
                if (!data.tasks.length) return 0;
                const closed = data.tasks.filter(t => t.status === 'Completed').length;
                return Math.round((closed / data.tasks.length) * 100);
            }, [data.tasks]);

            // Heatmap (Mocked data based on actual task count for visualization)
            const heatmapGrid = useMemo(() => Array.from({length: 24}, (_, i) => ({
                hour: i,
                intensity: data.tasks.length > i ? 1 : 0
            })), [data.tasks]);

            return (
                <div className="flex-1 overflow-y-auto custom-scrollbar p-14 flex justify-center">
                    <div className="w-full max-w-4xl space-y-14">
                        <header className="flex justify-between items-end">
                            <div>
                                <h2 className="text-3xl font-bold tracking-tighter text-main">System Intelligence</h2>
                                <p className="text-sm text-muted mt-2">Momentum analysis and temporal tracking grid.</p>
                            </div>
                            <div className="text-right">
                                <div className="text-[10px] font-black uppercase tracking-[0.2em] text-purple mb-1 opacity-70">Momentum</div>
                                <div className="text-5xl font-black text-purple tabular-nums">{momentum}%</div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <section className="col-span-2 bg-surface border border-border/60 rounded-3xl p-8">
                                <h3 className="text-[10px] font-black uppercase tracking-widest text-muted mb-8">Activity Distribution (24h Grid)</h3>
                                <div className="grid grid-cols-12 gap-3">
                                    {heatmapGrid.map((h, i) => (
                                        <div
                                            key={i}
                                            className={`aspect-square rounded-md transition-all duration-1000 ${h.intensity ? 'bg-cyan shadow-[0_0_15px_rgba(14,173,207,0.3)]' : 'bg-border/10'}`}
                                            title={`Hour ${h.hour}: Data Found`}
                                        />
                                    ))}
                                </div>
                            </section>

                            <section className="bg-surface border border-border/60 rounded-3xl p-8 flex flex-col justify-between">
                                <div className="text-[10px] font-black uppercase tracking-widest text-muted mb-4">Neural Recounter</div>
                                <div className="flex flex-col gap-4">
                                    <div className="flex items-center gap-3">
                                        <input type="number" value={timeVal} onChange={e => setTimeVal(e.target.value)} className="w-12 bg-transparent border-b border-border focus:border-purple text-main font-bold text-center pb-1" />
                                        <select value={timeUnit} onChange={e => setTimeUnit(e.target.value)} className="bg-transparent text-xs font-bold text-main border-b border-border focus:border-purple pb-1 appearance-none cursor-pointer">
                                            <option value="seconds">SEC</option>
                                            <option value="minutes">MIN</option>
                                            <option value="hours">HRS</option>
                                            <option value="days">DYS</option>
                                        </select>
                                    </div>
                                    <button
                                        onClick={async () => {
                                            setStatus('loading');
                                            const res = await safeCall('generate_summary', `-${timeVal} ${timeUnit}`);
                                            setRecap(res || "No data points located.");
                                            setStatus('ready');
                                        }}
                                        className="w-full py-3 bg-base border border-border text-xs font-black uppercase tracking-widest text-main rounded-xl hover:bg-surface-hover"
                                    >
                                        Scan Timeline
                                    </button>
                                </div>
                            </section>
                        </div>

                        <div className="bg-surface border border-border/60 rounded-3xl p-10 min-h-[350px] relative overflow-hidden group">
                            <div className="absolute top-0 right-0 p-8 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button
                                    onClick={async () => {
                                        setStatus('ai_loading');
                                        const res = await safeCall('get_ai_recap', `Summarize these logs for me: ${recap}`);
                                        setRecap(res);
                                        setStatus('ready');
                                    }}
                                    className="px-5 py-2 bg-purple text-white text-[10px] font-black uppercase tracking-widest rounded-full shadow-xl hover:scale-105 active:scale-95 transition-all"
                                >
                                    {status === 'ai_loading' ? 'Synthesizing...' : 'AI Synthesis'}
                                </button>
                            </div>
                            <div className="font-mono text-xs leading-[2] text-main whitespace-pre-wrap opacity-70 selection:bg-cyan/30">
                                {status === 'loading' ? <div className="animate-pulse">Accessing historical data...</div> : recap}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const VictoriesPage = ({ data, safeCall }) => {
            const [input, setInput] = useState('');

            const handleAdd = async () => {
                if (!input.trim()) return;
                let imp = input.startsWith('!!!') ? "High" : input.startsWith('.') ? "Low" : "Medium";
                let clean = input.replace(/^!!!|^\./, '').trim();
                await safeCall('add_achievement', clean, imp, "", "");
                setInput('');
            };

            return (
                <div className="flex-1 overflow-y-auto custom-scrollbar flex justify-center">
                    <div className="w-full max-w-3xl py-14 px-8">
                        <header className="mb-10">
                            <h2 className="text-3xl font-bold text-main tracking-tight">Daily Victories</h2>
                        </header>

                        <input
                            type="text"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && handleAdd()}
                            placeholder="Commit milestone win... (!!! for High)"
                            className="w-full bg-transparent border-b border-border py-5 mb-14 text-2xl font-medium placeholder:text-muted/20 focus:border-teal transition-all"
                        />

                        <div className="space-y-6">
                            {data.achievements.map(ach => (
                                <div key={ach.id} className="group flex items-start gap-6 p-6 rounded-3xl border border-border/20 hover:bg-surface-hover/30 transition-all">
                                    <div className={`mt-2 w-2 h-2 rounded-full flex-shrink-0 ${ach.impact === 'High' ? 'bg-red pulse-high' : ach.impact === 'Medium' ? 'bg-cyan' : 'bg-teal'}`} />
                                    <div className="flex-1">
                                        <div className="text-main font-semibold tracking-tight">{ach.content}</div>
                                        {ach.notes && <div className="text-xs text-muted mt-3 opacity-60 leading-relaxed max-w-lg">{ach.notes}</div>}
                                    </div>
                                    <button onClick={() => safeCall('delete_item', ach.id, 'achievement')} className="text-[10px] font-black uppercase text-muted opacity-0 group-hover:opacity-100 hover:text-red transition-all">Discard</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsPage = ({ data, safeCall }) => {
            const [localSettings, setLocalSettings] = useState({});
            useEffect(() => { if (data.settings) setLocalSettings(data.settings); }, [data.settings]);

            return (
                <div className="flex-1 p-14 flex justify-center overflow-y-auto custom-scrollbar">
                    <div className="w-full max-w-2xl">
                        <h2 className="text-3xl font-bold text-main mb-14 tracking-tighter">System Configuration</h2>
                        <div className="space-y-8">
                            <div className="bg-surface p-8 rounded-3xl border border-border/60">
                                <label className="text-[10px] font-black uppercase text-muted tracking-widest block mb-4">Vault Sync (Obsidian)</label>
                                <div className="flex items-center justify-between gap-6">
                                    <span className="text-xs font-mono opacity-40 truncate">{localSettings.obsidian_path || 'Connection Standby...'}</span>
                                    <button onClick={() => safeCall('select_obsidian_path')} className="px-5 py-2 bg-base border border-border rounded-xl text-[10px] font-black uppercase tracking-widest hover:border-cyan">Relink</button>
                                </div>
                            </div>

                            <div className="bg-surface p-8 rounded-3xl border border-border/60 space-y-6">
                                <label className="text-[10px] font-black uppercase text-muted tracking-widest block">Neural API Hook</label>
                                <input type="text" value={localSettings.ai_url || ''} className="w-full bg-base border border-border rounded-xl p-4 text-xs font-mono focus:border-purple" placeholder="Endpoint URI" />
                                <button
                                    onClick={() => safeCall('save_settings', JSON.stringify(localSettings))}
                                    className="w-full py-4 bg-purple text-white text-[10px] font-black uppercase tracking-[0.3em] rounded-2xl shadow-xl active:scale-[0.98] transition-all"
                                >
                                    Commit Core Config
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</head>

<body>
    <div id="root"></div>
</body>

</html>
