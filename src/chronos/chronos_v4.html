                            <div key={s.l} className="card p-4 space-y-1">
                                <div className="section-label">{s.l}</div>
                                <div className="text-2xl font-black mono" style={{ color: s.c }}>{s.v}</div>
                            </div>
                        ))}
                    </div>
                    <div className="card p-5 space-y-4">
                        <div className="section-label">Active Tasks by Priority</div>
                        {priDist.map(d => (
                            <div key={d.label} className="flex items-center gap-3">
                                <div className="w-16 text-xs font-bold" style={{ color: d.color }}>{d.label}</div>
                                <div className="flex-1 progress-track"><div className="progress-fill" style={{ width: `${d.pct}%`, background: d.color }} /></div>
                                <div className="w-8 text-xs mono text-right" style={{ color: 'var(--text-disabled)' }}>{d.count}</div>
                            </div>
                        ))}
                    </div>
                    <div className="card p-5 space-y-4">
                        <div className="flex items-center justify-between flex-wrap gap-3">
                            <div className="flex items-center gap-2">
                                <div className="section-label">Timeline Scanner</div>
                                <div className="ml-2 flex gap-1 p-1 rounded-xl" style={{ border: '1px solid var(--border)' }}>
                                    {[['daily', 'Day'], ['weekly', 'Week'], ['monthly', 'Month']].map(([v, l]) => (
                                        <button key={v} onClick={() => scanPreset(v)}
                                            className="px-2.5 py-1 text-[11px] font-bold rounded-lg transition-colors hover:bg-bg1"
                                            style={{ color: 'var(--text-primary)', background: 'var(--bg-elevated)' }}>{l}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-xs" style={{ color: 'var(--text-disabled)' }}>Custom:</span>
                                <input type="number" value={timeVal} onChange={e => setTimeVal(e.target.value)}
                                    className="mono text-sm text-center rounded-lg py-1.5 px-2"
                                    style={{ width: 52, background: 'var(--bg-overlay)', border: '1px solid var(--border)', color: 'var(--text-primary)' }} />
                                <select value={timeUnit} onChange={e => setTimeUnit(e.target.value)}
                                    className="mono text-sm rounded-lg py-1.5 px-3 appearance-none"
                                    style={{ background: 'var(--bg-overlay)', border: '1px solid var(--border)', color: 'var(--text-primary)' }}>
                                    <option value="hours">Hr</option>
                                    <option value="days">Day</option>
                                    <option value="months">Mo</option>
                                </select>
                                <button onClick={scan} className="btn btn-ghost" style={{ fontSize: 11 }}>{loading ? '...' : 'Scan'}</button>
                                {recap && <button onClick={aiSynth} className="btn" style={{ background: 'var(--accent-hover)', color: 'var(--bg-base)', fontSize: 11 }}>{aiLoading ? '...' : 'AI Insights'}</button>}
                            </div>
                        </div>
                        {recap ? (
                            <div className="text-sm leading-relaxed p-5 rounded-xl md"
                                style={{ background: 'var(--bg-overlay)', color: 'var(--text-primary)', minHeight: 120 }}>
                                {loading ? <div className="shimmer rounded h-4 w-1/2" /> : <div dangerouslySetInnerHTML={{ __html: md(recap) }} />}
                            </div>
                        ) : (
                            <div className="py-8 text-center text-sm" style={{ color: 'var(--text-disabled)' }}>Select a range to generate a report</div>
                        )}
                    </div>
                </div>
            );
        };

        // ─── WORLD CLOCK PAGE ────────────────────────────────────────────────────
        const ALL_TIMEZONES = (() => {
            try { return Intl.supportedValuesOf('timeZone'); } catch(e) { return ['UTC', 'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles', 'Europe/London', 'Europe/Berlin', 'Europe/Paris', 'Asia/Tokyo', 'Asia/Shanghai', 'Asia/Kolkata', 'Australia/Sydney']; }
        })();

        const WorldClockPage = ({ data, safeCall }) => {
            const [clocks, setClocks] = useState(data.settings?.world_clocks || []);
            const [now, setNow] = useState(new Date());
            const [adding, setAdding] = useState(false);
            const [search, setSearch] = useState('');
            const searchRef = useRef(null);

            useEffect(() => {
                const iv = setInterval(() => setNow(new Date()), 1000);
                return () => clearInterval(iv);
            }, []);

            useEffect(() => {
                if (data.settings?.world_clocks) setClocks(data.settings.world_clocks);
            }, [data.settings?.world_clocks]);

            const addClock = (tz) => {
                const label = tz.split('/').pop().replace(/_/g, ' ');
                const updated = [...clocks, { label, tz }];
                setClocks(updated);
                safeCall('save_world_clocks', JSON.stringify(updated));
                setAdding(false);
                setSearch('');
            };
            const removeClock = (idx) => {
                const updated = clocks.filter((_, i) => i !== idx);
                setClocks(updated);
                safeCall('save_world_clocks', JSON.stringify(updated));
            };

            const getTimeInTz = (tz) => {
                try {
                    return { time: now.toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }),
                             date: now.toLocaleDateString('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' }),
                             hour: parseInt(now.toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', hour12: false })) };
                } catch(e) { return { time: '--:--', date: '', hour: 0 }; }
            };

            const localHour = now.getHours();
            const filteredTz = search ? ALL_TIMEZONES.filter(tz => tz.toLowerCase().includes(search.toLowerCase())).slice(0, 12) : [];

            return (
                <div className="flex-1 overflow-y-auto px-7 py-7 space-y-6 max-w-4xl">
                    <header className="flex items-end justify-between">
                        <div>
                            <h2 className="text-xl font-bold tracking-tight" style={{ color: 'var(--text-primary)' }}>World Clock</h2>
                            <p className="text-sm mt-0.5" style={{ color: 'var(--text-disabled)' }}>
                                {now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false })} local
                            </p>
                        </div>
                        <button onClick={() => { setAdding(!adding); setTimeout(() => searchRef.current?.focus(), 100); }}
                            className="btn btn-ghost" style={{ fontSize: 11 }}>
                            {adding ? '✕ Cancel' : '+ Add Zone'}
                        </button>
                    </header>

                    {adding && (
                        <div className="card p-4 space-y-3">
                            <input ref={searchRef} value={search} onChange={e => setSearch(e.target.value)}
                                className="input-field text-sm" placeholder="Search timezone (e.g. Tokyo, Berlin, New York)..." />
                            {filteredTz.length > 0 && (
                                <div className="space-y-1 max-h-48 overflow-y-auto">
                                    {filteredTz.map(tz => {
                                        const info = getTimeInTz(tz);
                                        return (
                                            <button key={tz} onClick={() => addClock(tz)}
                                                className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm hover:bg-bg2 transition-colors"
                                                style={{ color: 'var(--text-primary)', background: 'transparent', border: 'none', cursor: 'pointer', textAlign: 'left' }}>
                                                <span>{tz.replace(/_/g, ' ')}</span>
                                                <span className="mono text-xs" style={{ color: 'var(--text-disabled)' }}>{info.time}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Timeline header — 24h bar */}
                    {clocks.length > 0 && (
                        <div className="card p-5 space-y-4">
                            <div className="flex items-center justify-between mb-2">
                                <div className="section-label">Timeline</div>
                                <div className="flex items-center gap-3 text-xs" style={{ color: 'var(--text-disabled)' }}>
                                    <span className="flex items-center gap-1"><div style={{ width: 8, height: 8, borderRadius: 2, background: 'var(--success-dim)', border: '1px solid var(--success)' }} /> Business hours</span>
                                    <span className="flex items-center gap-1"><div style={{ width: 2, height: 12, borderRadius: 1, background: 'var(--warning)' }} /> Now</span>
                                </div>
                            </div>

                            {/* Hour markers */}
                            <div className="flex items-center" style={{ paddingLeft: 120 }}>
                                {[0,3,6,9,12,15,18,21].map(h => (
                                    <div key={h} className="mono text-xs" style={{ color: 'var(--text-disabled)', position: 'absolute', left: `calc(120px + ${(h/24)*100}% * (100% - 120px) / 100%)` }}>
                                    </div>
                                ))}
                                <div className="flex-1 flex justify-between mono" style={{ fontSize: 9, color: 'var(--text-disabled)' }}>
                                    <span>0</span><span>3</span><span>6</span><span>9</span><span>12</span><span>15</span><span>18</span><span>21</span><span>24</span>
                                </div>
                            </div>

                            {clocks.map((clock, idx) => {
                                const info = getTimeInTz(clock.tz);
                                const workStart = 9/24 * 100;
                                const workEnd = 17/24 * 100;
                                // Calculate offset: difference in current hour between this tz and local
                                const hourDiff = info.hour - localHour;
                                const adjustedWorkStart = ((9 - hourDiff + 24) % 24) / 24 * 100;
                                const adjustedWorkEnd = ((17 - hourDiff + 24) % 24) / 24 * 100;
                                const nowPct = (info.hour + now.getMinutes()/60) / 24 * 100;

                                return (
                                    <div key={idx} className="tz-row group">
                                        <div style={{ width: 110, flexShrink: 0 }}>
                                            <div className="text-sm font-semibold truncate" style={{ color: 'var(--text-primary)' }}>{clock.label}</div>
                                            <div className="mono text-xs" style={{ color: 'var(--text-disabled)' }}>{info.time}</div>
                                            <div className="text-xs" style={{ color: 'var(--text-disabled)', fontSize: 9 }}>{info.date}</div>
                                        </div>
                                        <div className="tz-bar">
                                            <div className="tz-bar-bg" />
                                            {/* Business hours band */}
                                            {adjustedWorkStart < adjustedWorkEnd ? (
                                                <div className="tz-bar-work" style={{ left: `${adjustedWorkStart}%`, width: `${adjustedWorkEnd - adjustedWorkStart}%`, background: 'var(--success-dim)', border: '1px solid rgba(68,255,177,0.2)' }} />
                                            ) : (
                                                <>
                                                    <div className="tz-bar-work" style={{ left: `${adjustedWorkStart}%`, right: 0, background: 'var(--success-dim)', border: '1px solid rgba(68,255,177,0.2)' }} />
                                                    <div className="tz-bar-work" style={{ left: 0, width: `${adjustedWorkEnd}%`, background: 'var(--success-dim)', border: '1px solid rgba(68,255,177,0.2)' }} />
                                                </>
                                            )}
                                            {/* Current time indicator */}
                                            <div className="tz-bar-now" style={{ left: `${nowPct}%`, background: 'var(--warning)' }} />
                                        </div>
                                        <button onClick={() => removeClock(idx)}
                                            className="action-btn opacity-0 group-hover:opacity-100" style={{ flexShrink: 0 }}>✕</button>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {clocks.length === 0 && !adding && (
                        <div className="empty">
                            <div style={{ fontSize: 40 }}>🌍</div>
                            <div className="text-sm font-bold" style={{ color: 'var(--text-disabled)' }}>No time zones configured</div>
                            <div className="text-xs" style={{ color: 'var(--text-disabled)' }}>Add zones to see the timeline</div>
                        </div>
                    )}
                </div>
            );
        };

        // ─── SETTINGS PAGE ───────────────────────────────────────────────────────
        const SettingsPage = ({ data, safeCall }) => {
            const [s, setS] = useState({});
            const [models, setModels] = useState([]);

            useEffect(() => { if (data.settings) setS(data.settings); }, [data.settings]);

            const fetchModels = async () => {
                const r = await safeCall('get_ai_models');
                if (r) { try { setModels(JSON.parse(r)); } catch(e) {} }
            };

            const doExport = async () => {
                const d = await safeCall('export_data');
                if (d) {
                    const blob = new Blob([d], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `chronos_export_${new Date().toISOString().slice(0,10)}.json`; a.click();
                    URL.revokeObjectURL(url);
                }
            };

            const doClear = async () => {
                if (confirm('Delete all completed tasks? This cannot be undone.')) {
                    await safeCall('clear_completed');
                }
            };

            return (
                <div className="flex-1 overflow-y-auto px-7 py-7 max-w-xl">
                    <h2 className="text-xl font-bold tracking-tight mb-8" style={{ color: 'var(--text-primary)' }}>Settings</h2>
                    <div className="space-y-4">
                        {/* Obsidian */}
                        <div className="card p-5">
                            <div className="section-label mb-4">Obsidian Sync</div>
                            <div className="settings-row">
                                <div>
                                    <div className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>Vault Path</div>
                                    <div className="text-xs mt-0.5" style={{ color: 'var(--text-disabled)' }}>{s.obsidian_path || 'No vault linked'}</div>
                                </div>
                                <button onClick={() => safeCall('select_obsidian_path')} className="btn btn-ghost" style={{ fontSize: 11 }}>Browse</button>
                            </div>
                            <div className="settings-row">
                                <div>
                                    <div className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>Auto Sync</div>
                                    <div className="text-xs mt-0.5" style={{ color: 'var(--text-disabled)' }}>Sync tasks on every change</div>
                                </div>
                                <button onClick={() => setS({ ...s, sync_enabled: !s.sync_enabled })}
                                    className="btn btn-ghost" style={{ fontSize: 11, background: s.sync_enabled ? 'var(--success-dim)' : 'var(--bg-overlay)', color: s.sync_enabled ? 'var(--success)' : 'var(--text-disabled)' }}>
                                    {s.sync_enabled ? 'Enabled' : 'Disabled'}
                                </button>
                            </div>
                        </div>

                        {/* AI */}
                        <div className="card p-5">
                            <div className="section-label mb-4">AI Configuration</div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>API URL</div><div className="text-xs mt-0.5" style={{ color: 'var(--text-disabled)' }}>OpenAI-compatible endpoint</div></div>
                                <input value={s.ai_url || ''} onChange={e => setS({ ...s, ai_url: e.target.value })}
                                    className="input-field py-2 text-sm" style={{ width: 220 }} placeholder="https://..." />
                            </div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>API Key</div></div>
                                <input type="password" value={s.ai_key || ''} onChange={e => setS({ ...s, ai_key: e.target.value })}
                                    className="input-field py-2 text-sm" style={{ width: 220 }} placeholder="sk-..." />
                            </div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>Model</div></div>
                                <div className="flex gap-2 items-center">
                                    <select value={s.ai_model || ''} onChange={e => setS({ ...s, ai_model: e.target.value })}
                                        className="input-field py-2 text-sm" style={{ width: 160 }}>
                                        <option value="">Select model...</option>
                                        {models.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <button onClick={fetchModels} className="btn btn-ghost" style={{ fontSize: 11 }}>Refresh</button>
                                </div>
                            </div>
                            <div className="settings-row">
                                <div>
                                    <div className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>CA Certificate</div>
                                    <div className="text-xs mt-0.5" style={{ color: 'var(--text-disabled)' }}>{s.ai_cert_path || 'System default'}</div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={async () => { const p = await safeCall('select_cert_path'); if (p) setS({ ...s, ai_cert_path: p }); }}
                                        className="btn btn-ghost" style={{ fontSize: 11 }}>Browse</button>
                                    {s.ai_cert_path && <button onClick={() => setS({ ...s, ai_cert_path: '' })} className="btn btn-ghost" style={{ fontSize: 11 }}>Clear</button>}
                                </div>
                            </div>
                        </div>

                        {/* Data */}
                        <div className="card p-5">
                            <div className="section-label mb-4">Data</div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>Export</div><div className="text-xs mt-0.5" style={{ color: 'var(--text-disabled)' }}>Download all data as JSON</div></div>
                                <button onClick={doExport} className="btn btn-ghost" style={{ fontSize: 11 }}>Export</button>
                            </div>
                            <div className="settings-row">
                                <div><div className="text-sm font-semibold" style={{ color: 'var(--danger)' }}>Clear Completed</div><div className="text-xs mt-0.5" style={{ color: 'var(--text-disabled)' }}>Remove all completed tasks</div></div>
                                <button onClick={doClear} className="btn btn-danger" style={{ fontSize: 11 }}>Clear</button>
                            </div>
                        </div>

                        <button onClick={() => safeCall('save_settings', JSON.stringify(s))}
                            className="btn btn-gold w-full" style={{ fontSize: 13, padding: '12px' }}>
                            Save Settings
                        </button>
                    </div>
                </div>
            );
        };

        // ─── KEYBOARD SHORTCUTS OVERLAY ─────────────────────────────────────────
        const ShortcutsOverlay = ({ onClose }) => {
            const SHORTCUTS = [
                { keys: 'Ctrl+K', desc: 'Quick capture' },
                { keys: 'Shift+F', desc: 'Exit focus mode' },
                { keys: '?', desc: 'Toggle shortcuts help' },
                { keys: 'F12', desc: 'Open DevTools' },
                { keys: 'Right-click', desc: 'Task context menu' },
                { keys: 'Double-click', desc: 'Edit task title' },
                { keys: 'Click title', desc: 'Expand/collapse details' },
            ];
            return (
                <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <motion.div initial={{ y: 20, opacity: 0, scale: 0.97 }} animate={{ y: 0, opacity: 1, scale: 1 }}
                        className="card p-6 space-y-4 w-full max-w-sm" style={{ boxShadow: 'var(--shadow-lg)' }}>
                        <div className="flex items-center justify-between">
                            <h3 className="font-bold text-base" style={{ color: 'var(--text-primary)' }}>Keyboard Shortcuts</h3>
                            <button onClick={onClose} className="action-btn">✕</button>
                        </div>
                        <div className="space-y-1">
                            {SHORTCUTS.map(s => (
                                <div key={s.keys} className="flex items-center justify-between py-2 px-1" style={{ borderBottom: '1px solid var(--border)' }}>
                                    <span className="text-sm" style={{ color: 'var(--text-secondary)' }}>{s.desc}</span>
                                    <span className="kbd">{s.keys}</span>
                                </div>
                            ))}
                        </div>
                    </motion.div>
                </div>
            );
        };

        // ─── SIDEBAR ─────────────────────────────────────────────────────────────
        const Sidebar = ({ tab, setTab, badges = {} }) => {
            const NAV = [
                { id: 'missions', l: 'Tasks', ic: '☐', c: 'var(--warning)' },
                { id: 'log', l: 'Logbook', ic: '◈', c: 'var(--accent-pressed)' },
                { id: 'analytics', l: 'Intelligence', ic: '◉', c: 'var(--accent-hover)' },
                { id: 'worldclock', l: 'World Clock', ic: '◷', c: 'var(--accent-pressed)' },
                { id: 'settings', l: 'Settings', ic: '◎', c: 'var(--text-disabled)' },
            ];
            return (
                <aside className="sidebar-wrap flex flex-col pt-7 pb-6" style={{ borderRight: '1px solid var(--border)', background: 'var(--bg-base)' }}>
                    <div className="px-5 mb-8">
                        <div className="font-bold text-base tracking-tight" style={{ color: 'var(--text-primary)', letterSpacing: '-0.02em' }}>
                            CHRONOS<span style={{ color: 'var(--warning)' }}>_</span>
                        </div>
                    </div>
                    <nav className="flex-1 space-y-0.5 px-3">
                        {NAV.map(item => (
                            <button key={item.id} onClick={() => setTab(item.id)}
                                className={`nav-item w-full flex items-center gap-3 px-3 py-2.5 text-sm ${tab === item.id ? 'active' : ''}`}
                                style={{ color: tab === item.id ? item.c : 'var(--text-disabled)', background: 'transparent', border: 'none', textAlign: 'left', cursor: 'pointer' }}>
                                <span style={{ fontSize: 13, opacity: .75 }}>{item.ic}</span>
                                <span className="font-semibold">{item.l}</span>
                                {badges[item.id] > 0 && (
                                    <span className="ml-auto mono text-xs font-bold px-1.5 py-0.5 rounded-md"
                                        style={{ background: item.c + '22', color: item.c, fontSize: 10 }}>
                                        {badges[item.id]}
                                    </span>
                                )}
                                {!badges[item.id] && tab === item.id && <div style={{ width: 5, height: 5, borderRadius: '50%', background: item.c, marginLeft: 'auto', flexShrink: 0 }} />}
                            </button>
                        ))}
                    </nav>
                    <div className="px-5 pt-4" style={{ borderTop: '1px solid var(--border)' }}>
                        <div className="text-xs" style={{ color: 'var(--text-disabled)' }}>
                            Press <span className="kbd">?</span> for shortcuts
                        </div>
                    </div>
                </aside>
            );
        };

        // ─── APP ROOT ────────────────────────────────────────────────────────────
        const App = () => {
            const { data, call: safeCall } = useBridge();
            const [tab, setTab] = useState('missions');
            const [focusId, setFocusId] = useState(null);
            const [timers, setTimers] = useState({});
            const [showShortcuts, setShowShortcuts] = useState(false);

            useEffect(() => { document.body.classList.toggle('focus-mode', !!focusId); }, [focusId]);
            useEffect(() => {
                const h = (e) => {
                    if (e.shiftKey && e.key === 'F') setFocusId(null);
                    if (e.key === '?' && !e.target.closest('input, textarea, select')) setShowShortcuts(p => !p);
                };
                window.addEventListener('keydown', h);
                return () => window.removeEventListener('keydown', h);
            }, []);

            // Sidebar badges: active tasks count, overdue count
            const badges = useMemo(() => {
                const active = data.tasks.filter(t => t.status !== 'Completed' && t.parent_id === 0).length;
                const overdue = data.tasks.filter(t => t.status !== 'Completed' && t.due_date && new Date(t.due_date) < new Date()).length;
                return { missions: active, log: data.tasks.filter(t => t.status === 'Completed').length };
            }, [data.tasks]);

            // Reminder popup handler
            window.triggerReminderPopup = () => {
                setTab('missions');
            };

            return (
                <div id="app" style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden', background: 'var(--bg-base)' }}>
                    <Sidebar tab={tab} setTab={setTab} badges={badges} />
                    <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
                        <AnimatePresence>
                            {focusId && (
                                <motion.div initial={{ opacity: 0, y: -10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -8 }}
                                    className="no-dim" style={{ position: 'absolute', top: 14, left: '50%', transform: 'translateX(-50%)', zIndex: 50, display: 'flex', alignItems: 'center', gap: 10, padding: '7px 16px', borderRadius: 99, background: 'var(--bg-base)', border: '1px solid var(--border-light)', boxShadow: 'var(--shadow-md)' }}>
                                    <div style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--warning)' }} className="breathe" />
                                    <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--warning)' }}>Deep Focus</span>
                                    <button onClick={() => setFocusId(null)} style={{ fontSize: 10, color: 'var(--text-disabled)', marginLeft: 6, fontWeight: 700, cursor: 'pointer', background: 'none', border: 'none' }}>Exit <span className="kbd">Shift+F</span></button>
                                </motion.div>
                            )}
                        </AnimatePresence>
                        <AnimatePresence mode="wait">
                            {tab === 'missions' && (
                                <motion.div key="m" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <MissionsPage data={data} safeCall={safeCall} focusId={focusId} setFocusId={setFocusId} timers={timers} setTimers={setTimers} />
                                </motion.div>
                            )}
                            {tab === 'log' && (
                                <motion.div key="l" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <HistoryPage data={data} safeCall={safeCall} />
                                </motion.div>
                            )}
                            {tab === 'analytics' && (
                                <motion.div key="a" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <AnalyticsPage data={data} safeCall={safeCall} />
                                </motion.div>
                            )}
                            {tab === 'worldclock' && (
                                <motion.div key="w" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <WorldClockPage data={data} safeCall={safeCall} />
                                </motion.div>
                            )}
                            {tab === 'settings' && (
                                <motion.div key="s" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                                    <SettingsPage data={data} safeCall={safeCall} />
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                    <AnimatePresence>
                        {showShortcuts && <ShortcutsOverlay onClose={() => setShowShortcuts(false)} />}
                    </AnimatePresence>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</head>

<body>
    <div id="root"></div>
</body>

</html>
