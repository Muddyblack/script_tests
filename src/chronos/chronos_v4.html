<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos</title>
    <script crossorigin src="react.min.js"></script>
    <script crossorigin src="react-dom.min.js"></script>
    <script src="framer-motion.js"></script>
    <script src="lucide.min.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="babel.min.js"></script>
    <script src="tailwind.min.js"></script>
    <script src="qwebchannel.js"></script>

    <style>
        :root { --grain-opacity: 0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Instrument Sans', system-ui, sans-serif;
            background: var(--bg-base); color: var(--text-primary);
            transition: background 0.4s, color 0.4s;
            position: relative;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            opacity: var(--grain-opacity);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 256px;
        }
        body::after {
            content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(14,173,207,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(68,255,177,0.03) 0%, transparent 60%);
        }
        #root { position: relative; z-index: 1; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

        input, textarea, select { outline: none; font-family: inherit; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
        select option { background: var(--bg-base); color: var(--text-primary); }

        .card { background: var(--bg-base); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-sm); }
        .card-inset { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .kbd { display: inline-flex; align-items: center; padding: 1px 5px; background: var(--bg-overlay); border: 1px solid var(--border-light); border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-disabled); }
        .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
        .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; background: var(--bg-overlay); color: var(--text-secondary); border: 1px solid var(--border); }
        .section-label { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-disabled); }

        .nav-item { cursor: pointer; border-radius: 10px; transition: background 0.15s, color 0.15s; }
        .nav-item:hover:not(.active) { background: var(--bg-elevated); }
        .nav-item.active { background: var(--bg-overlay); }

        .input-field { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 11px 15px; font-size: 14px; color: var(--text-primary); transition: border-color 0.15s, box-shadow 0.15s; }
        .input-field:focus { border-color: var(--warning); box-shadow: 0 0 0 3px var(--warning-dim); }
        .input-field::placeholder { color: var(--text-disabled); }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: 10px; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; transition: all 0.15s; border: none; text-transform: uppercase; }
        .btn:active { transform: scale(0.96); }
        .btn-gold { background: var(--warning); color: #111009; }
        .btn-ghost { background: var(--bg-overlay); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger-dim); color: var(--danger); }

        .check { width: 18px; height: 18px; border-radius: 6px; border: 1.5px solid var(--border-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.2s; }
        .check:hover:not(.done) { border-color: var(--warning); box-shadow: 0 0 0 3px var(--warning-dim); }
        .check.done { background: var(--success); border-color: var(--success); }

        .focus-mode .can-dim { opacity: 0.07; filter: blur(3px); pointer-events: none; transition: all 0.5s; }
        .focus-mode .sidebar-wrap { opacity: 0.05; pointer-events: none; transition: all 0.5s; }
        .focus-mode .no-dim { opacity: 1 !important; filter: none !important; pointer-events: auto !important; }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .shimmer { background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-overlay) 50%, var(--bg-elevated) 75%); background-size: 200%; animation: shimmer 1.5s infinite; }
        @keyframes float-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .float-in { animation: float-in 0.25s ease-out forwards; }
        @keyframes check-pop { 0% { transform: scale(1); } 40% { transform: scale(1.3) rotate(-5deg); } 70% { transform: scale(0.9) rotate(3deg); } 100% { transform: scale(1) rotate(0deg); } }
        .check-pop { animation: check-pop 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }
        @keyframes slide-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slide-up 0.3s ease-out; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(232,112,112,0.5); } 70% { box-shadow: 0 0 0 8px rgba(232,112,112,0); } 100% { box-shadow: 0 0 0 0 rgba(232,112,112,0); } }
        .pulse-ring { animation: pulse-ring 2s infinite; }
        @keyframes breathe { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
        .breathe { animation: breathe 3s ease-in-out infinite; }

        .progress-track { height: 3px; background: var(--bg-overlay); border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 99px; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }

        .task-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 12px; transition: background 0.15s; position: relative; }
        .task-row:hover { background: var(--bg-elevated); }
        .task-row.focused { background: var(--bg-base); box-shadow: var(--shadow-md); }
        .task-row.done { opacity: 0.4; }
        .task-row.done .task-title { text-decoration: line-through; color: var(--text-disabled); }
        .task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
        .task-row:hover .task-actions { opacity: 1; }

        .action-btn { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; transition: all 0.12s; color: var(--text-disabled); background: transparent; border: none; }
        .action-btn:hover { background: var(--bg-overlay); color: var(--text-primary); }

        .ctx-menu { position: fixed; z-index: 9999; background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 13px; box-shadow: var(--shadow-lg); padding: 5px; min-width: 210px; }
        .ctx-item { padding: 8px 11px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.1s; color: var(--text-primary); font-weight: 500; }
        .ctx-item:hover { background: var(--bg-overlay); }
        .ctx-item.danger { color: var(--danger); }
        .ctx-sep { height: 1px; background: var(--border); margin: 4px 2px; }
        .ctx-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-disabled); padding: 6px 11px 3px; }

        .priority-stripe { position: absolute; left: 0; top: 8px; bottom: 8px; width: 2.5px; border-radius: 99px; }
        .scroll-fade { position: relative; }
        .scroll-fade::after { content: ''; position: sticky; bottom: 0; left: 0; right: 0; height: 64px; display: block; pointer-events: none; background: linear-gradient(to top, var(--bg-base) 0%, transparent 100%); }
        .sidebar-wrap { width: 220px; flex-shrink: 0; }

        .modal-overlay { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.65); backdrop-filter: blur(12px); }
        .quick-bar { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 200; width: 580px; max-width: calc(100vw - 48px); }
        .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .settings-row:last-child { border-bottom: none; }
        .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; gap: 10px; opacity: 0.35; }

        .md p { margin-bottom: 8px; font-size: 13px; line-height: 1.75; color: var(--text-secondary); }
        .md h1, .md h2, .md h3 { font-weight: 700; margin-bottom: 6px; color: var(--text-primary); }
        .md h1 { font-size: 16px; } .md h2 { font-size: 14px; } .md h3 { font-size: 13px; }
        .md ul, .md ol { margin-left: 18px; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); }
        .md li { margin-bottom: 3px; }
        .md code { font-family: 'JetBrains Mono', monospace; background: var(--bg-overlay); padding: 1px 5px; border-radius: 4px; font-size: 11px; color: var(--warning); }
        .md strong { color: var(--text-primary); font-weight: 700; }
        .md blockquote { border-left: 2px solid var(--border-focus); padding-left: 12px; color: var(--text-disabled); font-style: italic; margin-bottom: 8px; }
        .md a { color: var(--accent-pressed); text-decoration: none; }
        .md a:hover { text-decoration: underline; }

        .obsidian-link { display: inline-flex; align-items: center; gap: 5px; color: var(--accent-hover); font-size: 11px; font-weight: 600; text-decoration: none; padding: 3px 8px; border-radius: 6px; background: var(--accent-hover-dim); border: 1px solid rgba(184,160,232,0.18); transition: all 0.15s; }
        .obsidian-link:hover { background: rgba(184,160,232,0.16); }

        /* World clock timeline */
        .tz-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
        .tz-bar { position: relative; height: 28px; border-radius: 6px; overflow: hidden; flex: 1; }
        .tz-bar-bg { position: absolute; inset: 0; background: var(--bg-overlay); border-radius: 6px; }
        .tz-bar-work { position: absolute; top: 0; bottom: 0; border-radius: 4px; }
        .tz-bar-now { position: absolute; top: -2px; bottom: -2px; width: 2px; border-radius: 1px; z-index: 2; }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo, memo } = React;
        const { motion, AnimatePresence } = window.Motion;

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: 'var(--bg-base)', bg1: 'var(--bg-base)', bg2: 'var(--bg-elevated)', bg3: 'var(--bg-overlay)',
                        text1: 'var(--text-primary)', text2: 'var(--text-secondary)', text3: 'var(--text-disabled)',
                        gold: 'var(--warning)', teal: 'var(--accent-pressed)', rose: 'var(--danger)',
                        sage: 'var(--success)', lav: 'var(--accent-hover)', sky: 'var(--accent-pressed)',
                    }
                }
            }
        };

        // ─── UTILS ──────────────────────────────────────────────────────────────
        const fmt = (s) => { if (!s) return '0:00'; const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60; return `${h > 0 ? h + ':' : ''}${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`; };
        const fmtHuman = (s) => { if (!s) return ''; const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60); if (h > 0) return `${h}h ${m}m`; return `${m}m`; };
        const fmtDate = (iso) => { if (!iso) return null; return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); };
        const fmtRelDate = (iso) => {
            if (!iso) return null;
            const d = new Date(iso), now = new Date();
            const diff = Math.floor((d - now) / 86400000);
            if (diff < 0) return { label: `${Math.abs(diff)}d overdue`, cls: 'overdue' };
            if (diff === 0) return { label: 'Today', cls: 'due-soon' };
            if (diff === 1) return { label: 'Tomorrow', cls: 'due-soon' };
            if (diff <= 7) return { label: `${diff}d`, cls: '' };
            return { label: fmtDate(iso), cls: '' };
        };
        const PC = {
            High: { color: 'var(--danger)', bg: 'var(--danger-dim)', label: 'High', stripe: 'var(--danger)' },
            Medium: { color: 'var(--warning)', bg: 'var(--warning-dim)', label: 'Med', stripe: 'var(--warning)' },
            Low: { color: 'var(--text-disabled)', bg: 'var(--bg-overlay)', label: 'Low', stripe: 'var(--border-light)' },
        };
        const groupByDate = (tasks) => {
            const now = new Date(); now.setHours(0,0,0,0);
            const G = { Overdue: [], Today: [], Tomorrow: [], 'This Week': [], Later: [], 'No Date': [] };
            tasks.forEach(t => {
                if (!t.due_date) { G['No Date'].push(t); return; }
                const d = new Date(t.due_date); d.setHours(0,0,0,0);
                const diff = Math.floor((d - now) / 86400000);
                if (diff < 0) G.Overdue.push(t);
                else if (diff === 0) G.Today.push(t);
                else if (diff === 1) G.Tomorrow.push(t);
                else if (diff <= 7) G['This Week'].push(t);
                else G.Later.push(t);
            });
            return G;
        };
        const md = (text) => {
            if (!text) return '';
            let h = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^### (.+)/gm, '<h3>$1</h3>').replace(/^## (.+)/gm, '<h2>$1</h2>').replace(/^# (.+)/gm, '<h1>$1</h1>')
                .replace(/^> (.+)/gm, '<blockquote>$1</blockquote>')
                .replace(/^[-*] (.+)/gm, '<li>$1</li>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/(obsidian:\/\/open\?[^\s<]+)/g, '<a href="$1" class="obsidian-link">Obsidian</a>');
            if (!h.match(/^<[hublp]/)) h = '<p>' + h + '</p>';
            return h;
        };
        const greet = () => {
            const h = new Date().getHours();
            if (h < 5) return 'Still up?';
            if (h < 12) return 'Good morning';
            if (h < 17) return 'Good afternoon';
            if (h < 21) return 'Good evening';
            return 'Good night';
        };

        // ─── BRIDGE ──────────────────────────────────────────────────────────────
        const useBridge = () => {
            const [ready, setReady] = useState(false);
            const [data, setData] = useState({ tasks: [], settings: {} });
            const ref = useRef(null);
            const refresh = useCallback(async () => { if (!ref.current) return; try { const r = await ref.current.get_all_data(); if (r) setData(JSON.parse(r)); } catch (e) { } }, []);
            useEffect(() => {
                const setup = () => { if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') { new QWebChannel(qt.webChannelTransport, (c) => { ref.current = c.objects.pyBridge; setReady(true); refresh(); ref.current.data_updated.connect(refresh); }); } else setTimeout(setup, 200); };
                setup();
            }, []);
            const call = useCallback(async (m, ...a) => { if (ready && ref.current) { try { return await ref.current[m](...a); } catch (e) { } } }, [ready]);
            return { ready, data, refresh, call };
        };

        // ─── CONTEXT MENU ────────────────────────────────────────────────────────
        const CtxMenu = ({ items, pos, onClose }) => {
            useEffect(() => {
                const h = (e) => { if (!e.target.closest('.ctx-menu')) onClose(); };
                setTimeout(() => document.addEventListener('click', h), 0);
                return () => document.removeEventListener('click', h);
            }, [onClose]);
            const style = { top: Math.min(pos.y, window.innerHeight - 300), left: Math.min(pos.x, window.innerWidth - 230) };
            return (
                <div className="ctx-menu float-in" style={style}>
                    {items.map((item, i) => item === 'sep' ? <div key={i} className="ctx-sep" /> : item.label ? <div key={i} onClick={() => { item.action(); onClose(); }} className={`ctx-item ${item.danger ? 'danger' : ''}`}><span style={{ opacity: .65, fontSize: 13 }}>{item.icon}</span>{item.label}{item.kbd && <span className="kbd ml-auto">{item.kbd}</span>}</div> : <div key={i} className="ctx-label">{item.heading}</div>)}
                </div>
            );
        };

        // ─── DAILY FOCUS WIDGET ──────────────────────────────────────────────────
        const DailyFocusWidget = ({ tasks, safeCall }) => {
            const today = useMemo(() => {
                const now = new Date(); now.setHours(0,0,0,0);
                return tasks.filter(t => {
                    if (!t.due_date || t.status === 'Completed') return false;
                    const d = new Date(t.due_date); d.setHours(0,0,0,0);
                    return d.getTime() <= now.getTime();
                });
            }, [tasks]);
            const overdue = useMemo(() => tasks.filter(t => { if (!t.due_date || t.status === 'Completed') return false; return new Date(t.due_date) < new Date(new Date().toDateString()); }), [tasks]);

            return (
                <div className="card p-5 space-y-4">
                    <div className="flex items-center gap-3">
                        <div>
                            <div className="font-bold text-base" style={{ color: 'var(--text-primary)' }}>{greet()}</div>
                            <div className="text-xs" style={{ color: 'var(--text-disabled)' }}>{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
                        </div>
                    </div>
                    {overdue.length > 0 && (
                        <div className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-semibold pulse-ring"
                            style={{ background: 'var(--danger-dim)', color: 'var(--danger)', border: '1px solid rgba(232,112,112,0.2)' }}>
                            {overdue.length} overdue
                        </div>
                    )}
                    {today.length > 0 ? (
                        <div className="space-y-1.5">
                            <div className="section-label">Today's focus</div>
                            {today.slice(0, 5).map(t => (
                                <div key={t.id} className="flex items-center gap-2 px-2 py-1.5 rounded-lg" style={{ background: 'var(--bg-elevated)' }}>
                                    <button onClick={() => safeCall('update_task_status', t.id, 'Completed')}
                                        className="check" style={{ width: 14, height: 14, borderRadius: 4 }} />
                                    <span className="text-xs font-medium flex-1 truncate" style={{ color: 'var(--text-primary)' }}>{t.content}</span>
                                </div>
                            ))}
                            {today.length > 5 && <div className="text-xs" style={{ color: 'var(--text-disabled)', paddingLeft: 4 }}>+{today.length - 5} more</div>}
                        </div>
                    ) : (
                        <div className="text-xs" style={{ color: 'var(--text-disabled)' }}>No tasks scheduled for today</div>
                    )}
                </div>
            );
        };

        // ─── ADD TASK MODAL ──────────────────────────────────────────────────────
        const AddTaskModal = ({ onAdd, onClose, parentId = 0 }) => {
            const [content, setContent] = useState('');
            const [priority, setPriority] = useState('Medium');
            const [dueDate, setDueDate] = useState('');
            const [notes, setNotes] = useState('');
            const [tags, setTags] = useState('');
            const [isAch, setIsAch] = useState(false);
            const ref = useRef(null);
            useEffect(() => { ref.current?.focus(); }, []);
            const submit = () => {
                if (!content.trim()) return;
                onAdd({ content: content.trim(), priority, due_date: dueDate, notes, tags: tags.split(',').map(t => t.trim()).filter(Boolean), parent_id: parentId, is_achievement: isAch });
                onClose();
            };
            return (
                <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <motion.div initial={{ y: 20, opacity: 0, scale: 0.97 }} animate={{ y: 0, opacity: 1, scale: 1 }} exit={{ y: 10, opacity: 0, scale: 0.98 }}
                        transition={{ duration: 0.22, ease: [0.4,0,0.2,1] }}
                        className="card w-full max-w-lg p-6 space-y-5" style={{ boxShadow: 'var(--shadow-lg)' }}>
                        <div className="flex items-center justify-between">
                            <h3 className="font-bold text-base" style={{ color: 'var(--text-primary)' }}>{parentId ? 'Add Subtask' : 'New Task'}</h3>
                            <button onClick={onClose} className="action-btn">✕</button>
                        </div>
                        <input ref={ref} value={content} onChange={e => setContent(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) submit(); if (e.key === 'Escape') onClose(); }}
                            className="input-field text-[15px] font-medium" placeholder="What needs to get done?" />
                        <div className="grid grid-cols-2 gap-3">
                            <div className="space-y-2">
                                <div className="section-label">Priority</div>
                                <div className="flex gap-1.5">
                                    {['High', 'Medium', 'Low'].map(p => (
                                        <button key={p} onClick={() => setPriority(p)}
                                            className="flex-1 py-2 rounded-xl text-xs font-bold transition-all"
                                            style={{ background: priority === p ? PC[p].bg : 'var(--bg-overlay)', color: priority === p ? PC[p].color : 'var(--text-disabled)', border: `1px solid ${priority === p ? PC[p].color + '44' : 'var(--border)'}` }}>
                                            {p}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="space-y-2">
                                <div className="section-label">Due Date</div>
                                <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} className="input-field py-2 text-sm" />
                            </div>
                        </div>
                        <div className="space-y-2">
                            <div className="section-label">Tags</div>
                            <input value={tags} onChange={e => setTags(e.target.value)} className="input-field py-2.5 text-sm" placeholder="design, backend, review..." />
                        </div>
                        <div className="space-y-2">
                            <div className="section-label">Notes <span style={{ color: 'var(--text-disabled)', fontWeight: 400, letterSpacing: 0, textTransform: 'none' }}>— markdown ok</span></div>
                            <textarea value={notes} onChange={e => setNotes(e.target.value)} className="input-field text-sm resize-none" rows={3} placeholder="Context, links, details..." />
                        </div>
                        {!parentId && (
                            <label className="flex items-center gap-3 cursor-pointer px-1">
                                <div className="check" onClick={(e) => { e.preventDefault(); setIsAch(!isAch); }}
                                    style={isAch ? { background: 'var(--warning)', borderColor: 'var(--warning)' } : {}}>
                                    {isAch && <span style={{ color: 'var(--bg-base)', fontSize: 10, fontWeight: 900 }}>★</span>}
                                </div>
                                <span className="text-sm font-medium" style={{ color: 'var(--text-secondary)' }}>Mark as achievement / win</span>
                            </label>
                        )}
                        <div className="flex gap-2.5">
                            <button onClick={onClose} className="btn btn-ghost flex-1">Cancel</button>
                            <button onClick={submit} className="btn btn-gold flex-1" style={{ fontSize: 13 }}>Create</button>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // ─── TASK NODE ────────────────────────────────────────────────────────────
        const TaskNode = memo(({ task, depth = 0, safeCall, isFocused, onFocus, selMode, isSelected, onSelect, timers, setTimers, onAddSub }) => {
            const [expanded, setExpanded] = useState(false);
            const [localNotes, setLocalNotes] = useState(task.notes || '');
            const [editing, setEditing] = useState(false);
            const [editVal, setEditVal] = useState(task.content || '');
            const [timerOn, setTimerOn] = useState(false);
            const [ctx, setCtx] = useState(null);
            const [checking, setChecking] = useState(false);
            const intervalRef = useRef(null);
            const saveRef = useRef(null);
            const isDone = task.status === 'Completed';
            const pc = PC[task.priority] || PC.Medium;
            const due = fmtRelDate(task.due_date);

            // Initialize timer from persisted time_spent
            useEffect(() => {
                if (task.time_spent && !timers[task.id]) {
                    setTimers(p => ({ ...p, [task.id]: task.time_spent }));
                }
            }, [task.id, task.time_spent]);

            useEffect(() => {
                if (timerOn) {
                    intervalRef.current = setInterval(() => setTimers(p => ({ ...p, [task.id]: (p[task.id] || 0) + 1 })), 1000);
                    // Auto-save every 30s while timer is running
                    saveRef.current = setInterval(() => {
                        setTimers(p => { const v = p[task.id]; if (v) safeCall('update_task_time', task.id, v); return p; });
                    }, 30000);
                } else {
                    clearInterval(intervalRef.current);
                    clearInterval(saveRef.current);
                    // Save on stop
                    const v = timers[task.id];
                    if (v) safeCall('update_task_time', task.id, v);
                }
                return () => { clearInterval(intervalRef.current); clearInterval(saveRef.current); };
            }, [timerOn]);

            const handleCheck = () => {
                setChecking(true);
                setTimeout(() => { safeCall('update_task_status', task.id, isDone ? 'Pending' : 'Completed'); setChecking(false); }, 350);
            };
            const saveEdit = () => { if (editVal.trim() !== task.content) safeCall('update_task', task.id, editVal, localNotes, task.links || ''); setEditing(false); };
            const handleCtx = (e) => { e.preventDefault(); e.stopPropagation(); setCtx({ x: Math.min(e.clientX, window.innerWidth - 230), y: Math.min(e.clientY, window.innerHeight - 300) }); };

            return (
                <div className={`relative ${depth > 0 ? 'ml-6' : ''}`}>
                    {depth > 0 && <div style={{ position: 'absolute', left: -12, top: 0, bottom: 0, width: 1, background: 'var(--border)' }} />}
                    <div className={`task-row ${isDone ? 'done' : ''} ${isFocused ? 'focused no-dim' : ''} can-dim`}
                        style={isFocused ? { boxShadow: 'var(--shadow-md)' } : {}}
                        onContextMenu={handleCtx}>
                        {!isDone && <div className="priority-stripe" style={{ background: pc.stripe }} />}
                        {selMode && (
                            <button onClick={onSelect} style={{
                                width: 16, height: 16, borderRadius: 4, flexShrink: 0, marginTop: 2,
                                border: `1.5px solid ${isSelected ? 'var(--warning)' : 'var(--border-light)'}`,
                                background: isSelected ? 'var(--warning)' : 'transparent',
                                cursor: 'pointer', transition: 'all 0.15s',
                            }}>
                                {isSelected && <span style={{ color: 'var(--bg-base)', fontSize: 9, display: 'block', textAlign: 'center', fontWeight: 900 }}>✓</span>}
                            </button>
                        )}
                        <button onClick={handleCheck} className={`check mt-0.5 ${isDone ? 'done' : ''} ${checking ? 'check-pop' : ''}`} style={{ flexShrink: 0 }}>
                            {isDone && <span style={{ color: 'var(--bg-base)', fontSize: 10, fontWeight: 900 }}>✓</span>}
                        </button>
                        <div className="flex-1 min-w-0 space-y-1.5">
                            <div className="flex items-start gap-3">
                                {editing ? (
                                    <input value={editVal} onChange={e => setEditVal(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') setEditing(false); }}
                                        onBlur={saveEdit} autoFocus
                                        className="flex-1 bg-transparent text-sm font-medium border-b"
                                        style={{ color: 'var(--text-primary)', borderColor: 'var(--warning)' }} />
                                ) : (
                                    <span className="task-title text-sm font-medium leading-snug cursor-default flex-1"
                                        style={{ color: 'var(--text-primary)' }}
                                        onClick={() => setExpanded(!expanded)}
                                        onDoubleClick={() => { setEditing(true); setExpanded(false); }}>
                                        {task.is_achievement && <span style={{ color: 'var(--warning)', marginRight: 4 }}>★</span>}
                                        {task.content}
                                    </span>
                                )}
                                <div className="flex items-center gap-2 flex-shrink-0 mt-0.5">
                                    {(timers[task.id] > 0 || task.time_spent > 0) && (
                                        <span className={`mono text-xs font-semibold px-2 py-0.5 rounded-lg ${timerOn ? 'breathe' : ''}`}
                                            style={{ background: timerOn ? 'var(--accent-hover-dim)' : 'var(--bg-overlay)', color: timerOn ? 'var(--accent-hover)' : 'var(--text-disabled)', border: `1px solid ${timerOn ? 'rgba(184,160,232,0.2)' : 'var(--border)'}` }}>
                                            {fmt(timers[task.id] || task.time_spent)}
                                        </span>
                                    )}
                                    <div className="task-actions">
                                        <button className="action-btn" onClick={() => setTimerOn(!timerOn)}
                                            style={timerOn ? { background: 'var(--accent-hover-dim)', color: 'var(--accent-hover)' } : {}}>⏱</button>
                                        {onFocus && !isFocused && !isDone && <button className="action-btn" onClick={onFocus}>⌖</button>}
                                        {isFocused && <button className="action-btn" onClick={onFocus} style={{ color: 'var(--warning)' }}>⌖</button>}
                                        <button className="action-btn" onClick={handleCtx}>···</button>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2.5 flex-wrap">
                                {task.priority && task.priority !== 'Medium' && (
                                    <span className="badge" style={{ background: pc.bg, color: pc.color, fontSize: 9 }}>{pc.label}</span>
                                )}
                                {due && (
                                    <span className="text-xs font-semibold flex items-center gap-1"
                                        style={{ color: due.cls === 'overdue' ? 'var(--danger)' : due.cls === 'due-soon' ? 'var(--warning)' : 'var(--text-disabled)' }}>
                                        {due.label}
                                    </span>
                                )}
                                {task.tags && task.tags.filter && task.tags.filter(Boolean).map(tag => (
                                    <span key={tag} className="tag">#{tag}</span>
                                ))}
                                {task.children && task.children.length > 0 && (
                                    <span className="text-xs mono" style={{ color: 'var(--text-disabled)' }}>
                                        {task.children.filter(c => c.status === 'Completed').length}/{task.children.length} done
                                    </span>
                                )}
                            </div>
                            {task.children && task.children.length > 0 && (
                                <div className="progress-track" style={{ width: 80 }}>
                                    <div className="progress-fill" style={{ width: `${(task.children.filter(c => c.status === 'Completed').length / task.children.length) * 100}%`, background: 'var(--success)' }} />
                                </div>
                            )}
                            <AnimatePresence>
                                {expanded && (
                                    <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} style={{ overflow: 'hidden' }}>
                                        <div className="pt-3 space-y-3">
                                            {task.notes && <div className="md" dangerouslySetInnerHTML={{ __html: md(task.notes) }} />}
                                            <textarea value={localNotes} onChange={e => setLocalNotes(e.target.value)}
                                                onBlur={() => safeCall('update_task', task.id, task.content, localNotes, task.links || '')}
                                                className="w-full resize-none rounded-xl p-3 text-xs mono"
                                                style={{ background: 'var(--bg-overlay)', border: '1px solid var(--border)', color: 'var(--text-primary)', minHeight: 70, lineHeight: 1.8 }}
                                                placeholder="Add notes... (Markdown supported)" />
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => onAddSub(task.id)} className="btn btn-ghost" style={{ fontSize: 11, padding: '6px 12px' }}>+ Subtask</button>
                                                <button onClick={() => { setEditing(true); setExpanded(false); }} className="btn btn-ghost" style={{ fontSize: 11, padding: '6px 12px' }}>Edit</button>
                                                <button onClick={() => safeCall('delete_task', task.id)} className="btn btn-danger ml-auto" style={{ fontSize: 11, padding: '6px 12px' }}>Delete</button>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            {/* Always render children — subtasks stay visible even when completed */}
                            {task.children && task.children.length > 0 && (
                                <div className="space-y-0.5 mt-1">
                                    {task.children.map(c => <TaskNode key={c.id} task={c} depth={depth + 1} safeCall={safeCall} timers={timers} setTimers={setTimers} onAddSub={onAddSub} />)}
                                </div>
                            )}
                        </div>
                    </div>
                    {ctx && <CtxMenu pos={ctx} onClose={() => setCtx(null)} items={[
                        { heading: 'Actions' },
                        { icon: '✏', label: 'Edit title', action: () => { setEditing(true); setExpanded(false); } },
                        { icon: '↳', label: 'Add subtask', action: () => onAddSub(task.id) },
                        { icon: isDone ? '↩' : '✓', label: isDone ? 'Mark pending' : 'Mark complete', action: () => safeCall('update_task_status', task.id, isDone ? 'Pending' : 'Completed') },
                        'sep',
                        { icon: task.is_achievement ? '★' : '☆', label: task.is_achievement ? 'Remove achievement' : 'Mark as achievement', action: () => safeCall('update_task_achievement', task.id, !task.is_achievement) },
                        { icon: '⌖', label: isFocused ? 'Exit focus' : 'Focus mode', action: onFocus || (() => {}) },
                        { icon: '⏱', label: timerOn ? 'Stop timer' : 'Start timer', action: () => setTimerOn(!timerOn) },
                        'sep',
                        { icon: '✕', label: 'Delete task', danger: true, action: () => safeCall('delete_task', task.id) },
                    ]} />}
                </div>
            );
        });

        // ─── QUICK CAPTURE ───────────────────────────────────────────────────────
        const QuickCapture = ({ onAdd, onClose }) => {
            const [val, setVal] = useState('');
            const [hint, setHint] = useState('');
            const ref = useRef(null);
            useEffect(() => { ref.current?.focus(); }, []);
            const parseQuick = (text) => {
                let content = text, priority = 'Medium', tags = [], due = '', isAch = false;
                const pM = text.match(/!(?:high|h)\b/i); if (pM) { priority = 'High'; content = content.replace(pM[0], ''); }
                const pL = text.match(/!(?:low|l)\b/i); if (pL) { priority = 'Low'; content = content.replace(pL[0], ''); }
                const wM = text.match(/!(?:win|achievement|ach)\b/i); if (wM) { isAch = true; content = content.replace(wM[0], ''); }
                const tagMs = [...text.matchAll(/#(\w+)/g)]; tagMs.forEach(m => { tags.push(m[1]); content = content.replace(m[0], ''); });
                const dM = text.match(/due:(\S+)/i);
                if (dM) {
                    const dv = dM[1].toLowerCase();
                    const d = new Date();
                    if (dv === 'today') due = d.toISOString().slice(0,10);
                    else if (dv === 'tomorrow') { d.setDate(d.getDate() + 1); due = d.toISOString().slice(0,10); }
                    else if (dv.match(/\d{4}-\d{2}-\d{2}/)) due = dv;
                    content = content.replace(dM[0], '');
                }
                return { content: content.trim(), priority, tags, due_date: due, is_achievement: isAch };
            };
            useEffect(() => {
                const p = parseQuick(val);
                const hints = [];
                if (p.priority !== 'Medium') hints.push(`${p.priority} priority`);
                if (p.is_achievement) hints.push('achievement');
                if (p.tags.length) hints.push(p.tags.map(t => `#${t}`).join(' '));
                if (p.due_date) hints.push(`due ${p.due_date}`);
                setHint(hints.join(' · '));
            }, [val]);
            const submit = () => { if (!val.trim()) return; onAdd(parseQuick(val)); onClose(); };
            return (
                <div className="modal-overlay" style={{ alignItems: 'flex-end', paddingBottom: '10vh' }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <motion.div initial={{ y: 30, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: 20, opacity: 0 }} className="quick-bar">
                        <div className="card p-3 space-y-2" style={{ boxShadow: 'var(--shadow-lg)' }}>
                            <div className="flex items-center gap-3">
                                <span style={{ color: 'var(--warning)', fontSize: 18 }}>⚡</span>
                                <input ref={ref} value={val} onChange={e => setVal(e.target.value)}
                                    onKeyDown={e => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') onClose(); }}
                                    className="flex-1 bg-transparent text-sm font-medium"
                                    style={{ color: 'var(--text-primary)' }}
                                    placeholder="Quick capture... (!high, #tag, due:tomorrow, !win)" />
                                <kbd className="kbd">↵</kbd>
                            </div>
                            {hint && <div className="text-xs px-7" style={{ color: 'var(--warning)', opacity: 0.7 }}>{hint}</div>}
                            <div className="text-xs px-7" style={{ color: 'var(--text-disabled)' }}>
                                <span className="kbd">!high</span> <span className="kbd">#tag</span> <span className="kbd">due:tomorrow</span> <span className="kbd">!win</span>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // ─── MISSIONS PAGE ───────────────────────────────────────────────────────
        const PAGE_SIZE = 25;
        const MissionsPage = ({ data, safeCall, focusId, setFocusId, timers, setTimers }) => {
            const [showAdd, setShowAdd] = useState(false);
            const [showQuick, setShowQuick] = useState(false);
            const [addParentId, setAddParentId] = useState(0);
            const [selMode, setSelMode] = useState(false);
            const [selected, setSelected] = useState([]);
            const [view, setView] = useState('list');
            const [filter, setFilter] = useState('all');
            const [showDone, setShowDone] = useState(false);
            const [donePage, setDonePage] = useState(1);
            const [search, setSearch] = useState('');
            const [showSidebar, setShowSidebar] = useState(true);

            useEffect(() => {
                const h = (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setShowQuick(true); } };
                window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
            }, []);

            const buildTree = (tasks, pid = 0) => tasks.filter(t => t.parent_id === pid).map(t => ({ ...t, children: buildTree(tasks, t.id) }));

            // Keep subtasks (parent_id !== 0) regardless of completion status
            // Only hide completed TOP-LEVEL tasks (they go to the Completed section)
            const filtered = useMemo(() => {
                let t = data.tasks.filter(t => {
                    if (t.parent_id !== 0) return true; // always keep subtasks in tree
                    return t.status !== 'Completed';
                });
                if (search) {
                    const q = search.toLowerCase();
                    const matchIds = new Set();
                    t.forEach(task => {
                        if (task.content.toLowerCase().includes(q) || task.tags?.some(tag => tag.toLowerCase().includes(q))) {
                            matchIds.add(task.id);
                            // include ancestors
                            let pid = task.parent_id;
                            while (pid) { matchIds.add(pid); const p = t.find(x => x.id === pid); pid = p ? p.parent_id : 0; }
                        }
                    });
                    t = t.filter(task => matchIds.has(task.id));
                }
                const now = new Date(); now.setHours(0,0,0,0);
                if (filter === 'today') t = t.filter(t => t.parent_id !== 0 || (t.due_date && new Date(t.due_date) <= now));
                if (filter === 'high') t = t.filter(t => t.parent_id !== 0 || t.priority === 'High');
                if (filter === 'nodate') t = t.filter(t => t.parent_id !== 0 || !t.due_date);
                return t;
            }, [data.tasks, filter, search]);

            const tree = useMemo(() => buildTree(filtered), [filtered]);
            const groups = useMemo(() => groupByDate(filtered.filter(t => t.parent_id === 0)), [filtered]);
            const done = useMemo(() => [...data.tasks.filter(t => t.status === 'Completed' && t.parent_id === 0)].sort((a, b) => new Date(b.completed_at || 0) - new Date(a.completed_at || 0)), [data.tasks]);
            const pagedDone = done.slice(0, donePage * PAGE_SIZE);

            const stats = useMemo(() => {
                const total = data.tasks.length, comp = data.tasks.filter(t => t.status === 'Completed').length;
                const overdue = data.tasks.filter(t => { if (!t.due_date || t.status === 'Completed') return false; return new Date(t.due_date) < new Date(); }).length;
                return { total, comp, active: total - comp, overdue, momentum: total > 0 ? Math.round((comp / total) * 100) : 0 };
            }, [data.tasks]);

            const handleAdd = ({ content, priority, due_date, notes, tags, is_achievement }) => {
                safeCall('add_task', content, 0, notes || '', tags?.join(',') || '', priority, due_date || '', addParentId, is_achievement || false);
            };
            const toggleSel = (id) => setSelected(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
            const bulkAction = (action) => {
                selected.forEach(id => { if (action === 'complete') safeCall('update_task_status', id, 'Completed'); if (action === 'delete') safeCall('delete_task', id); });
                setSelected([]); setSelMode(false);
            };

            const FILTERS = [{ id: 'all', l: 'All' }, { id: 'today', l: 'Today' }, { id: 'high', l: 'High' }, { id: 'nodate', l: 'Unscheduled' }];
            const GROUP_COLORS = { Overdue: 'var(--danger)', Today: 'var(--warning)', Tomorrow: 'var(--accent-pressed)', 'This Week': 'var(--success)', Later: 'var(--text-disabled)', 'No Date': 'var(--text-disabled)' };

            return (
                <div className="flex-1 flex overflow-hidden">
                    <div className="flex-1 flex flex-col overflow-hidden">
                        {/* Header */}
                        <div className="flex-shrink-0 px-7 pt-7 pb-4 space-y-4">
                            <div className="flex items-center justify-between gap-4">
                                <div className="flex items-center gap-3">
                                    <h2 className="text-xl font-bold tracking-tight" style={{ color: 'var(--text-primary)' }}>Tasks</h2>
                                    <span className="section-label">{stats.active} active · {stats.comp} done</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="relative">
                                        <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-disabled)', fontSize: 13 }}>⌕</span>
                                        <input value={search} onChange={e => setSearch(e.target.value)} className="input-field text-sm" style={{ paddingLeft: 30, height: 36, width: 180 }} placeholder="Search..." />
                                    </div>
                                    <button onClick={() => setShowQuick(true)} className="btn btn-ghost" style={{ fontSize: 11, height: 36, gap: 4 }}>
                                        ⚡ Quick <span className="kbd" style={{ fontSize: 9 }}>Ctrl+K</span>
                                    </button>
                                    <button onClick={() => { setSelMode(!selMode); setSelected([]); }}
                                        className="btn btn-ghost" style={{ fontSize: 11, height: 36, background: selMode ? 'var(--warning-dim)' : 'var(--bg-overlay)', color: selMode ? 'var(--warning)' : 'var(--text-secondary)' }}>
                                        {selMode ? '✕ Cancel' : '☑ Select'}
                                    </button>
                                    <button onClick={() => setShowSidebar(!showSidebar)} className="btn btn-ghost" style={{ fontSize: 11, height: 36 }}>⊞</button>
                                </div>
                            </div>
                            {stats.overdue > 0 && (
                                <div className="flex items-center gap-2.5 px-3.5 py-2 rounded-xl text-sm font-semibold pulse-ring"
                                    style={{ background: 'var(--danger-dim)', color: 'var(--danger)', border: '1px solid rgba(232,112,112,0.2)' }}>
                                    {stats.overdue} overdue {stats.overdue === 1 ? 'task' : 'tasks'}
                                </div>
                            )}
                            <div className="flex items-center gap-2">
                                <div className="flex items-center gap-0.5 p-1 rounded-xl" style={{ background: 'var(--bg-elevated)', border: '1px solid var(--border)' }}>
                                    {FILTERS.map(f => (
                                        <button key={f.id} onClick={() => setFilter(f.id)}
                                            className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                            style={{ background: filter === f.id ? 'var(--bg-base)' : 'transparent', color: filter === f.id ? 'var(--text-primary)' : 'var(--text-disabled)', boxShadow: filter === f.id ? 'var(--shadow-sm)' : 'none' }}>
                                            {f.l}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex items-center gap-0.5 p-1 rounded-xl ml-auto" style={{ background: 'var(--bg-elevated)', border: '1px solid var(--border)' }}>
                                    {[['list', 'List'], ['grouped', 'Grouped']].map(([v, l]) => (
                                        <button key={v} onClick={() => setView(v)}
                                            className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                            style={{ background: view === v ? 'var(--bg-base)' : 'transparent', color: view === v ? 'var(--text-primary)' : 'var(--text-disabled)' }}>
                                            {l}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="space-y-1.5">
                                <div className="flex justify-between text-xs" style={{ color: 'var(--text-disabled)' }}>
                                    <span>Momentum</span><span className="mono font-bold" style={{ color: 'var(--warning)' }}>{stats.momentum}%</span>
                                </div>
                                <div className="progress-track" style={{ height: 4 }}>
                                    <div className="progress-fill" style={{ width: `${stats.momentum}%`, background: `linear-gradient(90deg, var(--warning), var(--accent-pressed))` }} />
                                </div>
                            </div>
                        </div>

                        {/* Task list */}
                        <div className="flex-1 overflow-y-auto px-5 pb-28 space-y-0.5">
                            {view === 'grouped' ? (
                                Object.entries(groups).filter(([, t]) => t.length > 0).map(([grp, tasks]) => (
                                    <div key={grp} className="mb-5">
                                        <div className="flex items-center gap-2 px-3 py-2 section-label">
                                            <div style={{ width: 6, height: 6, borderRadius: '50%', background: GROUP_COLORS[grp] || 'var(--text-disabled)', flexShrink: 0 }} />
                                            {grp} <span className="ml-auto">{tasks.length}</span>
                                        </div>
                                        {buildTree(tasks.concat(data.tasks.filter(t => t.parent_id !== 0))).map(task => (
                                            <TaskNode key={task.id} task={task} safeCall={safeCall}
                                                isFocused={focusId === task.id} onFocus={() => setFocusId(focusId === task.id ? null : task.id)}
                                                selMode={selMode} isSelected={selected.includes(task.id)} onSelect={() => toggleSel(task.id)}
                                                timers={timers} setTimers={setTimers} onAddSub={(pid) => { setAddParentId(pid); setShowAdd(true); }} />
                                        ))}
                                    </div>
                                ))
                            ) : tree.length === 0 ? (
                                <div className="empty">
                                    <div style={{ fontSize: 40 }}>✓</div>
                                    <div className="text-sm font-bold" style={{ color: 'var(--text-disabled)' }}>Clear queue</div>
                                    <div className="text-xs" style={{ color: 'var(--text-disabled)' }}>Use ⚡ quick capture or + below</div>
                                </div>
                            ) : (
                                tree.map(task => (
                                    <TaskNode key={task.id} task={task} safeCall={safeCall}
                                        isFocused={focusId === task.id} onFocus={() => setFocusId(focusId === task.id ? null : task.id)}
                                        selMode={selMode} isSelected={selected.includes(task.id)} onSelect={() => toggleSel(task.id)}
                                        timers={timers} setTimers={setTimers} onAddSub={(pid) => { setAddParentId(pid); setShowAdd(true); }} />
                                ))
                            )}

                            {/* Completed section */}
                            {done.length > 0 && (
                                <div className="mt-6 pt-4" style={{ borderTop: '1px solid var(--border)' }}>
                                    <button onClick={() => setShowDone(!showDone)}
                                        className="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl section-label hover:bg-bg2 transition-colors">
                                        <span style={{ transition: 'transform 0.2s', display: 'inline-block', transform: showDone ? 'rotate(90deg)' : 'rotate(0)' }}>▶</span>
                                        Completed
                                        <span className="ml-auto font-bold">{done.length}</span>
                                    </button>
                                    <AnimatePresence>
                                        {showDone && (
                                            <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} style={{ overflow: 'hidden' }}>
                                                <div className="mt-2 space-y-0.5 opacity-45">
                                                    {pagedDone.map(task => (
                                                        <div key={task.id} className="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-bg2 transition-colors">
                                                            <button onClick={() => safeCall('update_task_status', task.id, 'Pending')}
                                                                className="check done" style={{ width: 16, height: 16 }}>
                                                                <span style={{ color: 'var(--bg-base)', fontSize: 9, fontWeight: 900 }}>✓</span>
                                                            </button>
                                                            <span className="text-sm flex-1 line-through" style={{ color: 'var(--text-disabled)' }}>
                                                                {task.is_achievement && <span style={{ color: 'var(--warning)', marginRight: 4 }}>★</span>}
                                                                {task.content}
                                                            </span>
                                                            {task.completed_at && <span className="text-xs mono" style={{ color: 'var(--text-disabled)' }}>{fmtDate(task.completed_at)}</span>}
                                                            <button onClick={() => safeCall('delete_task', task.id)} className="action-btn">✕</button>
                                                        </div>
                                                    ))}
                                                    {pagedDone.length < done.length && (
                                                        <button onClick={() => setDonePage(p => p + 1)}
                                                            className="btn btn-ghost w-full mt-2" style={{ fontSize: 11 }}>
                                                            Show more ({done.length - pagedDone.length} remaining)
                                                        </button>
                                                    )}
                                                </div>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                </div>
                            )}
                        </div>

                        {!selMode && (
                            <motion.button onClick={() => { setAddParentId(0); setShowAdd(true); }}
                                whileHover={{ scale: 1.05, boxShadow: '0 12px 40px var(--warning-glow)' }} whileTap={{ scale: 0.96 }}
                                className="fixed bottom-8 right-8 z-50 flex items-center gap-2 font-bold text-sm rounded-2xl px-5 py-3.5"
                                style={{ background: 'var(--warning)', color: 'var(--bg-base)', boxShadow: '0 8px 32px var(--warning-glow)' }}>
                                + New Task
                            </motion.button>
                        )}
                    </div>

                    {/* Right sidebar */}
                    <AnimatePresence>
                        {showSidebar && (
                            <motion.div initial={{ width: 0, opacity: 0 }} animate={{ width: 280, opacity: 1 }} exit={{ width: 0, opacity: 0 }}
                                transition={{ duration: 0.25, ease: [0.4,0,0.2,1] }}
                                className="flex-shrink-0 overflow-y-auto overflow-x-hidden"
                                style={{ borderLeft: '1px solid var(--border)', background: 'var(--bg-base)' }}>
                                <div className="p-4 space-y-4 w-[280px]">
                                    <DailyFocusWidget tasks={data.tasks} safeCall={safeCall} />
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <AnimatePresence>
                        {showAdd && <AddTaskModal onClose={() => setShowAdd(false)} parentId={addParentId} onAdd={handleAdd} />}
                    </AnimatePresence>
                    <AnimatePresence>
                        {showQuick && <QuickCapture onClose={() => setShowQuick(false)} onAdd={handleAdd} />}
                    </AnimatePresence>

                    <AnimatePresence>
                        {selMode && selected.length > 0 && (
                            <motion.div initial={{ y: 80 }} animate={{ y: 0 }} exit={{ y: 80 }}
                                className="fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 px-5 py-3 rounded-2xl z-50"
                                style={{ background: 'var(--bg-base)', border: '1px solid var(--border-light)', boxShadow: 'var(--shadow-lg)' }}>
                                <span className="text-sm font-bold" style={{ color: 'var(--warning)' }}>{selected.length} selected</span>
                                <div style={{ width: 1, height: 18, background: 'var(--border)' }} />
                                <button onClick={() => bulkAction('complete')} className="btn" style={{ background: 'var(--success-dim)', color: 'var(--success)', padding: '7px 14px', fontSize: 11 }}>✓ Complete</button>
                                <button onClick={() => bulkAction('delete')} className="btn" style={{ background: 'var(--danger-dim)', color: 'var(--danger)', padding: '7px 14px', fontSize: 11 }}>✕ Delete</button>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        // ─── HISTORY PAGE ────────────────────────────────────────────────────────
        const HistoryPage = ({ data, safeCall }) => {
            const [search, setSearch] = useState('');
            const [filter, setFilter] = useState('all');
            const [sortBy, setSortBy] = useState('date_desc');
            const [editingItem, setEditingItem] = useState(null);
            const [page, setPage] = useState(1);

            const handleSaveLog = () => {
                if (!editingItem) return;
                safeCall('update_task', editingItem.id, editingItem.content, editingItem.notes, editingItem.links || '');
                setEditingItem(null);
            };

            const IC = { High: { dot: 'var(--danger)', ring: true }, Medium: { dot: 'var(--warning)', ring: false }, Low: { dot: 'var(--success)', ring: false } };

            const completedItems = useMemo(() => {
                let items = data.tasks.filter(t => t.status === 'Completed').map(t => ({
                    ...t, dateStr: t.completed_at || t.timestamp, impact: t.priority
                }));
                // Filter
                if (filter === 'tasks') items = items.filter(i => !i.is_achievement);
                if (filter === 'achievements') items = items.filter(i => i.is_achievement);
                if (search.trim()) {
                    const q = search.toLowerCase();
                    items = items.filter(i => i.content.toLowerCase().includes(q) || (i.notes && i.notes.toLowerCase().includes(q)));
                }
                // Sort
                items.sort((a, b) => {
                    if (sortBy === 'date_asc') return new Date(a.dateStr || 0) - new Date(b.dateStr || 0);
                    if (sortBy === 'name_asc') return a.content.localeCompare(b.content);
                    if (sortBy === 'name_desc') return b.content.localeCompare(a.content);
                    return new Date(b.dateStr || 0) - new Date(a.dateStr || 0);
                });
                return items;
            }, [data.tasks, filter, search, sortBy]);

            const pagedItems = completedItems.slice(0, page * PAGE_SIZE);

            const byDate = useMemo(() => {
                const G = {};
                if (sortBy.startsWith('date')) {
                    pagedItems.forEach(a => {
                        const d = a.dateStr ? new Date(a.dateStr).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : 'Earlier';
                        if (!G[d]) G[d] = [];
                        G[d].push(a);
                    });
                } else {
                    G['All Items'] = pagedItems;
                }
                return G;
            }, [pagedItems, sortBy]);

            return (
                <div className="flex-1 overflow-y-auto px-7 py-7 space-y-6 max-w-3xl">
                    <header className="flex items-end justify-between">
                        <div>
                            <h2 className="text-xl font-bold tracking-tight" style={{ color: 'var(--text-primary)' }}>Logbook</h2>
                            <p className="text-sm mt-0.5" style={{ color: 'var(--text-disabled)' }}>{completedItems.length} items recorded</p>
                        </div>
                    </header>
                    <div className="flex gap-3 text-sm">
                        <input value={search} onChange={e => { setSearch(e.target.value); setPage(1); }}
                            className="input-field py-1.5 px-3 flex-1 text-sm bg-transparent" placeholder="Search history..." style={{ border: '1px solid var(--border)' }} />
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                            className="input-field py-1 px-2 text-xs bg-transparent" style={{ width: 'auto', border: '1px solid var(--border)', height: 34, borderRadius: 8 }}>
                            <option value="date_desc">Newest First</option>
                            <option value="date_asc">Oldest First</option>
                            <option value="name_asc">Name (A-Z)</option>
                            <option value="name_desc">Name (Z-A)</option>
                        </select>
                        <div className="flex gap-1.5 flex-shrink-0">
                            {[['all', 'All'], ['tasks', 'Tasks'], ['achievements', 'Achievements']].map(([v, l]) => (
                                <button key={v} onClick={() => { setFilter(v); setPage(1); }}
                                    className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                                    style={{ background: filter === v ? 'var(--bg-elevated)' : 'transparent', color: filter === v ? 'var(--text-primary)' : 'var(--text-disabled)', border: `1px solid ${filter === v ? 'var(--border-light)' : 'transparent'}` }}>
                                    {l}
                                </button>
                            ))}
                        </div>
                    </div>
                    {Object.entries(byDate).map(([date, items]) => (
                        <div key={date} className="space-y-2">
                            <div className="section-label px-1">{date}</div>
                            {items.map(a => {
                                const ic = IC[a.impact] || IC.Medium;
                                return (
                                    <div key={a.id} className="group card-inset flex items-start gap-4 p-4 hover:border-border-h transition-all"
                                        onDoubleClick={() => setEditingItem(a)}>
                                        <div className={`mt-1.5 flex-shrink-0 rounded-full ${ic.ring ? 'pulse-ring' : ''}`}
                                            style={{ width: 8, height: 8, background: a.is_achievement ? 'var(--warning)' : ic.dot }} />
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm font-semibold leading-snug" style={{ color: 'var(--text-primary)' }}>
                                                {a.is_achievement ? <span style={{ color: 'var(--warning)', marginRight: 6 }}>★</span> : <span style={{ color: 'var(--success)', marginRight: 6 }}>✓</span>}
                                                {a.content}
                                            </p>
                                            {a.notes && <div className="text-xs mt-2 leading-relaxed md" style={{ color: 'var(--text-secondary)' }} dangerouslySetInnerHTML={{ __html: md(a.notes) }} />}
                                            {(a.due_date || (a.tags && a.tags.length > 0) || a.time_spent > 0) && (
                                                <div className="flex items-center gap-2 mt-2 flex-wrap">
                                                    {a.time_spent > 0 && <span className="mono text-xs font-semibold px-1.5 py-0.5 rounded" style={{ background: 'var(--accent-hover-dim)', color: 'var(--accent-hover)' }}>⏱ {fmtHuman(a.time_spent)}</span>}
                                                    {a.due_date && <span className="text-xs font-semibold" style={{ color: 'var(--text-disabled)' }}>{a.due_date}</span>}
                                                    {a.tags && Array.isArray(a.tags) && a.tags.filter(Boolean).map(tag => <span key={tag} className="tag">#{tag}</span>)}
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex items-center gap-2 flex-shrink-0">
                                            <button onClick={() => setEditingItem(a)} className="action-btn opacity-0 group-hover:opacity-100" style={{ fontSize: 11 }}>Edit</button>
                                            <button onClick={() => safeCall('update_task_status', a.id, 'Pending')}
                                                className="action-btn opacity-0 group-hover:opacity-100" style={{ fontSize: 10 }}>Undo</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    ))}
                    {Object.keys(byDate).length === 0 && <div className="empty"><div style={{ fontSize: 40 }}>📜</div><div className="text-sm font-bold" style={{ color: 'var(--text-disabled)' }}>No history found</div></div>}
                    {pagedItems.length < completedItems.length && (
                        <button onClick={() => setPage(p => p + 1)} className="btn btn-ghost w-full" style={{ fontSize: 11 }}>
                            Show more ({completedItems.length - pagedItems.length} remaining)
                        </button>
                    )}

                    {editingItem && (
                        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) setEditingItem(null); }}>
                            <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="card p-6 space-y-4 shadow-lg w-full max-w-lg" style={{ background: 'var(--bg-base)' }}>
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-bold" style={{ color: 'var(--text-primary)' }}>Edit Details</h3>
                                    <button onClick={() => setEditingItem(null)} style={{ color: 'var(--text-disabled)', background: 'none', border: 'none', cursor: 'pointer' }}>✕</button>
                                </div>
                                <input value={editingItem.content} onChange={e => setEditingItem({ ...editingItem, content: e.target.value })}
                                    className="input-field w-full font-bold" placeholder="Title..." />
                                <textarea value={editingItem.notes || ''} onChange={e => setEditingItem({ ...editingItem, notes: e.target.value })}
                                    className="input-field w-full resize-none text-xs mono" style={{ height: 120, lineHeight: 1.6 }}
                                    placeholder="Notes, context, markdown..." />
                                <div className="flex gap-2.5 pt-2">
                                    <button onClick={() => setEditingItem(null)} className="btn btn-ghost flex-1">Cancel</button>
                                    <button onClick={handleSaveLog} className="btn btn-gold flex-1">Save</button>
                                </div>
                            </motion.div>
                        </div>
                    )}
                </div>
            );
        };

        // ─── ANALYTICS PAGE ──────────────────────────────────────────────────────
        const AnalyticsPage = ({ data, safeCall }) => {
            const [timeVal, setTimeVal] = useState('24');
            const [timeUnit, setTimeUnit] = useState('hours');
            const [recap, setRecap] = useState('');
            const [loading, setLoading] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);

            const stats = useMemo(() => {
                const total = data.tasks.length, done = data.tasks.filter(t => t.status === 'Completed').length;
                const overdue = data.tasks.filter(t => { if (!t.due_date || t.status === 'Completed') return false; return new Date(t.due_date) < new Date(); }).length;
                const high = data.tasks.filter(t => t.priority === 'High' && t.status !== 'Completed').length;
                const wins = data.tasks.filter(t => t.is_achievement).length;
                return { total, done, active: total - done, overdue, high, wins, momentum: total > 0 ? Math.round((done / total) * 100) : 0 };
            }, [data]);

            const priDist = useMemo(() => {
                const C = { High: 0, Medium: 0, Low: 0 };
                data.tasks.filter(t => t.status !== 'Completed').forEach(t => { if (C[t.priority] !== undefined) C[t.priority]++; });
                const T = Object.values(C).reduce((a, b) => a + b, 0) || 1;
                return Object.entries(C).map(([k, v]) => ({ label: k, count: v, pct: Math.round((v / T) * 100), color: PC[k].color }));
            }, [data.tasks]);

            const scan = async () => { setLoading(true); const r = await safeCall('generate_summary', `-${timeVal} ${timeUnit}`); setRecap(r || 'No data in this range.'); setLoading(false); };
            const scanPreset = async (p) => { setLoading(true); const r = await safeCall('generate_summary', p); setRecap(r || 'No data in this range.'); setLoading(false); };
            const aiSynth = async () => { setAiLoading(true); const r = await safeCall('get_ai_recap', `Analyze this productivity data and give concise actionable insights:\n${recap}`); setRecap(r || recap); setAiLoading(false); };

            const totalTime = useMemo(() => data.tasks.reduce((s, t) => s + (t.time_spent || 0), 0), [data.tasks]);

            const CARDS = [
                { l: 'Total', v: stats.total, c: 'var(--text-primary)' },
                { l: 'Completed', v: stats.done, c: 'var(--success)' },
                { l: 'Active', v: stats.active, c: 'var(--warning)' },
                { l: 'Overdue', v: stats.overdue, c: 'var(--danger)' },
                { l: 'Time Tracked', v: fmtHuman(totalTime) || '0m', c: 'var(--accent-hover)' },
                { l: 'Achievements', v: stats.wins, c: 'var(--warning)' },
            ];

            return (
                <div className="flex-1 overflow-y-auto px-7 py-7 space-y-6 max-w-4xl">
                    <header className="flex items-end justify-between">
                        <div>
                            <h2 className="text-xl font-bold tracking-tight" style={{ color: 'var(--text-primary)' }}>Intelligence</h2>
                            <p className="text-sm mt-0.5" style={{ color: 'var(--text-disabled)' }}>Analytics & reports</p>
                        </div>
                        <div className="text-right">
                            <div className="section-label mb-1">Momentum</div>
                            <div className="text-4xl font-black mono" style={{ color: 'var(--warning)' }}>{stats.momentum}%</div>
                        </div>
                    </header>
                    <div className="card p-4 space-y-2">
                        <div className="flex justify-between text-xs" style={{ color: 'var(--text-disabled)' }}>
                            <span>{stats.done} completed of {stats.total} total</span>
                            <span className="mono font-bold" style={{ color: 'var(--warning)' }}>{stats.momentum}%</span>
                        </div>
                        <div className="progress-track" style={{ height: 6 }}>
                            <div className="progress-fill" style={{ width: `${stats.momentum}%`, background: `linear-gradient(90deg, var(--warning), var(--accent-pressed))` }} />
                        </div>
                    </div>
                    <div className="grid grid-cols-3 gap-3">
                        {CARDS.map(s => (
