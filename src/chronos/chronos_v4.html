<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Pro</title>
    <script crossorigin src="react.min.js"></script>
    <script crossorigin src="react-dom.min.js"></script>
    <script src="framer-motion.js"></script>
    <script src="lucide.min.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="babel.min.js"></script>
    <script src="tailwind.min.js"></script>
    <script src="qwebchannel.js"></script>
    <!-- Generated palette mapping from VS Code JSON -->
    <link href="../theme/midnight-marina-palette.css" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Instrument Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.4s, color 0.4s;
            position: relative;
        }

        /* Grain overlay — gives depth, not harshness */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: var(--grain-opacity);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 256px;
        }

        /* Ambient warm glow — very subtle */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(14, 173, 207, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(68, 255, 177, 0.03) 0%, transparent 60%);
        }

        #root {
            position: relative;
            z-index: 1;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-h);
            border-radius: 8px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-hh);
        }

        input,
        textarea,
        select {
            outline: none;
            font-family: inherit;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        select option {
            background: var(--bg-1);
            color: var(--text);
        }

        /* ── COMPONENTS ─────────────────────────────────────────────────────── */

        .card {
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }

        .card-inset {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .serif {
            font-family: 'Instrument Serif', serif;
        }

        .kbd {
            display: inline-flex;
            align-items: center;
            padding: 1px 5px;
            background: var(--bg-3);
            border: 1px solid var(--border-h);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-3);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 600;
            background: var(--bg-3);
            color: var(--text-2);
            border: 1px solid var(--border);
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-3);
        }

        /* ── NAV ────────────────────────────────────────────────────────────── */
        .nav-item {
            cursor: pointer;
            border-radius: 10px;
            transition: background 0.15s, color 0.15s;
        }

        .nav-item:hover:not(.active) {
            background: var(--bg-2);
        }

        .nav-item.active {
            background: var(--bg-3);
        }

        /* ── INPUTS ─────────────────────────────────────────────────────────── */
        .input-field {
            width: 100%;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 15px;
            font-size: 14px;
            color: var(--text);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .input-field:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }

        .input-field::placeholder {
            color: var(--text-3);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-gold {
            background: var(--gold);
            color: #111009;
        }

        .btn-ghost {
            background: var(--bg-3);
            color: var(--text-2);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--rose-dim);
            color: var(--rose);
        }

        /* ── CHECKBOX ───────────────────────────────────────────────────────── */
        .check {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            border: 1.5px solid var(--border-h);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .check:hover:not(.done) {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }

        .check.done {
            background: var(--sage);
            border-color: var(--sage);
        }

        /* ── FOCUS MODE ─────────────────────────────────────────────────────── */
        .focus-mode .can-dim {
            opacity: 0.07;
            filter: blur(3px);
            pointer-events: none;
            transition: all 0.5s;
        }

        .focus-mode .sidebar-wrap {
            opacity: 0.05;
            pointer-events: none;
            transition: all 0.5s;
        }

        .focus-mode .no-dim {
            opacity: 1 !important;
            filter: none !important;
            pointer-events: auto !important;
        }

        /* ── ANIMATIONS ─────────────────────────────────────────────────────── */
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .shimmer {
            background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg-3) 50%, var(--bg-2) 75%);
            background-size: 200%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        .breathe {
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(232, 112, 112, 0.5);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(232, 112, 112, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(232, 112, 112, 0);
            }
        }

        .pulse-ring {
            animation: pulse-ring 2s infinite;
        }

        @keyframes float-in {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .float-in {
            animation: float-in 0.25s ease-out forwards;
        }

        @keyframes check-pop {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.3) rotate(-5deg);
            }

            70% {
                transform: scale(0.9) rotate(3deg);
            }

            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        .check-pop {
            animation: check-pop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-up {
            animation: slide-up 0.3s ease-out;
        }

        /* ── PROGRESS ───────────────────────────────────────────────────────── */
        .progress-track {
            height: 3px;
            background: var(--bg-3);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── TASK ───────────────────────────────────────────────────────────── */
        .task-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            transition: background 0.15s;
            position: relative;
        }

        .task-row:hover {
            background: var(--bg-2);
        }

        .task-row.focused {
            background: var(--bg-1);
            box-shadow: var(--shadow-md);
        }

        .task-row.done {
            opacity: 0.4;
        }

        .task-row.done .task-title {
            text-decoration: line-through;
            color: var(--text-3);
        }

        .task-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .task-row:hover .task-actions {
            opacity: 1;
        }

        .action-btn {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.12s;
            color: var(--text-3);
            background: transparent;
            border: none;
        }

        .action-btn:hover {
            background: var(--bg-3);
            color: var(--text);
        }

        /* ── CONTEXT MENU ───────────────────────────────────────────────────── */
        .ctx-menu {
            position: fixed;
            z-index: 9999;
            background: var(--bg-1);
            border: 1px solid var(--border-h);
            border-radius: 13px;
            box-shadow: var(--shadow-lg);
            padding: 5px;
            min-width: 210px;
        }

        .ctx-item {
            padding: 8px 11px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
            color: var(--text);
            font-weight: 500;
        }

        .ctx-item:hover {
            background: var(--bg-3);
        }

        .ctx-item.danger {
            color: var(--rose);
        }

        .ctx-sep {
            height: 1px;
            background: var(--border);
            margin: 4px 2px;
        }

        .ctx-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            padding: 6px 11px 3px;
        }

        /* ── TOOLTIP ────────────────────────────────────────────────────────── */
        [data-tip] {
            position: relative;
        }

        [data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            top: calc(100% + 7px);
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            background: var(--bg-3);
            color: var(--text);
            padding: 4px 9px;
            border-radius: 7px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid var(--border-h);
            pointer-events: none;
            z-index: 999;
            box-shadow: var(--shadow-sm);
        }

        /* ── POMODORO ───────────────────────────────────────────────────────── */
        .pomo-ring {
            transform: rotate(-90deg);
            transform-origin: center;
        }

        .pomo-track {
            fill: none;
            stroke: var(--bg-3);
            stroke-width: 3;
        }

        .pomo-fill {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        /* ── EMPTY STATE ────────────────────────────────────────────────────── */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 24px;
            gap: 10px;
            opacity: 0.35;
        }

        /* ── MODAL ──────────────────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
        }

        /* ── QUICK CAPTURE ──────────────────────────────────────────────────── */
        .quick-bar {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            width: 580px;
            max-width: calc(100vw - 48px);
        }

        /* ── STREAK ─────────────────────────────────────────────────────────── */
        .streak-flame {
            font-size: 20px;
            filter: drop-shadow(0 0 6px rgba(232, 184, 75, 0.5));
        }

        /* ── SETTINGS ROW ───────────────────────────────────────────────────── */
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        /* ── OBSIDIAN CHIP ──────────────────────────────────────────────────── */
        .obsidian-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--lavender);
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--lav-dim);
            border: 1px solid rgba(184, 160, 232, 0.18);
            transition: all 0.15s;
        }

        .obsidian-link:hover {
            background: rgba(184, 160, 232, 0.16);
        }

        /* ── MARKDOWN ───────────────────────────────────────────────────────── */
        .md p {
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.75;
            color: var(--text-2);
        }

        .md h1,
        .md h2,
        .md h3 {
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }

        .md h1 {
            font-size: 16px;
        }

        .md h2 {
            font-size: 14px;
        }

        .md h3 {
            font-size: 13px;
        }

        .md ul,
        .md ol {
            margin-left: 18px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-2);
        }

        .md li {
            margin-bottom: 3px;
        }

        .md code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-3);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--gold);
        }

        .md strong {
            color: var(--text);
            font-weight: 700;
        }

        .md blockquote {
            border-left: 2px solid var(--border-hh);
            padding-left: 12px;
            color: var(--text-3);
            font-style: italic;
            margin-bottom: 8px;
        }

        .md a {
            color: var(--sky);
            text-decoration: none;
        }

        .md a:hover {
            text-decoration: underline;
        }

        /* ── PRIORITY STRIPE ────────────────────────────────────────────────── */
        .priority-stripe {
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 2.5px;
            border-radius: 99px;
        }

        /* ── SCROLL FADE ────────────────────────────────────────────────────── */
        .scroll-fade {
            position: relative;
        }

        .scroll-fade::after {
            content: '';
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: block;
            pointer-events: none;
            background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
        }

        /* ── COMPACT SIDEBAR ────────────────────────────────────────────────── */
        .sidebar-wrap {
            width: 220px;
            flex-shrink: 0;
        }

        @keyframes celebrate {
            0% {
                transform: scale(1) rotate(0deg);
            }

            25% {
                transform: scale(1.4) rotate(-10deg);
            }

            50% {
                transform: scale(1.2) rotate(10deg);
            }

            75% {
                transform: scale(1.1) rotate(-5deg);
            }

            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        .celebrate {
            animation: celebrate 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo, memo } = React;
        const { motion, AnimatePresence } = window.Motion;

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: 'var(--bg)', bg1: 'var(--bg-1)', bg2: 'var(--bg-2)', bg3: 'var(--bg-3)',
                        text1: 'var(--text)', text2: 'var(--text-2)', text3: 'var(--text-3)',
                        gold: 'var(--gold)', teal: 'var(--teal)', rose: 'var(--rose)',
                        sage: 'var(--sage)', lav: 'var(--lavender)', sky: 'var(--sky)',
                    }
                }
            }
        };

        // ─── UTILS ──────────────────────────────────────────────────────────────────
        const fmt = (s) => { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60; return `${h > 0 ? h + ':' : ''}${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`; };
        const fmtDate = (iso) => { if (!iso) return null; return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); };
        const fmtRelDate = (iso) => {
            if (!iso) return null;
            const d = new Date(iso), now = new Date();
            const diff = Math.floor((d - now) / 86400000);
            if (diff < 0) return { label: `${Math.abs(diff)}d overdue`, cls: 'overdue' };
            if (diff === 0) return { label: 'Today', cls: 'due-soon' };
            if (diff === 1) return { label: 'Tomorrow', cls: 'due-soon' };
            if (diff <= 7) return { label: `${diff}d`, cls: '' };
            return { label: fmtDate(iso), cls: '' };
        };
        const PC = {
            High: { color: 'var(--rose)', bg: 'var(--rose-dim)', label: '↑ High', stripe: 'var(--rose)' },
            Medium: { color: 'var(--gold)', bg: 'var(--gold-dim)', label: '→ Med', stripe: 'var(--gold)' },
            Low: { color: 'var(--text-3)', bg: 'var(--bg-3)', label: '↓ Low', stripe: 'var(--border-h)' },
        };
        const groupByDate = (tasks) => {
            const now = new Date(); now.setHours(0, 0, 0, 0);
            const G = { Overdue: [], Today: [], Tomorrow: [], 'This Week': [], Later: [], 'No Date': [] };
            tasks.forEach(t => {
                if (!t.due_date) { G['No Date'].push(t); return; }
                const d = new Date(t.due_date); d.setHours(0, 0, 0, 0);
                const diff = Math.floor((d - now) / 86400000);
                if (diff < 0) G.Overdue.push(t);
                else if (diff === 0) G.Today.push(t);
                else if (diff === 1) G.Tomorrow.push(t);
                else if (diff <= 7) G['This Week'].push(t);
                else G.Later.push(t);
            });
            return G;
        };
        const md = (text) => {
            if (!text) return '';
            let h = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^### (.+)/gm, '<h3>$1</h3>').replace(/^## (.+)/gm, '<h2>$1</h2>').replace(/^# (.+)/gm, '<h1>$1</h1>')
                .replace(/^> (.+)/gm, '<blockquote>$1</blockquote>')
                .replace(/^[-*] (.+)/gm, '<li>$1</li>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/(obsidian:\/\/open\?[^\s<]+)/g, '<a href="$1" class="obsidian-link">⬡ Obsidian</a>');
            if (!h.match(/^<[hublp]/)) h = '<p>' + h + '</p>';
            return h;
        };
        const greet = () => {
            const h = new Date().getHours();
            if (h < 5) return 'Still up?';
            if (h < 12) return 'Good morning';
            if (h < 17) return 'Good afternoon';
            if (h < 21) return 'Good evening';
            return 'Good night';
        };

        // ─── BRIDGE ─────────────────────────────────────────────────────────────────
        const useBridge = () => {
            const [ready, setReady] = useState(false);
            const [data, setData] = useState({ achievements: [], tasks: [], settings: {} });
            const ref = useRef(null);
            const refresh = useCallback(async () => { if (!ref.current) return; try { const r = await ref.current.get_all_data(); if (r) setData(JSON.parse(r)); } catch (e) { } }, []);
            useEffect(() => {
                const setup = () => { if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') { new QWebChannel(qt.webChannelTransport, (c) => { ref.current = c.objects.pyBridge; setReady(true); refresh(); ref.current.data_updated.connect(refresh); }); } else setTimeout(setup, 200); };
                setup();
            }, []);
            const call = useCallback(async (m, ...a) => { if (ready && ref.current) { try { return await ref.current[m](...a); } catch (e) { } } }, [ready]);
            return { ready, data, refresh, call };
        };

        // ─── CONTEXT MENU ────────────────────────────────────────────────────────────
        const CtxMenu = ({ items, pos, onClose }) => {
            useEffect(() => {
                const h = (e) => { if (!e.target.closest('.ctx-menu')) onClose(); };
                setTimeout(() => document.addEventListener('click', h), 0);
                return () => document.removeEventListener('click', h);
            }, [onClose]);
            const style = { top: Math.min(pos.y, window.innerHeight - 300), left: Math.min(pos.x, window.innerWidth - 230) };
            return (
                <div className="ctx-menu float-in" style={style}>
                    {items.map((item, i) => item === 'sep' ? <div key={i} className="ctx-sep" /> : item.label ? <div key={i} onClick={() => { item.action(); onClose(); }} className={`ctx-item ${item.danger ? 'danger' : ''}`}><span style={{ opacity: .65, fontSize: 13 }}>{item.icon}</span>{item.label}{item.kbd && <span className="kbd ml-auto">{item.kbd}</span>}</div> : <div key={i} className="ctx-label">{item.heading}</div>)}
                </div>
            );
        };

        // ─── POMODORO WIDGET ─────────────────────────────────────────────────────────
        const POMO_DURATIONS = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
        const PomodoroWidget = () => {
            const [mode, setMode] = useState('work'); // work|short|long
            const [secs, setSecs] = useState(POMO_DURATIONS.work);
            const [running, setRunning] = useState(false);
            const [sessions, setSessions] = useState(0);
            const [celebrateNum, setCelebrateNum] = useState(false);
            const ref = useRef(null);
            const total = POMO_DURATIONS[mode];
            const pct = (secs / total);
            const circ = 2 * Math.PI * 28;

            useEffect(() => {
                if (running) { ref.current = setInterval(() => setSecs(s => { if (s <= 1) { clearInterval(ref.current); setRunning(false); if (mode === 'work') { setSessions(n => n + 1); setCelebrateNum(true); setTimeout(() => setCelebrateNum(false), 600); } return 0; } return s - 1; }), 1000); }
                else clearInterval(ref.current);
                return () => clearInterval(ref.current);
            }, [running]);

            const switchMode = (m) => { setMode(m); setSecs(POMO_DURATIONS[m]); setRunning(false); };
            const reset = () => { setSecs(POMO_DURATIONS[mode]); setRunning(false); };

            const modeColor = { work: 'var(--rose)', short: 'var(--sage)', long: 'var(--teal)' }[mode];

            return (
                <div className="card p-5 space-y-4">
                    <div className="flex items-center justify-between">
                        <div className="section-label">Pomodoro</div>
                        <div className={`flex items-center gap-1 text-xs font-bold mono ${celebrateNum ? 'celebrate' : ''}`} style={{ color: 'var(--gold)' }}>
                            {sessions > 0 && <>🍅 {sessions}</>}
                        </div>
                    </div>

                    {/* Mode tabs */}
                    <div className="flex gap-1 p-1 rounded-xl" style={{ background: 'var(--bg-2)' }}>
                        {[['work', 'Focus'], ['short', 'Short'], ['long', 'Long']].map(([m, l]) => (
                            <button key={m} onClick={() => switchMode(m)}
                                className="flex-1 py-1.5 rounded-lg text-xs font-bold transition-all"
                                style={{ background: mode === m ? 'var(--bg-1)' : 'transparent', color: mode === m ? modeColor : 'var(--text-3)', boxShadow: mode === m ? 'var(--shadow-sm)' : 'none' }}>
                                {l}
                            </button>
                        ))}
                    </div>

                    {/* Ring + time */}
                    <div className="flex items-center justify-center gap-6">
                        <div style={{ position: 'relative', width: 80, height: 80 }}>
                            <svg width="80" height="80" className="pomo-ring">
                                <circle cx="40" cy="40" r="28" className="pomo-track" />
                                <circle cx="40" cy="40" r="28" className="pomo-fill"
                                    stroke={modeColor} strokeDasharray={circ}
                                    strokeDashoffset={circ * (1 - pct)} />
                            </svg>
                            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                <span className="mono text-sm font-bold" style={{ color: 'var(--text)' }}>{fmt(secs)}</span>
                            </div>
                        </div>
                        <div className="flex flex-col gap-2">
                            <button onClick={() => setRunning(!running)}
                                className="btn btn-ghost w-24 text-xs"
                                style={running ? { background: 'var(--rose-dim)', color: 'var(--rose)', borderColor: 'transparent' } : {}}>
                                {running ? '⏸ Pause' : secs === total ? '▶ Start' : '▶ Resume'}
                            </button>
                            <button onClick={reset} className="btn btn-ghost w-24 text-xs">↺ Reset</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── DAILY FOCUS WIDGET ──────────────────────────────────────────────────────
        const DailyFocusWidget = ({ tasks, safeCall }) => {
            const [note, setNote] = useState(() => localStorage.getItem('chronos-daily-note') || '');
            const today = useMemo(() => {
                const now = new Date(); now.setHours(0, 0, 0, 0);
                return tasks.filter(t => {
                    if (!t.due_date || t.status === 'Completed') return false;
                    const d = new Date(t.due_date); d.setHours(0, 0, 0, 0);
                    return d.getTime() === now.getTime();
                });
            }, [tasks]);
            const overdue = useMemo(() => tasks.filter(t => { if (!t.due_date || t.status === 'Completed') return false; return new Date(t.due_date) < new Date(); }), [tasks]);

            const saveNote = (v) => { setNote(v); localStorage.setItem('chronos-daily-note', v); };

            return (
                <div className="card p-5 space-y-4">
                    <div className="flex items-center gap-3">
                        <div>
                            <div className="font-bold text-base" style={{ color: 'var(--text)' }}>{greet()}</div>
                            <div className="text-xs" style={{ color: 'var(--text-3)' }}>{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
                        </div>
                    </div>

                    {overdue.length > 0 && (
                        <div className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-semibold pulse-ring"
                            style={{ background: 'var(--rose-dim)', color: 'var(--rose)', border: '1px solid rgba(232,112,112,0.2)' }}>
                            ⚠ {overdue.length} overdue
                        </div>
                    )}

                    {today.length > 0 ? (
                        <div className="space-y-1.5">
                            <div className="section-label">Today's focus</div>
                            {today.slice(0, 3).map(t => (
                                <div key={t.id} className="flex items-center gap-2 px-2 py-1.5 rounded-lg" style={{ background: 'var(--bg-2)' }}>
                                    <button onClick={() => safeCall('update_task_status', t.id, 'Completed')}
                                        className="check" style={{ width: 14, height: 14, borderRadius: 4 }}>
                                    </button>
                                    <span className="text-xs font-medium flex-1 truncate" style={{ color: 'var(--text)' }}>{t.content}</span>
                                </div>
                            ))}
                            {today.length > 3 && <div className="text-xs" style={{ color: 'var(--text-3)', paddingLeft: 4 }}>+{today.length - 3} more</div>}
                        </div>
                    ) : (
                        <div className="text-xs" style={{ color: 'var(--text-3)' }}>No tasks scheduled for today ✓</div>
                    )}

                    <div className="space-y-1.5">
                        <div className="section-label">Daily note</div>
                        <textarea value={note} onChange={e => saveNote(e.target.value)} rows={2}
                            className="input-field resize-none text-xs"
                            placeholder="Intentions for today..." />
                    </div>
                </div>
            );
        };

        // ─── STREAK TRACKER ──────────────────────────────────────────────────────────
        const StreakWidget = ({ achievements }) => {
            const streak = useMemo(() => {
                if (!achievements.length) return 0;
                const dates = new Set(achievements.map(a => a.created_at ? new Date(a.created_at).toDateString() : ''));
                let count = 0, d = new Date();
                while (dates.has(d.toDateString())) { count++; d.setDate(d.getDate() - 1); }
                return count;
            }, [achievements]);

            const weekDots = useMemo(() => {
                const dates = new Set(achievements.map(a => a.created_at ? new Date(a.created_at).toDateString() : ''));
                return Array.from({ length: 7 }, (_, i) => {
                    const d = new Date(); d.setDate(d.getDate() - 6 + i);
                    return { date: d, active: dates.has(d.toDateString()), isToday: d.toDateString() === new Date().toDateString() };
                });
            }, [achievements]);

            return (
                <div className="card p-5 space-y-4">
                    <div className="flex items-center justify-between">
                        <div className="section-label">Streak</div>
                        {streak > 0 && <span className="streak-flame">🔥 {streak}d</span>}
                    </div>
                    <div className="flex items-end gap-2 justify-center">
                        {weekDots.map((d, i) => (
                            <div key={i} className="flex flex-col items-center gap-1.5">
                                <div className="rounded-md" style={{
                                    width: 24, height: 24,
                                    background: d.active ? 'var(--gold)' : d.isToday ? 'var(--border-hh)' : 'var(--bg-3)',
                                    border: d.isToday ? '1.5px solid var(--gold)' : '1.5px solid transparent',
                                    opacity: d.active ? 1 : 0.4,
                                    boxShadow: d.active ? '0 0 8px var(--gold-glow)' : 'none',
                                    transition: 'all 0.3s',
                                }} />
                                <span className="text-xs" style={{ color: 'var(--text-3)', fontSize: 9 }}>
                                    {d.date.toLocaleDateString('en-US', { weekday: 'narrow' })}
                                </span>
                            </div>
                        ))}
                    </div>
                    {streak === 0 && <div className="text-xs text-center" style={{ color: 'var(--text-3)' }}>Log a victory to start your streak</div>}
                </div>
            );
        };

        // ─── ADD TASK MODAL ───────────────────────────────────────────────────────────
        const AddTaskModal = ({ onAdd, onClose, parentId = 0 }) => {
            const [content, setContent] = useState('');
            const [priority, setPriority] = useState('Medium');
            const [dueDate, setDueDate] = useState('');
            const [notes, setNotes] = useState('');
            const [tags, setTags] = useState('');
            const ref = useRef(null);
            useEffect(() => { ref.current?.focus(); }, []);

            const submit = () => {
                if (!content.trim()) return;
                onAdd({ content: content.trim(), priority, due_date: dueDate, notes, tags: tags.split(',').map(t => t.trim()).filter(Boolean), parent_id: parentId });

            return (
                <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <motion.div initial={{ y: 20, opacity: 0, scale: 0.97 }} animate={{ y: 0, opacity: 1, scale: 1 }} exit={{ y: 10, opacity: 0, scale: 0.98 }}
                        transition={{ duration: 0.22, ease: [0.4, 0, 0.2, 1] }}
                        className="card w-full max-w-lg p-6 space-y-5" style={{ boxShadow: 'var(--shadow-lg)' }}>

                        <div className="flex items-center justify-between">
                            <h3 className="font-bold text-base" style={{ color: 'var(--text)' }}>
                                {parentId ? 'Add Subtask' : 'New Task'}
                            </h3>
                            <button onClick={onClose} className="action-btn">✕</button>
                        </div>

                        <input ref={ref} value={content} onChange={e => setContent(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) submit(); if (e.key === 'Escape') onClose(); }}
                            className="input-field text-[15px] font-medium" placeholder="What needs to get done?" />

                        <div className="grid grid-cols-2 gap-3">
                            <div className="space-y-2">
                                <div className="section-label">Priority</div>
                                <div className="flex gap-1.5">
                                    {['High', 'Medium', 'Low'].map(p => (
                                        <button key={p} onClick={() => setPriority(p)}
                                            className="flex-1 py-2 rounded-xl text-xs font-bold transition-all"
                                            style={{ background: priority === p ? PC[p].bg : 'var(--bg-3)', color: priority === p ? PC[p].color : 'var(--text-3)', border: `1px solid ${priority === p ? PC[p].color + '44' : 'var(--border)'}`, transform: priority === p ? 'translateY(-1px)' : 'none' }}>
                                            {p}
