<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Hub Ultra - React Edition</title>
    <!-- React & Friends -->
    <script crossorigin src="react.min.js"></script>
    <script crossorigin src="react-dom.min.js"></script>
    <!-- Framer Motion -->
    <script src="framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="lucide.min.js"></script>
    <!-- Babel -->
    <script src="babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="tailwind.min.js"></script>
    <!-- QWebChannel -->
    <script src="qwebchannel.js"></script>

    <style>
        @import url('midnight-marina.css');

        :root {
            /* Midnight Marina Palette */
            --midnight-blue: #03233A;
            --navy-blue: #021A2C;
            --deep-navy: #01121F;
            --marina-cyan: #0EADCF;
            --marina-teal: #55FFCC;
            --marina-purple: #aa82ff;
            --marina-yellow: #FFE073;
            --marina-red: #D95C5C;
            --marina-blue: #22D4FF;
            --marina-white: #CBE0F0;
            --marina-muted: #8295A0;
            --marina-faint: #254D6A;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--midnight-blue);
            color: var(--marina-white);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .glass {
            background: rgba(3, 35, 58, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(14, 173, 207, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--navy-blue);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--marina-faint);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--marina-cyan);
        }

        /* Prevent layout shift when scrollbar appears */
        html {
            overflow-y: overlay;
        }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, createElement } = React;
        const { motion, AnimatePresence } = window.Motion || { motion: 'div', AnimatePresence: ({children}) => children };
        
        // Simple icon component using dangerouslySetInnerHTML to avoid React DOM conflicts
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const [svg, setSvg] = useState('');
            
            useEffect(() => {
                if (window.lucide) {
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1).replace(/([A-Z])/g, '-$1').toLowerCase();
                    const iconData = window.lucide.icons[iconName];
                    if (iconData) {
                        const svgString = window.lucide.createElement(iconData).outerHTML;
                        setSvg(svgString);
                    }
                }
            }, [name]);
            
            if (!svg) {
                return createElement('span', { className, ...props }, '•');
            }
            
            return createElement('span', { 
                className, 
                dangerouslySetInnerHTML: { __html: svg },
                ...props 
            });
        };
        
        // Create Lucide proxy for easy icon access
        const Lucide = new Proxy({}, {
            get: (_, iconName) => (props) => createElement(Icon, { name: iconName, ...props })
        });

        // Tailwind Config
        if (typeof tailwind !== 'undefined') {
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            marina: {
                                midnight: '#03233A',
                                navy: '#021A2C',
                                deep: '#01121F',
                                cyan: '#0EADCF',
                                teal: '#55FFCC',
                                purple: '#aa82ff',
                                yellow: '#FFE073',
                                red: '#D95C5C',
                                blue: '#22D4FF',
                                white: '#CBE0F0',
                                muted: '#8295A0',
                                faint: '#254D6A',
                            }
                        }
                    }
                }
            };
        }

        const App = () => {
            const [activeTab, setActiveTab] = useState('log');
            const [data, setData] = useState({ achievements: [], tasks: [], settings: {} });
            const [bridgeReady, setBridgeReady] = useState(false);
            const [showReminder, setShowReminder] = useState(false);
            const pyBridgeRef = useRef(null);

            // Modal state
            const [editingItem, setEditingItem] = useState(null);

            // Export trigger to window for Python access
            useEffect(() => {
                window.triggerReminderPopup = () => {
                    setShowReminder(true);
                    setTimeout(() => setShowReminder(false), 10000); // Auto hide after 10s
                };
            }, []);

            const setupBridge = useCallback(() => {
                if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') {
                    new QWebChannel(qt.webChannelTransport, (c) => {
                        pyBridgeRef.current = c.objects.pyBridge;
                        setBridgeReady(true);
                        refreshData();

                        // Connect signal
                        pyBridgeRef.current.data_updated.connect(refreshData);
                    });
                } else if (typeof QWebChannel !== 'undefined' && window.qt) {
                    // Fallback for some environments
                    new QWebChannel(window.qt.webChannelTransport, (c) => {
                        pyBridgeRef.current = c.objects.pyBridge;
                        setBridgeReady(true);
                        refreshData();
                    });
                } else {
                    setTimeout(setupBridge, 200);
                }
            }, []);

            const refreshData = async () => {
                if (!pyBridgeRef.current) return;
                const raw = await pyBridgeRef.current.get_all_data();
                if (raw) {
                    setData(JSON.parse(raw));
                }
            };

            useEffect(() => {
                setupBridge();
            }, [setupBridge]);

            const safeCall = async (method, ...args) => {
                if (bridgeReady && pyBridgeRef.current) {
                    return await pyBridgeRef.current[method](...args);
                }
                return null;
            };

            const toggleTheme = () => {
                const root = document.documentElement;
                const isDark = root.classList.contains('dark');
                // For now we stay on Marina theme mostly, but let's support a simple toggle
                alert("Marina Theme is the default. Light mode coming soon to React version!");
            };

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-marina-deep text-marina-white">
                    {/* Sidebar */}
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        <AnimatePresence>
                            {showReminder && (
                                <motion.div
                                    initial={{ y: -100, opacity: 0 }}
                                    animate={{ y: 20, opacity: 1 }}
                                    exit={{ y: -100, opacity: 0 }}
                                    className="absolute top-0 left-1/2 -translate-x-1/2 z-50 w-full max-w-md px-4"
                                >
                                    <div className="bg-marina-teal bg-opacity-90 backdrop-blur-md border border-white border-opacity-20 rounded-2xl p-5 shadow-2xl flex items-center gap-4 text-marina-navy">
                                        <div className="bg-white bg-opacity-20 p-2 rounded-xl">
                                            <Lucide.Bell className="w-6 h-6 animate-bounce" />
                                        </div>
                                        <div className="flex-1">
                                            <h4 className="font-black text-lg">CHRONOS ALERT</h4>
                                            <p className="text-sm font-bold opacity-80">Sync your recent victories and tactical progress!</p>
                                        </div>
                                        <button onClick={() => setShowReminder(false)} className="hover:bg-white hover:bg-opacity-20 p-2 rounded-lg transition-colors">
                                            <Lucide.X className="w-5 h-5" />
                                        </button>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        <AnimatePresence mode="wait">
                            {activeTab === 'log' && (
                                <VictoriesPage
                                    key="log"
                                    data={data}
                                    safeCall={safeCall}
                                    onEdit={(item) => setEditingItem({ ...item, type: 'achievement' })}
                                />
                            )}
                            {activeTab === 'missions' && (
                                <MissionsPage
                                    key="missions"
                                    data={data}
                                    safeCall={safeCall}
                                    onEdit={(item) => setEditingItem({ ...item, type: 'task' })}
                                />
                            )}
                            {activeTab === 'analytics' && (
                                <AnalyticsPage
                                    key="analytics"
                                    safeCall={safeCall}
                                />
                            )}
                            {activeTab === 'settings' && (
                                <SettingsPage
                                    key="settings"
                                    data={data}
                                    safeCall={safeCall}
                                />
                            )}
                        </AnimatePresence>
                    </main>

                    {/* Edit Modal */}
                    <AnimatePresence>
                        {editingItem && (
                            <EditModal
                                item={editingItem}
                                onClose={() => setEditingItem(null)}
                                onSave={async (id, type, notes, links) => {
                                    if (type === 'task') {
                                        const original = data.tasks.find(t => t.id === id);
                                        await safeCall('update_task', id, original.content, notes, links);
                                    } else {
                                        const original = data.achievements.find(a => a.id === id);
                                        await safeCall('update_achievement', id, original.content, original.impact, notes, links);
                                    }
                                    setEditingItem(null);
                                }}
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const Sidebar = ({ activeTab, setActiveTab }) => {
            const navItems = [
                { id: 'log', icon: 'Award', label: 'Victories', color: 'text-marina-teal' },
                { id: 'missions', icon: 'Target', label: 'Missions', color: 'text-marina-cyan' },
                { id: 'analytics', icon: 'Activity', label: 'Analytics', color: 'text-marina-purple' },
                { id: 'settings', icon: 'Cpu', label: 'System', color: 'text-marina-muted' },
            ];

            return (
                <aside className="w-64 bg-marina-navy border-r border-marina-faint flex flex-col p-6 z-20">
                    <div className="flex items-center gap-3 mb-10 px-2">
                        <div className="bg-gradient-to-br from-marina-cyan to-marina-teal p-2 rounded-lg shadow-lg shadow-marina-cyan/20">
                            <Lucide.Zap className="w-5 h-5 text-marina-navy" fill="currentColor" />
                        </div>
                        <span className="font-extrabold text-xl tracking-tight text-white italic">CHRONOS</span>
                    </div>

                    <nav className="flex-1 space-y-2">
                        {navItems.map((item) => {
                            const IconComponent = (Lucide && Lucide[item.icon]) ? Lucide[item.icon] : (Lucide && Lucide.HelpCircle ? Lucide.HelpCircle : 'span');
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group ${activeTab === item.id
                                        ? `bg-marina-midnight border border-marina-faint text-white shadow-inner`
                                        : 'text-marina-muted hover:text-marina-white hover:bg-marina-midnight/50'
                                        }`}
                                >
                                    {typeof IconComponent === 'function' || typeof IconComponent === 'object' ?
                                        <IconComponent className={`w-5 h-5 ${activeTab === item.id ? item.color : 'text-current opacity-70 group-hover:opacity-100'}`} /> :
                                        <span className="w-5 h-5 text-center">•</span>
                                    }
                                    <span className="font-semibold">{item.label}</span>
                                    {activeTab === item.id && (
                                        <motion.div
                                            layoutId="activeTabIndicator"
                                            className="ml-auto w-1.5 h-1.5 rounded-full bg-marina-teal shadow-[0_0_8px_rgba(85,255,204,0.6)]"
                                        />
                                    )}
                                </button>
                            );
                        })}
                    </nav>

                    <div className="mt-auto pt-6 border-t border-marina-faint">
                        <button
                            className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-marina-muted hover:text-marina-yellow transition-colors group"
                            onClick={() => window.open('https://github.com', '_blank')}
                        >
                            <Lucide.Sun className="w-5 h-5 group-hover:rotate-45 transition-transform" />
                            <span className="font-medium text-sm">Switch Mode</span>
                        </button>
                    </div>
                </aside>
            );
        };

        const VictoriesPage = ({ data, safeCall, onEdit }) => {
            const [input, setInput] = useState('');

            const handleAdd = async () => {
                let txt = input.trim();
                if (!txt) return;
                let imp = "Medium";
                if (txt.startsWith('!!!')) { imp = "High"; txt = txt.slice(3).trim(); }
                else if (txt.startsWith('.')) { imp = "Low"; txt = txt.slice(1).trim(); }
                await safeCall('add_achievement', txt, imp, "", "");
                setInput('');
            };

            return (
                <motion.div
                    initial={{ opacity: 0, x: 20 }}
                    animate={{ opacity: 1, x: 0 }}
                    exit={{ opacity: 0, x: -20 }}
                    className="flex-1 p-10 overflow-hidden flex flex-col"
                >
                    <header className="mb-8">
                        <h2 className="text-3xl font-black text-marina-purple mb-2">Daily Victories</h2>
                        <p className="text-marina-muted font-medium">Tracking tactical momentum and high-impact wins.</p>
                    </header>

                    <div className="flex gap-3 mb-8">
                        <div className="flex-1 group relative">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleAdd()}
                                placeholder="Claim a new victory... (!!! for High, . for Low)"
                                className="w-full bg-marina-navy border border-marina-faint rounded-xl px-5 py-4 focus:outline-none focus:border-marina-cyan focus:ring-1 focus:ring-marina-cyan/30 text-marina-white placeholder:text-marina-faint transition-all"
                            />
                            <div className="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2">
                                <kbd className="px-2 py-1 bg-marina-deep rounded border border-marina-faint text-[10px] text-marina-muted">ENTER</kbd>
                            </div>
                        </div>
                        <button
                            onClick={handleAdd}
                            className="bg-marina-cyan hover:bg-marina-blue text-marina-midnight font-bold px-6 py-4 rounded-xl transition-all shadow-lg shadow-marina-cyan/20 active:scale-95 flex items-center gap-2"
                        >
                            <Lucide.Plus className="w-5 h-5" />
                            <span>Commit</span>
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-4 -mr-4 space-y-4">
                        <AnimatePresence initial={false}>
                            {data.achievements.map((ach) => (
                                <AchievementCard key={ach.id} ach={ach} onEdit={() => onEdit(ach)} onDelete={() => safeCall('delete_item', ach.id, 'achievement')} />
                            ))}
                        </AnimatePresence>
                        {data.achievements.length === 0 && (
                            <div className="flex flex-col items-center justify-center py-20 opacity-20">
                                <Lucide.Trophy className="w-16 h-16 mb-4" />
                                <p className="text-xl font-bold italic">No victories recorded yet...</p>
                            </div>
                        )}
                    </div>
                </motion.div>
            );
        };

        const AchievementCard = ({ ach, onEdit, onDelete }) => {
            const impactStyles = {
                'High': 'bg-marina-red/10 text-marina-red border-marina-red/30',
                'Medium': 'bg-marina-cyan/10 text-marina-cyan border-marina-cyan/30',
                'Low': 'bg-marina-teal/10 text-marina-teal border-marina-teal/30',
            };

            return (
                <motion.div
                    layout
                    initial={{ opacity: 0, y: 10 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, scale: 0.95 }}
                    className="group bg-marina-navy/40 hover:bg-marina-navy border border-marina-faint hover:border-marina-cyan/50 p-5 rounded-2xl transition-all duration-300"
                >
                    <div className="flex items-start gap-4">
                        <div className="flex-1">
                            <div className={`inline-flex items-center px-2 py-0.5 rounded-md text-[9px] font-black uppercase tracking-widest border mb-3 ${impactStyles[ach.impact]}`}>
                                {ach.impact} IMPACT
                            </div>
                            <h3 className="text-lg font-bold text-marina-white leading-tight mb-2 group-hover:text-marina-cyan transition-colors">{ach.content}</h3>
                            {ach.notes && <p className="text-sm text-marina-muted leading-relaxed font-medium mb-3">{ach.notes}</p>}

                            {ach.links && (
                                <div className="flex flex-wrap gap-2">
                                    {ach.links.split('\n').filter(l => l).map((link, idx) => (
                                        <a key={idx} href={link} target="_blank" className="text-[10px] bg-marina-deep px-3 py-1.5 rounded-lg border border-marina-faint text-marina-cyan hover:bg-marina-cyan hover:text-marina-midnight transition-colors flex items-center gap-1.5">
                                            <Lucide.ExternalLink className="w-3 h-3" />
                                            {link.replace(/https?:\/\//, '').split('/')[0]}
                                        </a>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={onEdit} className="p-2.5 text-marina-muted hover:text-marina-teal hover:bg-marina-teal/10 rounded-xl transition-all">
                                <Lucide.Edit3 className="w-4 h-4" />
                            </button>
                            <button onClick={onDelete} className="p-2.5 text-marina-muted hover:text-marina-red hover:bg-marina-red/10 rounded-xl transition-all">
                                <Lucide.Trash2 className="w-4 h-4" />
                            </button>
                        </div>
                    </div>
                </motion.div>
            );
        };

        const MissionsPage = ({ data, safeCall, onEdit }) => {
            const [input, setInput] = useState('');

            const handleAdd = async (pid = 0) => {
                let txt = (pid === 0) ? input.trim() : prompt("Sub-Mission Objective:");
                if (pid === 0) setInput('');
                if (txt) await safeCall('add_task', txt, pid, "", "");
            };

            const buildTree = (tasks, parentId = 0) => {
                return tasks
                    .filter(t => t.parent_id === parentId)
                    .map(t => ({ ...t, children: buildTree(tasks, t.id) }));
            };

            const missionTree = buildTree(data.tasks);

            return (
                <motion.div
                    initial={{ opacity: 0, x: 20 }}
                    animate={{ opacity: 1, x: 0 }}
                    exit={{ opacity: 0, x: -20 }}
                    className="flex-1 p-10 overflow-hidden flex flex-col"
                >
                    <header className="mb-8">
                        <h2 className="text-3xl font-black text-marina-cyan mb-2">Missions</h2>
                        <p className="text-marina-muted font-medium">Strategic map and nested project objectives.</p>
                    </header>

                    <div className="flex gap-3 mb-10">
                        <div className="flex-1 relative">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleAdd(0)}
                                placeholder="Initiate primary mission..."
                                className="w-full bg-marina-navy border border-marina-faint rounded-xl px-5 py-4 focus:outline-none focus:border-marina-teal focus:ring-1 focus:ring-marina-teal/30 text-marina-white placeholder:text-marina-faint transition-all"
                            />
                        </div>
                        <button
                            onClick={() => handleAdd(0)}
                            className="bg-marina-teal hover:bg-marina-teal/80 text-marina-midnight font-bold px-6 py-4 rounded-xl transition-all shadow-lg active:scale-95 flex items-center gap-2"
                        >
                            <Lucide.Target className="w-5 h-5" />
                            <span>Launch</span>
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-4 -mr-4 space-y-3">
                        {missionTree.map((mission) => (
                            <MissionNode
                                key={mission.id}
                                mission={mission}
                                depth={0}
                                safeCall={safeCall}
                                onEdit={() => onEdit(mission)}
                                onAddSub={() => handleAdd(mission.id)}
                            />
                        ))}
                        {missionTree.length === 0 && (
                            <div className="flex flex-col items-center justify-center py-20 opacity-20">
                                <Lucide.Flag className="w-16 h-16 mb-4" />
                                <p className="text-xl font-bold italic">Awaiting strategic deployment...</p>
                            </div>
                        )}
                    </div>
                </motion.div>
            );
        };

        const MissionNode = ({ mission, depth, safeCall, onEdit, onAddSub }) => {
            const isDone = mission.status === 'Completed';

            return (
                <div className="space-y-2">
                    <motion.div
                        layout
                        className={`group bg-marina-navy/30 border border-marina-faint hover:border-marina-teal/40 p-4 rounded-xl flex items-center gap-4 transition-all ${isDone ? 'opacity-50' : ''}`}
                    >
                        <button
                            onClick={() => safeCall('update_task_status', mission.id, isDone ? 'Pending' : 'Completed')}
                            className={`w-6 h-6 rounded-md border-2 transition-all flex items-center justify-center ${isDone
                                ? 'bg-marina-teal border-marina-teal text-marina-navy'
                                : 'border-marina-faint hover:border-marina-teal bg-transparent'
                                }`}
                        >
                            {isDone && <Lucide.Check className="w-4 h-4 stroke-[4]" />}
                        </button>

                        <span className={`flex-1 font-bold text-base transition-all ${isDone ? 'line-through text-marina-muted' : 'text-marina-white group-hover:text-marina-teal'}`}>
                            {mission.content}
                        </span>

                        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            <button onClick={onAddSub} title="Add Sub-mission" className="p-2 text-marina-teal hover:bg-marina-teal/10 rounded-lg">
                                <Lucide.PlusCircle className="w-4 h-4" />
                            </button>
                            <button onClick={onEdit} title="Mission Intelligence" className="p-2 text-marina-cyan hover:bg-marina-cyan/10 rounded-lg">
                                <Lucide.Info className="w-4 h-4" />
                            </button>
                            <button onClick={() => safeCall('delete_item', mission.id, 'task')} title="Abort Mission" className="p-2 text-marina-red hover:bg-marina-red/10 rounded-lg">
                                <Lucide.XCircle className="w-4 h-4" />
                            </button>
                        </div>
                    </motion.div>

                    {mission.children && mission.children.length > 0 && (
                        <div className="ml-8 border-l-2 border-marina-faint/50 pl-4 py-1 space-y-2 relative">
                            {mission.children.map(child => (
                                <MissionNode
                                    key={child.id}
                                    mission={child}
                                    depth={depth + 1}
                                    safeCall={safeCall}
                                    onEdit={() => onEdit(child)}
                                    onAddSub={() => handleAdd(child.id)}
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const AnalyticsPage = ({ safeCall }) => {
            const [recap, setRecap] = useState('Initialize neural recap to view tactical insights...');
            const [status, setStatus] = useState('ready');

            const loadRecap = async (mod) => {
                setStatus('loading');
                const res = await safeCall('generate_summary', mod);
                setRecap(res || "No tactical entries discovered for this timestamp.");
                setStatus('ready');
            };

            const analyzeWithAI = async () => {
                if (recap.includes("Initialize") || recap.includes("No tactical")) {
                    alert("Please generate a standard recap first to provide context.");
                    return;
                }
                setStatus('ai_loading');
                const prompt = `Analyze the following productivity log and provide a high-level strategic summary, identifying key momentum areas and potential bottlenecks:\n\n${recap}`;
                const res = await safeCall('get_ai_recap', prompt);
                setRecap(res);
                setStatus('ready');
            };

            return (
                <motion.div
                    initial={{ opacity: 0, scale: 0.98 }}
                    animate={{ opacity: 1, scale: 1 }}
                    exit={{ opacity: 0, scale: 0.98 }}
                    className="flex-1 p-10 overflow-hidden flex flex-col"
                >
                    <header className="mb-10">
                        <h2 className="text-3xl font-black text-marina-purple mb-2">Tactical Recap</h2>
                        <p className="text-marina-muted font-medium">Synthesized data logs for momentum tracking.</p>
                    </header>

                    <div className="flex items-center gap-4 mb-8">
                        <div className="flex bg-marina-navy p-1 rounded-xl border border-marina-faint">
                            {['Daily', 'Weekly', 'Monthly'].map((label) => (
                                <button
                                    key={label}
                                    onClick={() => loadRecap(label === 'Daily' ? '-24 hours' : label === 'Weekly' ? '-7 days' : '-30 days')}
                                    className="px-6 py-2 rounded-lg font-bold text-sm text-marina-white hover:bg-marina-midnight transition-all active:bg-marina-faint"
                                >
                                    {label}
                                </button>
                            ))}
                        </div>
                        <div className="w-[1px] h-8 bg-marina-faint" />
                        <button
                            disabled={status !== 'ready'}
                            onClick={analyzeWithAI}
                            className={`flex items-center gap-2 px-6 py-3 rounded-xl font-black text-sm bg-gradient-to-r from-marina-purple to-marina-blue text-white shadow-lg transition-all active:scale-95 ${status !== 'ready' ? 'opacity-50 cursor-not-allowed' : 'hover:shadow-marina-purple/30'}`}
                        >
                            <Lucide.BrainCircuit className={`w-4 h-4 ${status === 'ai_loading' ? 'animate-pulse' : ''}`} />
                            {status === 'ai_loading' ? 'Processing...' : 'Neural Analysis'}
                        </button>
                    </div>

                    <div className="flex-1 relative group">
                        <div className="absolute -inset-0.5 bg-gradient-to-br from-marina-cyan/20 to-marina-purple/20 rounded-2xl blur opacity-30 group-hover:opacity-100 transition duration-1000"></div>
                        <div className="relative h-full bg-marina-navy/80 border border-marina-faint rounded-2xl p-8 font-mono text-sm leading-relaxed overflow-y-auto custom-scrollbar">
                            {status === 'loading' ? (
                                <div className="flex flex-col items-center justify-center h-full gap-4 text-marina-cyan">
                                    <Lucide.RefreshCcw className="w-10 h-10 animate-spin" />
                                    <span className="font-bold tracking-widest uppercase">Fetching Tactical Grid...</span>
                                </div>
                            ) : (
                                <div className="whitespace-pre-wrap text-marina-white selection:bg-marina-cyan/30">
                                    {recap}
                                </div>
                            )}
                        </div>
                    </div>
                </motion.div>
            );
        };

        const SettingsPage = ({ data, safeCall }) => {
            const [models, setModels] = useState([]);
            const [loadingModels, setLoadingModels] = useState(false);
            const [localSettings, setLocalSettings] = useState({
                ai_url: '',
                ai_key: '',
                ai_model: '',
                ai_cert_path: ''
            });

            useEffect(() => {
                if (data.settings) {
                    setLocalSettings(data.settings);
                }
            }, [data.settings]);

            const refreshModels = async () => {
                setLoadingModels(true);
                const res = await safeCall('get_ai_models');
                if (res) {
                    const parsed = JSON.parse(res);
                    setModels(parsed);
                }
                setLoadingModels(false);
            };

            const saveSettings = async () => {
                await safeCall('save_settings', JSON.stringify(localSettings));
                alert("Neural parameters locked.");
            };

            return (
                <motion.div
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, y: -20 }}
                    className="flex-1 p-10 overflow-y-auto custom-scrollbar"
                >
                    <header className="mb-10">
                        <h2 className="text-3xl font-black text-marina-muted mb-2">System Core</h2>
                        <p className="text-marina-faint font-medium">Environment variables and vault hooks.</p>
                    </header>

                    <div className="grid grid-cols-1 gap-8 max-w-4xl">
                        <section className="bg-marina-navy/40 border border-marina-faint rounded-2xl p-8">
                            <h3 className="text-lg font-bold text-marina-cyan mb-6 flex items-center gap-2">
                                <Lucide.HardDrive className="w-5 h-5" />
                                Storage Hook
                            </h3>
                            <div className="flex items-center gap-4 bg-marina-deep p-4 rounded-xl border border-marina-faint">
                                <div className="flex-1 overflow-hidden">
                                    <label className="text-[10px] font-black uppercase text-marina-faint mb-1 block">Obsidian Vault Path</label>
                                    <div className="font-mono text-xs truncate text-marina-white">
                                        {localSettings.obsidian_path || 'Not Connected'}
                                    </div>
                                </div>
                                <button
                                    onClick={() => safeCall('select_obsidian_path')}
                                    className="bg-marina-cyan hover:bg-marina-blue text-marina-midnight font-bold px-4 py-2 rounded-lg text-xs transition-all active:scale-95"
                                >
                                    Scan Vault
                                </button>
                            </div>
                        </section>

                        <section className="bg-marina-navy/40 border border-marina-faint rounded-2xl p-8">
                            <h3 className="text-lg font-bold text-marina-purple mb-6 flex items-center gap-2">
                                <Lucide.Cpu className="w-5 h-5" />
                                Neural Configuration
                            </h3>

                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-marina-purple">Endpoint URL</label>
                                        <input
                                            type="text"
                                            value={localSettings.ai_url}
                                            onChange={(e) => setLocalSettings({ ...localSettings, ai_url: e.target.value })}
                                            placeholder="http://localhost:11434"
                                            className="w-full bg-marina-deep border border-marina-faint rounded-xl px-4 py-3 text-sm focus:border-marina-purple outline-none transition-colors"
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-marina-purple">API Secure Key</label>
                                        <input
                                            type="password"
                                            value={localSettings.ai_key}
                                            onChange={(e) => setLocalSettings({ ...localSettings, ai_key: e.target.value })}
                                            placeholder="••••••••••••••••"
                                            className="w-full bg-marina-deep border border-marina-faint rounded-xl px-4 py-3 text-sm focus:border-marina-purple outline-none transition-colors"
                                        />
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-marina-purple">Model Matrix</label>
                                    <div className="flex gap-2">
                                        <select
                                            value={localSettings.ai_model}
                                            onChange={(e) => setLocalSettings({ ...localSettings, ai_model: e.target.value })}
                                            className="flex-1 bg-marina-deep border border-marina-faint rounded-xl px-4 py-3 text-sm focus:border-marina-purple outline-none appearance-none transition-colors"
                                        >
                                            <option value="">{localSettings.ai_model || 'Select Neural Model...'}</option>
                                            {models.map(m => <option key={m} value={m}>{m}</option>)}
                                        </select>
                                        <button
                                            onClick={refreshModels}
                                            className="p-3 bg-marina-deep border border-marina-faint rounded-xl hover:border-marina-cyan transition-colors"
                                        >
                                            <Lucide.RefreshCw className={`w-5 h-5 text-marina-cyan ${loadingModels ? 'animate-spin' : ''}`} />
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-marina-purple">CA Certificate Route</label>
                                    <div className="flex gap-2">
                                        <input
                                            type="text"
                                            value={localSettings.ai_cert_path}
                                            readOnly
                                            className="flex-1 bg-marina-deep border border-marina-faint rounded-xl px-4 py-3 text-sm opacity-60 cursor-not-allowed"
                                        />
                                        <button
                                            onClick={async () => {
                                                const path = await safeCall('select_cert_path');
                                                if (path) setLocalSettings({ ...localSettings, ai_cert_path: path });
                                            }}
                                            className="p-3 bg-marina-deep border border-marina-faint rounded-xl hover:border-marina-cyan transition-colors"
                                        >
                                            <Lucide.ShieldCheck className="w-5 h-5 text-marina-blue" />
                                        </button>
                                    </div>
                                </div>

                                <button
                                    onClick={saveSettings}
                                    className="w-full bg-gradient-to-r from-marina-purple to-marina-blue text-white font-black py-4 rounded-xl shadow-lg hover:shadow-marina-purple/40 transition-all active:scale-[0.98] mt-4"
                                >
                                    LOCK PROTOCOL
                                </button>
                            </div>
                        </section>
                    </div>
                </motion.div>
            );
        };

        const EditModal = ({ item, onClose, onSave }) => {
            const [notes, setNotes] = useState(item.notes || '');
            const [links, setLinks] = useState(item.links || '');

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-marina-deep/80 backdrop-blur-md">
                    <motion.div
                        initial={{ opacity: 0, scale: 0.9, y: 20 }}
                        animate={{ opacity: 1, scale: 1, y: 0 }}
                        exit={{ opacity: 0, scale: 0.9, y: 20 }}
                        className="w-full max-w-lg bg-marina-navy border border-marina-cyan/30 rounded-3xl shadow-2xl overflow-hidden"
                    >
                        <div className="p-8 border-b border-marina-faint flex items-center justify-between">
                            <div>
                                <h3 className="text-xl font-black text-marina-cyan">Intel Refinement</h3>
                                <p className="text-xs font-bold text-marina-faint uppercase tracking-tighter mt-1 truncate max-w-[300px]">{item.content}</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-marina-faint rounded-full transition-colors">
                                <Lucide.X className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="p-8 space-y-6">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-marina-cyan uppercase tracking-widest">Strategic Notes</label>
                                <textarea
                                    value={notes}
                                    onChange={(e) => setNotes(e.target.value)}
                                    className="w-full h-32 bg-marina-deep border border-marina-faint rounded-2xl p-4 text-sm focus:border-marina-cyan outline-none transition-colors resize-none custom-scrollbar"
                                    placeholder="Add intelligence and context..."
                                />
                            </div>

                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-marina-cyan uppercase tracking-widest">Resource Links (One per line)</label>
                                <textarea
                                    value={links}
                                    onChange={(e) => setLinks(e.target.value)}
                                    className="w-full h-24 bg-marina-deep border border-marina-faint rounded-2xl p-4 text-sm focus:border-marina-cyan outline-none transition-colors resize-none custom-scrollbar"
                                    placeholder="https://..."
                                />
                            </div>
                        </div>

                        <div className="p-8 bg-marina-deep/30 flex gap-4">
                            <button
                                onClick={onClose}
                                className="flex-1 py-3 px-6 rounded-xl font-bold text-marina-muted hover:text-marina-white transition-colors"
                            >
                                Discard
                            </button>
                            <button
                                onClick={() => onSave(item.id, item.type, notes, links)}
                                className="flex-1 py-3 px-6 rounded-xl font-bold bg-marina-cyan text-marina-midnight hover:bg-marina-blue transition-all shadow-lg active:scale-95"
                            >
                                Commit Intel
                            </button>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</head>

<body>
    <div id="root"></div>
</body>

</html>
