[project]
name = "fast-explorer"
version = "2.0.0"
description = "A blazing-fast universal launcher and file indexer for Windows."
authors = [
    { name = "Muddyblack" }
]
dependencies = [
    "PyQt6",
    "PyQt6-WebEngine",
    "keyboard",
    "mouse",
    "watchdog",
    "pyautogui",
    "keyring",
    "requests",
    "Markdown",
]
readme = "README.md"
requires-python = ">=3.9"

[project.scripts]
nexus = "src.nexus.app:main"
xexplorer = "src.xexplorer.xexplorer:main"
regex-helper = "src.regex_helper.regex_helper:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["src.nexus", "src.xexplorer", "src.common", "src.regex_helper"]
package-dir = {"" = "."}
