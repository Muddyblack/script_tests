[project]
name = "fast-explorer"
version = "2.0.0"
description = "A blazing-fast universal launcher and file indexer for Windows."
authors = [
    { name = "Muddyblack" }
]
dependencies = [
    "PyQt6",
    "PyQt6-WebEngine",
    "keyboard",
    "mouse",
    "watchdog",
    "easyocr",
]
readme = "README.md"
requires-python = ">=3.9"

[project.scripts]
nexus = "src.nexus.app:main"
xexplorer = "src.xexplorer.xexplorer:main"
regex-helper = "src.regex_helper.regex_helper:main"
file-ops = "src.file_ops.file_ops:main"
archiver = "src.archiver.archiver:main"
clipboard-manager = "src.clipboard_manager.clipboard_manager:main"
port-inspector = "src.port_inspector.port_inspector:main"
hash-tool = "src.hash_tool.hash_tool:main"
window-manager = "src.window_manager.window_manager:main"
env-var-explorer = "src.env_var_explorer.env_var_explorer:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
